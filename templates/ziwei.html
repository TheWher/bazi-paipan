<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#1a1a24;--card:#1e1e2c;--text:#c8c8d0;--muted:#787890;--accent:#d4a843;--border:#3a3a4a;--shadow:0 2px 12px rgba(0,0,0,.3)}
html{font-size:16px}
body{font-family:"PingFang SC","Microsoft YaHei",-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.hidden{display:none!important}
.app-layout{display:flex;min-height:100vh}
.app-sidebar{width:320px;min-width:320px;flex-shrink:0;border-right:1px solid var(--border);padding:16px 14px 80px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column;background:#1a1a20}
.app-main{flex:1;min-width:0;padding:16px 20px 60px;overflow-y:auto}
.app-header{display:flex;justify-content:space-between;align-items:center;padding:0 0 12px}
.app-header h1{font-size:1.2rem;cursor:pointer;color:var(--accent);letter-spacing:.05em}
.app-header .subtitle{font-size:.65em;color:var(--muted)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:.8em;font-weight:500;cursor:pointer;transition:all .2s}
.btn:hover{opacity:.85}
.btn-primary{background:var(--accent);color:#1a1a2e;border-color:var(--accent);font-weight:600}
.btn-gold{background:linear-gradient(135deg,#c8a850,#8b6914);color:#fff;border-color:transparent;font-weight:600}
.btn-sm{font-size:.72em;padding:4px 10px}
.form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px 12px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:.72em;color:var(--muted);font-weight:500}
.form-group input,.form-group select{padding:7px 9px;font-size:.8em;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);outline:none}
.form-group input:focus,.form-group select:focus{border-color:var(--accent)}
.radio-group{display:flex;gap:10px}
.radio-label{display:flex;align-items:center;gap:3px;font-size:.78em;cursor:pointer}
.quick-input-row{position:relative;margin-bottom:10px}
.quick-input-row input{width:100%;padding:9px 10px;font-size:.88em;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:monospace;letter-spacing:.12em}
.quick-hint{font-size:.62em;color:var(--muted)}
.loading{text-align:center;padding:40px;color:var(--muted)}
.spinner{width:28px;height:28px;margin:0 auto 10px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error-box{background:rgba(200,40,40,.12);color:#ef5350;padding:12px 16px;border-radius:8px;margin-bottom:14px;font-size:.82em}
/* ---- 文墨天机风格十二宫 Grid ---- */
.ziwei-grid{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:4px;margin-bottom:14px;aspect-ratio:1;min-height:560px}
.ziwei-cell{background:var(--card);border:1.5px solid var(--border);padding:6px 5px 4px;text-align:center;font-size:.85em;display:flex;flex-direction:column;position:relative;overflow:hidden}
.ziwei-cell:hover{z-index:2;box-shadow:0 0 18px rgba(212,168,67,.25)}
.ziwei-cell.empty-cell{opacity:.45}
.ziwei-cell.current-decadal{border-color:var(--accent);border-width:2px;box-shadow:inset 0 0 28px rgba(212,168,67,.08),0 0 10px rgba(212,168,67,.1)}
/* 地支大字 */
.cell-branch{font-size:1.5em;font-weight:800;line-height:1.1;margin-bottom:1px}
.br-巳{color:#e8a860}.br-午{color:#d4785e}.br-未{color:#c8b878}.br-申{color:#c0c0c0}
.br-辰{color:#a0c878}.br-酉{color:#c0a860}.br-卯{color:#78b878}.br-戌{color:#c89860}
.br-寅{color:#78a8c0}.br-丑{color:#b8a878}.br-子{color:#6898c8}.br-亥{color:#8888b8}
/* 星曜 */
.cell-stars{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;min-height:0}
.star-row{display:flex;align-items:center;gap:3px;font-size:1em;line-height:1.3;white-space:nowrap}
.star-name{font-weight:700}
.star-name.major{color:#d4a843}
.star-name.auspicious{color:#ce93d8}
.star-name.malefic{color:#5a5a6e}
.star-name.neutral{color:var(--muted)}
.star-brightness{font-size:.7em;padding:0 2px;border-radius:2px;font-weight:600;line-height:1.1}
.b-miao{background:#d4a843;color:#1a1a2e}.b-wang{background:#e8a860;color:#1a1a2e}
.b-de{background:#7cb342;color:#fff}.b-li{background:#5c6bc0;color:#fff}
.b-ping{background:#888;color:#fff}.b-bu{background:#78909c;color:#fff}.b-xian{background:#c62828;color:#fff}
.star-mutagen{font-size:.75em;font-weight:700}
.m-lu{color:#2e7d32}.m-quan{color:#7b1fa2}.m-ke{color:#1565c0}.m-ji{color:#c62828}
/* 宫名红字 */
.cell-palace{font-size:.8em;font-weight:700;color:#c0392b;margin-top:2px}
.cell-dizhi{font-size:.68em;color:var(--muted)}
.cell-decadal{font-size:.65em;color:var(--accent);font-weight:600;margin-top:2px;display:flex;justify-content:center;gap:6px;flex-wrap:wrap}
.cell-decadal .dl-badge{font-size:.85em;padding:0 3px;border-radius:2px;font-weight:700}
.cell-decadal .dl-ly{color:#b39ddb;background:rgba(124,77,255,.08)}
.cell-decadal .dl-dn{color:#64b5f6;background:rgba(33,150,243,.08)}
.cell-decadal .dl-nn{color:#81c784;background:rgba(76,175,80,.08)}
.cell-tag{position:absolute;top:2px;right:3px;font-size:.55em;padding:1px 4px;border-radius:2px;font-weight:700}
.tag-ming{background:#d4a843;color:#1a1a2e}.tag-shen{background:#7c4dff;color:#fff}
/* 中心 */
.ziwei-center{grid-row:2/4;grid-column:2/4;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:12px 6px;background:var(--card);border:1px solid var(--border)}
.ziwei-center .center-title{font-size:1.1em;font-weight:800;color:var(--accent);margin-bottom:6px;letter-spacing:.06em}
.ziwei-center .center-row{color:var(--muted);margin-bottom:3px;line-height:1.5;font-size:.9em}
.ziwei-center .center-row strong{color:var(--text);font-weight:700}
.ziwei-center .center-gz{font-size:1em;font-weight:700;color:var(--accent);margin:3px 0}
/* 格局 */
.patterns-panel{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:12px}
.pattern-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:12px;font-size:.72em;font-weight:600}
.lv-上吉{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff}
.lv-吉{background:rgba(212,168,67,.12);color:#c8a850}
.lv-中{background:rgba(120,120,120,.1);color:#aaa}
.lv-忌{background:rgba(198,40,40,.12);color:#ef5350}
/* 信息面板 */
.info-panel{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:12px}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;font-size:.74em}
.info-label{color:var(--muted);font-size:.82em;margin-bottom:1px}
.info-value{font-weight:600;color:var(--accent)}
/* 流年 */
.horoscope-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;margin-bottom:12px;flex-wrap:wrap}
.horoscope-bar label{font-size:.74em;color:var(--muted);font-weight:500}
.horoscope-bar select,.horoscope-bar input{padding:5px 8px;font-size:.76em;border:1px solid var(--border);border-radius:5px;background:var(--bg);color:var(--text)}
.horoscope-result{font-size:.74em;color:var(--accent);font-weight:600;margin-left:auto}
/* 分析卡片 */
.analysis-content{display:flex;flex-direction:column;gap:14px}
.analysis-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;position:relative}
.analysis-card::after{content:'';position:absolute;inset:0;opacity:.4;pointer-events:none}
.analysis-card.card-bg{background:linear-gradient(135deg,var(--card),rgba(212,168,67,.04))}
.analysis-card.card-caifu{background:linear-gradient(135deg,var(--card),rgba(76,175,80,.04))}
.analysis-card.card-ganqing{background:linear-gradient(135deg,var(--card),rgba(233,30,99,.04))}
.analysis-card.card-daxian{background:linear-gradient(135deg,var(--card),rgba(33,150,243,.04))}
.analysis-card.card-liunian{background:linear-gradient(135deg,var(--card),rgba(156,39,176,.04))}
.analysis-card h2{font-size:.95em;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.analysis-card h2 .card-icon{font-size:1.1em}
.analysis-card .card-body{font-size:.82em;line-height:1.75;color:var(--text)}
.analysis-card .card-body strong{color:var(--accent)}
.analysis-card .card-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:.7em;font-weight:600;margin-left:auto}
.analysis-card .card-badge.badge-gold{background:rgba(212,168,67,.15);color:#c8a850}
.analysis-card .card-badge.badge-green{background:rgba(76,175,80,.12);color:#81c784}
.analysis-card .card-badge.badge-pink{background:rgba(233,30,99,.1);color:#f48fb1}
.analysis-card .card-badge.badge-blue{background:rgba(33,150,243,.12);color:#64b5f6}
.analysis-card .card-badge.badge-purple{background:rgba(156,39,176,.12);color:#ce93d8}
.analysis-card .card-footer{font-size:.7em;color:var(--muted);margin-top:10px;padding-top:8px;border-top:1px solid var(--border-light)}
.glossary-term{color:var(--accent);border-bottom:1px dotted var(--accent);cursor:help}
/* 弹窗 */
.star-modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center}
.star-modal{background:var(--card);border-radius:12px;padding:22px;width:340px;max-width:90vw;max-height:80vh;overflow-y:auto}
.star-modal h3{color:var(--accent);margin-bottom:6px}
.star-modal .star-level{font-size:.74em;color:var(--muted);margin-bottom:10px}
.star-modal .star-desc{font-size:.82em;line-height:1.6;margin-bottom:10px}
.star-modal .star-palace-note{font-size:.76em;color:var(--muted);border-top:1px solid var(--border);padding-top:8px}
.btn-close{float:right;background:none;border:none;font-size:1.1em;cursor:pointer;color:var(--muted)}
.sticky-actions{position:fixed;bottom:0;left:0;width:320px;background:var(--card);padding:10px 14px;display:flex;gap:6px;border-top:1px solid var(--border);z-index:10}
.sticky-actions .btn{flex:1;justify-content:center}
/* 中心区字号加大 */
.ziwei-center .center-title{font-size:1.2em}.ziwei-center .center-row{font-size:.95em}
.pw-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center}
.pw-dialog{background:var(--card);border-radius:12px;padding:24px;width:340px;max-width:90vw;text-align:center}
.pw-dialog h3{margin-bottom:6px}.pw-dialog p{font-size:.76em;color:var(--muted);margin-bottom:14px}
.pw-dialog input{width:100%;padding:9px;font-size:.88em;border:1px solid var(--border);border-radius:6px;margin-bottom:10px;background:var(--bg);color:var(--text)}
.pw-error{color:#ef5350;font-size:.74em;margin-bottom:6px}
.btn-row{display:flex;gap:6px}.btn-row .btn{flex:1}
@media(max-width:860px){.app-layout{flex-direction:column}.app-sidebar{width:100%;min-width:0;height:auto;position:static;border-right:none;padding:16px 14px}.app-main{padding:16px 14px 80px}.sticky-actions{width:100%}.ziwei-grid{min-height:400px}.ziwei-cell{font-size:.7em}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="app-sidebar">
    <header class="app-header">
        <div>
            <h1 onclick="location='/'">🔮 紫微斗数</h1>
            <p class="subtitle">iztro-py 精确排盘 · 文墨天机风格</p>
        </div>
    </header>
    <div class="quick-input-row">
        <input type="text" id="quick-input" maxlength="12" inputmode="numeric" placeholder="200508190135">
        <span class="quick-hint">快捷输入 200508190135 → 自动填表</span>
    </div>
    <div class="form-grid">
        <div class="form-group"><label>历法</label><div class="radio-group"><label class="radio-label"><input type="radio" name="calendar" value="solar" checked> 公历</label><label class="radio-label"><input type="radio" name="calendar" value="lunar"> 农历</label></div></div>
        <div class="form-group"><label>年份</label><input type="number" id="year" placeholder="1991" min="1900" max="2100"></div>
        <div class="form-group"><label>月份</label><input type="number" id="month" placeholder="8" min="1" max="12"></div>
        <div class="form-group"><label>日期</label><input type="number" id="day" placeholder="15" min="1" max="31"></div>
        <div class="form-group"><label>时</label><input type="number" id="hour" placeholder="1" min="0" max="23"></div>
        <div class="form-group"><label>分</label><input type="number" id="minute" placeholder="0" min="0" max="59"></div>
        <div class="form-group"><label>性别</label><div class="radio-group"><label class="radio-label"><input type="radio" name="gender" value="男" checked> 男</label><label class="radio-label"><input type="radio" name="gender" value="女"> 女</label></div></div>
    </div>
    <div class="sticky-actions">
        <button id="btn-paipan" class="btn btn-primary">🔮 紫微排盘</button>
        <button id="btn-analyze" class="btn btn-gold" disabled>🧠 开始解读</button>
    </div>
</aside>
<main class="app-main">
    <div id="loading" class="loading hidden"><div class="spinner"></div><p id="loading-text">排盘中...</p></div>
    <div id="error-box" class="error-box hidden"></div>
    <section id="chart-section" class="hidden">
        <div class="floating-bar" style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px">
            <span style="font-weight:600;font-size:.85em">🔮 紫微命盘</span>
        </div>
        <div id="patterns-panel" class="patterns-panel"></div>
        <div class="info-panel">
            <div class="info-card"><div class="info-label">五行局</div><div class="info-value" id="info-wuxing">—</div></div>
            <div class="info-card"><div class="info-label">命宫 / 身宫</div><div class="info-value" id="info-mingshen">—</div></div>
            <div class="info-card"><div class="info-label">当前大限</div><div class="info-value" id="info-decadal">—</div></div>
            <div class="info-card"><div class="info-label">生年四化</div><div class="info-value" id="info-sihua">—</div></div>
        </div>
        <div class="horoscope-bar">
            <label>📅 流年</label>
            <input type="number" id="horoscope-year" value="2025" min="1900" max="2100" style="width:72px">
            <button id="btn-horoscope" class="btn btn-sm">查看叠盘</button>
            <button id="btn-yearly-analyze" class="btn btn-gold btn-sm">🧠 流年解读</button>
            <span class="horoscope-result" id="horoscope-result"></span>
        </div>
        <div id="ziwei-grid" class="ziwei-grid"></div>
        <div id="ziwei-mutagen-line" class="ziwei-mutagen-line" style="text-align:center;font-size:.76em;margin-bottom:14px;padding:8px 12px;background:var(--card);border:1px solid var(--border);border-radius:6px;display:flex;flex-wrap:wrap;justify-content:center;gap:6px"></div>
    </section>
    <section id="analysis-section" class="hidden" style="margin-top:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px"><span style="font-weight:600;font-size:.85em">📜 命盘解读</span></div>
        <div id="analysis-content" class="analysis-content"></div>
    </section>
    <section id="yearly-analysis-section" class="hidden" style="margin-top:12px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;padding:8px 14px;background:var(--card);border:1px solid var(--border);border-radius:6px"><span style="font-weight:600;font-size:.85em">📅 流年解读</span></div>
        <div id="yearly-analysis-content" class="analysis-content"></div>
    </section>
</main>
</div>
<div id="pw-overlay" class="pw-overlay hidden">
    <div class="pw-dialog"><h3>🔐 深度分析需要密码</h3><p>API 调用成本较高，请向管理员获取密码</p><input type="password" id="pw-input" placeholder="请输入密码" autocomplete="off"><div class="pw-error" id="pw-error"></div><div class="btn-row"><button id="btn-pw-cancel" class="btn">取消</button><button id="btn-pw-confirm" class="btn btn-primary">确认</button></div></div>
</div>
<div id="star-modal-overlay" class="star-modal-overlay hidden" onclick="this.classList.add('hidden')">
    <div class="star-modal" onclick="event.stopPropagation()"><button class="btn-close" onclick="document.getElementById('star-modal-overlay').classList.add('hidden')">✕</button><h3 id="star-modal-name"></h3><div class="star-level" id="star-modal-level"></div><div class="star-desc" id="star-modal-desc"></div><div class="star-palace-note" id="star-modal-note"></div></div>
</div>
<script>
const $=id=>document.getElementById(id);
const elYear=$('year'),elMonth=$('month'),elDay=$('day'),elHour=$('hour'),elMinute=$('minute');
const elBtnPaipan=$('btn-paipan'),elBtnAnalyze=$('btn-analyze'),elLoading=$('loading'),elErrorBox=$('error-box');
const elChartSection=$('chart-section'),elZiweiGrid=$('ziwei-grid');
const elAnalysisSection=$('analysis-section'),elAnalysisContent=$('analysis-content');
const elYearlyAnalysisSection=$('yearly-analysis-section'),elYearlyAnalysisContent=$('yearly-analysis-content');
let ziweiPlateData=null,analysisInProgress=false,_pwResolve=null;

function showLoading(m){$('loading-text').textContent=m;elLoading.classList.remove('hidden')}
function hideLoading(){elLoading.classList.add('hidden')}
function showError(m){elErrorBox.textContent=m;elErrorBox.classList.remove('hidden')}
function hideError(){elErrorBox.classList.add('hidden')}

$('quick-input').addEventListener('input',function(){
    const v=this.value.replace(/\D/g,'');if(v.length<8)return;
    elYear.value=v.slice(0,4);elMonth.value=parseInt(v.slice(4,6));elDay.value=parseInt(v.slice(6,8));
    if(v.length>=10)elHour.value=parseInt(v.slice(8,10));if(v.length>=12)elMinute.value=parseInt(v.slice(10,12));
});
$('quick-input').addEventListener('keydown',function(e){if(e.key==='Enter')elBtnPaipan.click();});

function getFormData(){
    const c=document.querySelector('input[name="calendar"]:checked')?.value||'solar';
    const g=document.querySelector('input[name="gender"]:checked')?.value||'男';
    return{year:parseInt(elYear.value),month:parseInt(elMonth.value),day:parseInt(elDay.value),hour:parseInt(elHour.value||'0'),minute:parseInt(elMinute.value||'0'),gender:g,is_lunar:c==='lunar'};
}

// ======== 排盘 ========
elBtnPaipan.addEventListener('click',async()=>{
    const fd=getFormData();if(!fd.year||!fd.month||!fd.day){showError('请填写完整的出生日期');return}
    hideError();showLoading('紫微排盘中...');elBtnPaipan.disabled=true;elChartSection.classList.add('hidden');elAnalysisSection.classList.add('hidden');elYearlyAnalysisSection.classList.add('hidden');
    try{
        const r=await fetch('/api/ziwei/paipan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(fd)});
        const d=await r.json();if(d.error){showError(d.error);hideLoading();elBtnPaipan.disabled=false;return}
        ziweiPlateData=d;hideLoading();renderZiweiChart(d);elChartSection.classList.remove('hidden');elBtnAnalyze.disabled=false;
    }catch(e){showError('网络错误: '+e.message);hideLoading();elBtnPaipan.disabled=false}
    elBtnPaipan.disabled=false;
});

// ======== 文墨天机风格十二宫渲染 ========
function renderZiweiChart(data){
    const palaces=data.palaces||[];if(palaces.length!==12)return;
    const birthStr=(data.input?.birth_datetime||'');const birthYear=parseInt(birthStr);
    const approxAge=birthYear?new Date().getFullYear()-birthYear:-1;
    // 当前大限
    let curIdx=-1;
    if(approxAge>=0)for(const p of palaces){const m=(p.decadal_range||'').match(/(\d+)-(\d+)/);if(m&&approxAge>=parseInt(m[1])&&approxAge<=parseInt(m[2])){curIdx=p.index;break}}
    // 四柱干支 (从 input datetime 推算)
    let sizhu='';
    if(birthStr){const parts=birthStr.split(/[\s-]+/);if(parts.length>=4)sizhu=parts[0]+' '+parts[1]+' '+parts[2]+' '+parts[3]}

    let html='';
    for(let row=1;row<=4;row++){for(let col=1;col<=4;col++){
        if(row>=2&&row<=3&&col>=2&&col<=3){
            if(row===2&&col===2){
                const we={'水二局':'🌊','木三局':'🌳','金四局':'⛰️','土五局':'🏔️','火六局':'🔥'};
                html+=`<div class="ziwei-center"><div class="center-title">紫微斗数</div><div class="center-row">${we[data.five_elements_class]||''} <strong>${data.five_elements_class||'?'}</strong></div><div class="center-row">命宫 <strong>${data.soul_palace||'?'}</strong> · 身宫 <strong>${data.body_palace||'?'}</strong></div><div class="center-row">${data.input?.birth_datetime||''}</div></div>`;
            }continue;
        }
        const pal=palaces.find(p=>p.grid_row===row&&p.grid_col===col);
        if(!pal){html+='<div class="ziwei-cell empty-cell"></div>';continue}
        const isCur=pal.index===curIdx;
        let cls='ziwei-cell';if(pal.is_empty)cls+=' empty-cell';if(isCur)cls+=' current-decadal';
        let tags='';if(pal.tags?.includes('命宫'))tags+='<span class="cell-tag tag-ming">命</span>';if(pal.tags?.includes('身宫'))tags+='<span class="cell-tag tag-shen">身</span>';

        // 地支大字
        const branch=pal.earthly_branch||'';
        const brCls={'巳':'br-巳','午':'br-午','未':'br-未','申':'br-申','辰':'br-辰','酉':'br-酉','卯':'br-卯','戌':'br-戌','寅':'br-寅','丑':'br-丑','子':'br-子','亥':'br-亥'};

        // 星曜行
        let starHtml='';
        for(const s of(pal.major_stars||[])){
            const nm=typeof s==='string'?s:s.name;
            const tc=typeof s==='object'?s.css?.replace('star-',''):'major';
            let row=`<span class="star-name ${tc}">${nm}</span>`;
            if(typeof s==='object'&&s.brightness)row+=`<span class="star-brightness ${s.brightness_css||''}">${s.brightness}</span>`;
            if(typeof s==='object'&&s.mutagen)row+=`<span class="star-mutagen ${s.mutagen_css||''}">${s.mutagen_mark||s.mutagen}</span>`;
            starHtml+=`<div class="star-row">${row}</div>`;
        }
        // 辅星(吉星在前)
        const minorStars=pal.minor_stars||[];
        if(minorStars.length){
            const names=minorStars.map(s=>typeof s==='string'?s:s.name).slice(0,4);
            starHtml+=`<div class="star-row" style="font-size:.78em;color:var(--muted)">${names.join(' ')}</div>`;
        }
        if(!starHtml)starHtml=`<div class="star-row" style="font-size:.8em;color:var(--muted)">${pal.is_empty?'空宫':'—'}</div>`;

        html+=`<div class="${cls}" data-palace="${pal.name}">${tags}<div class="cell-branch ${brCls[branch]||''}">${branch}</div><div class="cell-stars">${starHtml}</div><div class="cell-palace">${pal.name}</div><div class="cell-dizhi">${pal.dizhi||''}</div><div class="cell-decadal">${isCur?'<span class="dl-badge dl-dn">▸大限</span>':''}<span>${pal.decadal_range||''}岁</span></div></div>`;
    }}
    elZiweiGrid.innerHTML=html;

    // 四化badge
    const mu=data.year_mutagens||[];
    const elMu=document.getElementById('ziwei-mutagen-line');
    if(mu.length){const mc={'化禄':'mu-lu','化权':'mu-quan','化科':'mu-ke','化忌':'mu-ji'},mk={'化禄':'◈','化权':'▲','化科':'◎','化忌':'✕'};
        elMu.innerHTML=mu.map(m=>`<span class="mutagen-badge ${mc[m.mutagen]||''}" style="display:inline-flex;align-items:center;gap:2px;font-weight:600;padding:2px 7px;border-radius:10px;font-size:.8em;background:${m.mutagen==='化禄'?'rgba(46,125,50,.12)':m.mutagen==='化权'?'rgba(123,31,162,.12)':m.mutagen==='化科'?'rgba(21,101,192,.12)':'rgba(198,40,40,.12)'};color:${m.mutagen==='化禄'?'#2e7d32':m.mutagen==='化权'?'#7b1fa2':m.mutagen==='化科'?'#1565c0':'#c62828'}">${mk[m.mutagen]||''} ${m.star}${m.mutagen}<span style="font-weight:400;margin-left:2px">${m.palace}</span></span>`).join('');
    }else elMu.innerHTML='';

    // 信息面板
    $('info-wuxing').textContent=data.five_elements_class||'—';
    $('info-mingshen').textContent=(data.soul_palace||'?')+' / '+(data.body_palace||'?');
    let decInfo='—';
    if(approxAge>=0)for(const p of palaces){const m=(p.decadal_range||'').match(/(\d+)-(\d+)/);if(m&&approxAge>=parseInt(m[1])&&approxAge<=parseInt(m[2])){decInfo=p.name+' '+p.decadal_dizhi+' ('+p.decadal_range+'岁)';break}}
    $('info-decadal').textContent=decInfo;
    const ym=data.year_mutagens||[];
    $('info-sihua').textContent=ym.length?ym.map(m=>m.star+m.mutagen).join(' · '):'—';
    renderPatterns(data.patterns||[]);
    // 星曜可点击
    setTimeout(()=>{document.querySelectorAll('.ziwei-cell .star-name').forEach(el=>{el.style.cursor='pointer';el.addEventListener('click',e=>{e.stopPropagation();showStarDetail(el.textContent)})})},150);
}

function applyOverlayMarks(horoData){
    const liuyao=horoData.liuyao||{};
    const cells=document.querySelectorAll('.ziwei-cell');
    for(const cell of cells){
        const pName=cell.dataset.palace||cell.querySelector('.cell-palace')?.textContent?.trim();
        if(!pName)continue;
        const decDiv=cell.querySelector('.cell-decadal');
        if(!decDiv)continue;
        // 收集流曜
        const ly=[];
        for(const [name,palace] of Object.entries(liuyao)){
            if(palace===pName)ly.push(name.replace('流',''));
        }
        // 追加badge到decadal行
        if(horoData.decadal_palace===pName&&!decDiv.querySelector('.dl-dn')){
            const b=document.createElement('span');b.className='dl-badge dl-dn';b.textContent='大限';decDiv.appendChild(b);

        if(horoData.yearly_palace===pName){
            const b=document.createElement('span');b.className='dl-badge dl-nn';b.textContent='流年';decDiv.appendChild(b);
        }
        if(ly.length){
            const b=document.createElement('span');b.className='dl-badge dl-ly';b.textContent=ly.slice(0,2).join('·');decDiv.appendChild(b);
        }
    }
}

function formatMarkdown(t){
    // 卡片化渲染——每个 ## 章节独立成卡
    let h=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // 先提取标题和正文块
    const sections=[];
    const parts=h.split(/^## /gm);
    for(let i=1;i<parts.length;i++){
        const lines=parts[i].split('\n');
        const title=lines[0].trim();
        const body=lines.slice(1).join('\n').trim();
        sections.push({title,body});
    }
    // 如果有 ## 标题，按卡片渲染
    if(sections.length>=2){
        const icons={'命盘底色':'🎯','事业':'💼','财运':'💰','感情':'❤️','大限':'🔮','流年':'📅'};
        const badges={'命盘底色':'badge-gold','事业':'badge-gold','财运':'badge-green','感情':'badge-pink','大限':'badge-blue','流年':'badge-purple'};
        const bgs={'命盘底色':'card-bg','事业':'card-bg','财运':'card-caifu','感情':'card-ganqing','大限':'card-daxian','流年':'card-liunian'};
        let cards='';
        for(const s of sections){
            let icon='📌';let badge='';let bg='';
            for(const[k,v] of Object.entries(icons)){if(s.title.includes(k)){icon=v;break}}
            for(const[k,v] of Object.entries(badges)){if(s.title.includes(k)){badge=v;break}}
            for(const[k,v] of Object.entries(bgs)){if(s.title.includes(k)){bg=v;break}}
            // 渲染正文：粗体+换行
            let body=s.body.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
            // 截取简短标签名
            const shortLabel=s.title.replace(/[🎯💼💰❤️🔮📅\s]/g,'').slice(0,4);
            cards+=`<div class="analysis-card ${bg}"><h2><span class="card-icon">${icon}</span>${s.title}<span class="card-badge ${badge}">${shortLabel}</span></h2><div class="card-body">${body}</div></div>`;
        }
        return cards;
    }
    // fallback: plain format
    h=h.replace(/^## (.+)$/gm,'<h2>$1</h2>');h=h.replace(/^### (.+)$/gm,'<h3>$1</h3>');
    h=h.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');h=h.replace(/\n/g,'<br>');return h;
}

const GLOSSARY={'命宫':'核心宫位，代表先天禀赋、性格底色','身宫':'后天重心，30岁后影响超命宫','三方四正':'本宫+对宫+左右三合宫','四化':'化禄(机遇)化权(掌控)化科(名声)化忌(业力)','空宫':'无主星，借对宫星曜参考','大限':'十年一换的运势周期','紫微':'帝王星，贵气领导力','天机':'智谋星，聪明善变','太阳':'光明星，热情公益','武曲':'财星，果断理财','天同':'福星，温和享受','廉贞':'囚星，执着才艺','天府':'库星，稳重管理','太阴':'富星，细腻内敛','贪狼':'桃花星，交际才艺','巨门':'暗星，口才是非','天相':'印星，服务协调','天梁':'荫星，正直慈悲','七杀':'将星，魄力开拓','破军':'耗星，变革创新','化禄':'机遇财富流','化权':'掌控力竞争','化科':'名声贵人','化忌':'业力课题'};
function injectGlossary(c){
    if(!c)return;const terms=Object.keys(GLOSSARY).sort((a,b)=>b.length-a.length);
    const w=document.createTreeWalker(c,NodeFilter.SHOW_TEXT,null,false),reps=[];
    while(w.nextNode()){const n=w.currentNode;if(n.parentElement?.closest?.('.glossary-term,.cell-stars,.cell-palace,.cell-branch'))continue;let t=n.textContent;for(const term of terms){const i=t.indexOf(term);if(i!==-1){const s=document.createElement('span');s.className='glossary-term';s.title=GLOSSARY[term];s.textContent=term;reps.push({node:n,idx:i,term,span:s});break}}}
    for(const{node:n,idx,term,span:s}of reps){const b=n.textContent.slice(0,idx),a=n.textContent.slice(idx+term.length),p=n.parentNode;p.insertBefore(document.createTextNode(b),n);p.insertBefore(s,p.childNodes[p.childNodes.length-1]?.nextSibling||null);p.insertBefore(document.createTextNode(a),s.nextSibling);p.removeChild(n)}
}
