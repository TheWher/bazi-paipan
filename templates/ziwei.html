<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘</title>
<style>
:root{--bg:#1a1a24;--card:#1e1e2c;--text:#c8c8d0;--muted:#787878;--gold:#d4a843;--border:#3a3a4a;--shadow:0 2px 20px rgba(0,0,0,.3)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hidden{display:none!important}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:300px;min-width:300px;background:#1a1a1f;border-right:1px solid var(--border);padding:18px 14px 60px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.sidebar h2{color:var(--gold);font-size:.95rem;cursor:pointer;margin-bottom:4px;letter-spacing:.04em}
.sidebar .sub{font-size:.6em;color:#555;margin-bottom:12px}
.main{flex:1;padding:24px 28px 40px;overflow-y:auto}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:12px}
.frm label{display:block;font-size:.66em;color:#777;margin-bottom:2px}
.frm input,.frm select{width:100%;padding:7px 8px;font-size:.76em;border:1px solid var(--border);border-radius:5px;background:var(--card);color:var(--text);outline:none}.frm input:focus,.frm select:focus{border-color:var(--gold)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-size:.78em;cursor:pointer;transition:all .2s}.btn:hover{background:#2a2a38}
.btn-gold{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff;border:none;font-weight:600}.btn-gold:hover{opacity:.9}
.quick{width:100%;padding:8px 10px;font-size:.8em;border:1px solid var(--border);border-radius:6px;background:var(--card);color:var(--text);font-family:monospace;letter-spacing:.08em;margin-bottom:12px;outline:none}.quick:focus{border-color:var(--gold)}
.chart-container{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:16px;box-shadow:var(--shadow)}
.chart-container svg{width:100%;height:auto;max-width:720px;display:block;margin:0 auto}
.toolbar{display:flex;gap:8px;margin-bottom:14px;align-items:center}
.toolbar select{padding:5px 10px;font-size:.74em;background:var(--card);color:var(--text);border:1px solid var(--border);border-radius:5px}
.toolbar span{font-size:.74em;color:var(--gold);margin-left:auto;font-weight:500}
.patterns{display:flex;flex-wrap:wrap;gap:4px;margin:10px 0}.pat-badge{padding:2px 7px;border-radius:9px;font-size:.64em;font-weight:600}.pat-ex{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff}.pat-gd{background:rgba(212,168,67,.12);color:#d4a843}.pat-ne{background:rgba(120,120,120,.1);color:#aaa}.pat-ca{background:rgba(198,40,40,.12);color:#ef5350}
.loading{text-align:center;padding:60px;color:var(--muted)}.spinner{width:32px;height:32px;margin:0 auto 12px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.analysis{display:flex;flex-direction:column;gap:14px}.a-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px}.a-card h2{font-size:.9em;color:var(--gold);margin-bottom:8px}.a-card .body{font-size:.82em;line-height:1.75}.a-card .body strong{color:var(--gold)}
@media(max-width:860px){.app-layout{flex-direction:column}.sidebar{width:100%;min-width:0;height:auto;position:static}.main{padding:16px 14px 60px}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar">
    <h2 onclick="location='/'">🔮 紫微斗数</h2>
    <div class="sub">iztro JS 原版引擎 · 命盘解读</div>
    <input class="quick" id="quick" maxlength="12" inputmode="numeric" placeholder="200508190135">
    <div class="frm">
        <div><label>历法</label><select id="cal"><option value="solar">公历</option><option value="lunar">农历</option></select></div>
        <div><label>年份</label><input id="y" type="number" value="1991" min="1900" max="2100"></div>
        <div><label>月份</label><input id="m" type="number" value="8" min="1" max="12"></div>
        <div><label>日期</label><input id="d" type="number" value="15" min="1" max="31"></div>
        <div><label>时</label><input id="h" type="number" value="1" min="0" max="23"></div>
        <div><label>分</label><input id="min" type="number" value="0" min="0" max="59"></div>
        <div><label>性别</label><select id="g"><option value="男">男</option><option value="女">女</option></select></div>
    </div>
    <button id="btn-paipan" class="btn btn-gold" style="width:100%;margin-bottom:6px">🔮 排盘</button>
    <button id="btn-analyze" class="btn" disabled style="width:100%;margin-bottom:10px">🧠 AI 解读</button>
    <div class="patterns" id="patterns"></div>
</aside>
<main class="main">
    <div id="loading" class="loading hidden"><div class="spinner"></div><p>排盘中...</p></div>
    <div id="chart-area" class="hidden">
        <div class="toolbar">
            <span style="font-weight:700;color:var(--gold);font-size:.85em">命盘</span>
            <select id="horo-scope"><option value="origin">本命</option><option value="decadal">大限</option><option value="yearly">流年</option></select>
            <button id="btn-flystar" class="btn" style="font-size:.72em;padding:4px 10px" onclick="toggleFlyStars()">✈️ 飞星全览</button>
            <span id="horo-result"></span>
        </div>
        <div id="flystar-panel" class="hidden" style="background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:10px;font-size:.74em;max-height:260px;overflow-y:auto"></div>
        <div class="chart-container" id="zw-chart"></div>
    </div>
    <div id="analysis-section" class="hidden">
        <div style="font-weight:700;color:var(--gold);font-size:.9em;margin-bottom:12px">📜 命盘解读</div>
        <div id="analysis-content" class="analysis"></div>
    </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let astrolabe=null,selectedPalace=null,activeStem=null;
const MUTAGEN_ORDER=['禄','权','科','忌'];
const GAN_SIHUA={甲:{禄:'廉贞',权:'破军',科:'武曲',忌:'太阳'},乙:{禄:'天机',权:'天梁',科:'紫微',忌:'太阴'},丙:{禄:'天同',权:'天机',科:'文昌',忌:'廉贞'},丁:{禄:'太阴',权:'天同',科:'天机',忌:'巨门'},戊:{禄:'贪狼',权:'太阴',科:'右弼',忌:'天机'},己:{禄:'武曲',权:'贪狼',科:'天梁',忌:'文曲'},庚:{禄:'太阳',权:'武曲',科:'太阴',忌:'天同'},辛:{禄:'巨门',权:'太阳',科:'文曲',忌:'文昌'},壬:{禄:'天梁',权:'紫微',科:'左辅',忌:'武曲'},癸:{禄:'破军',权:'巨门',科:'太阴',忌:'贪狼'}};

$('quick').addEventListener('input',function(){const v=this.value.replace(/\D/g,'');if(v.length<8)return;$('y').value=v.slice(0,4);$('m').value=parseInt(v.slice(4,6));$('d').value=parseInt(v.slice(6,8));if(v.length>=10)$('h').value=parseInt(v.slice(8,10));if(v.length>=12)$('min').value=parseInt(v.slice(10,12))});
$('quick').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-paipan').click()});
function getB(){return{y:parseInt($('y').value),m:parseInt($('m').value),d:parseInt($('d').value),h:parseInt($('h').value),min:parseInt($('min').value||'0'),g:$('g').value,cal:$('cal').value}}

$('btn-paipan').addEventListener('click',()=>{
    const b=getB();if(!b.y||!b.m||!b.d)return;
    $('loading').classList.remove('hidden');$('chart-area').classList.add('hidden');$('analysis-section').classList.add('hidden');
    const hi=Math.floor((b.h+1)/2)%12;
    try{astrolabe=b.cal==='lunar'?iztro.astro.byLunar(`${b.y}-${b.m}-${b.d}`,hi,b.g,false,true,'zh-CN'):iztro.astro.bySolar(`${b.y}-${b.m}-${b.d}`,hi,b.g,true,'zh-CN');}
    catch(e){$('loading').innerHTML=`<p style="color:#ef5350">排盘失败: ${e.message}</p>`;return}
    try{renderChart();}catch(e){$('loading').innerHTML=`<p style="color:#ef5350">渲染失败: ${e.message}</p>`;return}
    $('loading').classList.add('hidden');$('chart-area').classList.remove('hidden');$('btn-analyze').disabled=false;
    fetch('/api/ziwei/paipan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:b.y,month:b.m,day:b.d,hour:b.h,minute:b.min,gender:b.g,is_lunar:b.cal==='lunar'})}).then(r=>r.json()).then(d=>{const p=d.patterns||[];$('patterns').innerHTML=p.map(pp=>`<span class="pat-badge pat-${pp.level==='上吉'?'ex':pp.level==='吉'?'gd':pp.level==='忌'?'ca':'ne'}">${pp.name}</span>`).join('');}).catch(()=>{});
});

function renderChart(){
    if(!astrolabe)return;
    const palaces=typeof astrolabe.palaces==='function'?astrolabe.palaces():Array.isArray(astrolabe.palaces)?astrolabe.palaces:[];
    const soulBr=astrolabe.earthlyBranchOfSoulPalace,bodyBr=astrolabe.earthlyBranchOfBodyPalace;
    const fec=astrolabe.fiveElementsClass;const scope=$('horo-scope').value;
    let horoscope=null;if(scope!=='origin')try{horoscope=astrolabe.horoscope(new Date(),parseInt($('h').value)||1);}catch(e){}

    const W=640,H=640,pad=10,cellW=(W-2*pad)/4,cellH=(H-2*pad)/4;
    const GRID={'巳':[0,0],'午':[1,0],'未':[2,0],'申':[3,0],'辰':[0,1],'酉':[3,1],'卯':[0,2],'戌':[3,2],'寅':[0,3],'丑':[1,3],'子':[2,3],'亥':[3,3]};
    const siHua=[];for(const p of palaces)for(const s of[...p.majorStars,...p.minorStars])if(s.mutagen)siHua.push({star:s.name,hua:s.mutagen,palace:p.name});
    const sfSet=new Set();if(selectedPalace!=null){const br=palaces[selectedPalace]?.earthlyBranch;if(br){const BR=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];const i=BR.indexOf(br);if(i>=0){sfSet.add(br);sfSet.add(BR[(i+6)%12]);sfSet.add(BR[(i+4)%12]);sfSet.add(BR[(i+8)%12])}}}

    let svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">`;
    svg+=`<rect width="${W}" height="${H}" fill="#1e1e2c" rx="8"/>`;
    svg+=`<text x="${W/2}" y="20" text-anchor="middle" fill="#d4a843" font-size="13" font-weight="700">紫微斗数 · ${fec}</text>`;

    for(const p of palaces){
        const br=p.earthlyBranch;if(!br)continue;
        const pos=GRID[br];if(!pos)continue;
        const x=pad+pos[0]*cellW,y=pad+pos[1]*cellH;
        const isSoul=br===soulBr,isBody=br===bodyBr,isSF=sfSet.has(br),isSel=br===selectedPalace;
        const stroke=isSel?'#d4a843':isSF?'#64b5f6':isSoul?'#d4a843':isBody?'#7c4dff':'#3a3a4a';
        const sw=isSel?2.5:isSF||isSoul||isBody?2:1;
        const fill=isSel?'#252535':isSF?'#1f1f30':'#1e1e2c';

        svg+=`<rect id="cell-${br}" x="${x+1}" y="${y+1}" width="${cellW-2}" height="${cellH-2}" rx="3" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" style="cursor:pointer" onclick="document.getElementById('horo-result').click();selectPalace('${br}')"/>`;
        svg+=`<text x="${x+cellW/2}" y="${y+14}" text-anchor="middle" fill="#aaa" font-size="13" font-weight="800" style="pointer-events:none">${br}</text>`;
        svg+=`<text x="${x+cellW/2}" y="${y+cellH-5}" text-anchor="middle" fill="${isSoul?'#c62828':'#888'}" font-size="8" font-weight="600" style="pointer-events:none">${p.name}</text>`;
        if(isSoul)svg+=`<text x="${x+cellW-6}" y="${y+9}" text-anchor="end" fill="#d4a843" font-size="7" font-weight="700" style="pointer-events:none">命</text>`;
        if(isBody)svg+=`<text x="${x+cellW-6}" y="${y+16}" text-anchor="end" fill="#7c4dff" font-size="7" font-weight="700" style="pointer-events:none">身</text>`;

        let sy=y+26;
        for(const s of p.majorStars){
            const clr=s.type==='major'?'#d4a843':s.type==='soft'?'#ce93d8':s.type==='tough'?'#5a5a6e':'#888';
            svg+=`<text x="${x+cellW/2}" y="${sy}" text-anchor="middle" fill="${clr}" font-size="9" font-weight="${s.type==='major'?600:400}" style="cursor:pointer" onclick="event.stopPropagation()">${s.name}`;
            if(s.brightness)svg+=`<tspan fill="${s.brightness==='庙'?'#d4a843':s.brightness==='旺'?'#e8a860':s.brightness==='陷'?'#c62828':'#888'}" font-size="6">${s.brightness}</tspan>`;
            if(s.mutagen){const hc={'禄':'#2e7d32','权':'#7b1fa2','科':'#1565c0','忌':'#c62828'};svg+=`<tspan fill="${hc[s.mutagen]||'#888'}" font-size="7">◈</tspan>`}
            svg+=`</text>`;sy+=11;
        }
        for(const s of (p.minorStars||[]).slice(0,4)){
            svg+=`<text x="${x+cellW/2}" y="${sy}" text-anchor="middle" fill="${s.type==='soft'?'#ce93d8':s.type==='tough'?'#5a5a6e':'#888'}" font-size="7">${s.name}</text>`;sy+=9;
        }
        // 运限标记
        if(horoscope){
            let fy=y+cellH-18;
            if(horoscope.decadal?.index===p.getIndex?.()||horoscope.decadal?.index===palaces.indexOf(p)){svg+=`<text x="${x+4}" y="${fy}" fill="#4a9eff" font-size="6">大限</text>`;fy+=7}
            if(horoscope.yearly?.index===p.getIndex?.()||horoscope.yearly?.index===palaces.indexOf(p)){svg+=`<text x="${x+4}" y="${fy}" fill="#5cb85c" font-size="6">流年</text>`}
        }
    }
    // 中心
    const cx=pad+cellW,cy=pad+cellH,cw=cellW*2,ch=cellH*2;
    svg+=`<rect x="${cx+1}" y="${cy+1}" width="${cw-2}" height="${ch-2}" rx="3" fill="#1e1e2c" stroke="#3a3a4a"/>`;
    svg+=`<text x="${cx+cw/2}" y="${cy+30}" text-anchor="middle" fill="#d4a843" font-size="11" font-weight="700">紫微斗数</text>`;
    svg+=`<text x="${cx+cw/2}" y="${cy+48}" text-anchor="middle" fill="#888" font-size="8">${fec} · 命宫: ${soulBr} / 身宫: ${bodyBr}</text>`;
    svg+=`<text x="${cx+cw/2}" y="${cy+66}" text-anchor="middle" fill="#d4a843" font-size="8">${siHua.map(s=>s.star+'化'+s.hua).join(' · ')}</text>`;
    sfSet.clear();if(selectedPalace!=null){const sp=palaces[selectedPalace];if(sp){svg+=`<text x="${cx+cw/2}" y="${cy+84}" text-anchor="middle" fill="#64b5f6" font-size="7.5">${sp.name} · 对宫 · 三合</text>`;svg+=`<text x="${cx+cw/2}" y="${cy+96}" text-anchor="middle" fill="#888" font-size="7">${[...sp.majorStars.map(s=>s.name),...sp.minorStars.slice(0,3).map(s=>s.name)].join('·')||'空宫'}</text>`}}
    svg+='</svg>';
    $('zw-chart').innerHTML=svg;
}

function selectPalace(br){selectedPalace=(selectedPalace===br)?null:br;renderChart()}
$('horo-scope').addEventListener('change',()=>renderChart());

function toggleFlyStars(){
    if(!astrolabe)return;const el=$('flystar-panel');
    if(!el.classList.contains('hidden')){el.classList.add('hidden');return}el.classList.remove('hidden');
    const palaces=typeof astrolabe.palaces==='function'?astrolabe.palaces():Array.isArray(astrolabe.palaces)?astrolabe.palaces:[];
    let html='<div style="font-weight:700;color:#d4a843;margin-bottom:6px">✈️ 十二宫飞星全览</div>';
    for(const p of palaces){const gan=p.heavenlyStem;const fly=GAN_SIHUA[gan];if(!fly)continue;let items=[];for(const[mu,sn]of Object.entries(fly)){let tgt='?';for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===sn){tgt=pp.name;break}items.push(`<span style="color:${mu==='禄'?'#2e7d32':mu==='权'?'#7b1fa2':mu==='科'?'#1565c0':'#c62828'}">化${mu}→${tgt}</span>`)}html+=`<div style="padding:2px 6px;border-left:2px solid #d4a843;margin-bottom:3px;font-size:.85em"><b style="color:#d4a843">${p.name}</b>(${gan}): ${items.join('·')}</div>`}
    el.innerHTML=html;
}

$('btn-analyze').addEventListener('click',async()=>{
    if(!astrolabe)return;$('btn-analyze').disabled=true;$('btn-analyze').textContent='⏳...';$('analysis-section').classList.remove('hidden');$('analysis-content').innerHTML='<p style="color:#888">AI解读中...</p>';
    const palaces=typeof astrolabe.palaces==='function'?astrolabe.palaces():Array.isArray(astrolabe.palaces)?astrolabe.palaces:[];
    const plateData={input:{birth_datetime:`${$('y').value}-${$('m').value}-${$('d').value} ${$('h').value}:${$('min').value}`,gender:$('g').value},five_elements_class:astrolabe.fiveElementsClass,soul_palace:astrolabe.earthlyBranchOfSoulPalace,body_palace:astrolabe.earthlyBranchOfBodyPalace,palaces:[],year_mutagens:[],patterns:[]};
    for(const pp of palaces){plateData.palaces.push({name:pp.name,dizhi:pp.heavenlyStem+pp.earthlyBranch,earthly_branch:pp.earthlyBranch,major_stars:pp.majorStars.map(s=>({name:s.name,type:s.type,brightness:s.brightness||''})),minor_stars:pp.minorStars.map(s=>({name:s.name,type:s.type})),mutagens:[],decadal_range:'',decadal_dizhi:'',tags:[],is_empty:!pp.majorStars.length,grid_row:0,grid_col:0,index:0});for(const s of[...pp.majorStars,...pp.minorStars])if(s.mutagen)plateData.year_mutagens.push({star:s.name,mutagen:'化'+s.mutagen,palace:pp.name,branch:pp.earthlyBranch})}
    try{const r=await fetch('/api/ziwei/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plate:plateData})});const d=await r.json();if(!d.success){$('analysis-content').innerHTML='<p style="color:#ef5350">分析失败</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='🧠 重试';return}$('analysis-content').innerHTML=formatCards(d.analysis);$('btn-analyze').textContent='🔄 重新解读';$('btn-analyze').disabled=false}catch(e){$('analysis-content').innerHTML='<p style="color:#ef5350">网络错误</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='🧠 重试'}
});
function formatCards(t){t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const p=t.split(/^## /gm);if(p.length<2)return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');let h='';for(let i=1;i<p.length;i++){const l=p[i].split('\n');h+=`<div class="a-card"><h2>${l[0].trim()}</h2><div class="body">${l.slice(1).join('\n').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')}</div></div>`}return h}
</script>
</body>
</html>
