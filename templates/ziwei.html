<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘</title>
<script>(function(){var t=localStorage.getItem('bazi_theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')})()</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--card-bg:#fff;--text:#000;--text-muted:#666;--accent:#000;--primary:#000;--primary-hover:#333;--border:#ccc;--border-light:#e5e5e5;--shadow-sm:0 0 0 1px rgba(0,0,0,.04);--shadow-lg:0 2px 16px rgba(0,0,0,.08);--gold:#000;--radius:18px;--radius-sm:12px}
[data-theme="dark"]{--bg:#1a1a2e;--card-bg:#16213e;--text:#e0e0e0;--text-muted:#999;--accent:#d4a843;--primary:#d4a843;--primary-hover:#e8c860;--border:#444;--border-light:#2a2a3e;--shadow-sm:0 0 0 1px rgba(255,255,255,.03);--shadow-lg:0 2px 16px rgba(0,0,0,.3);--gold:#d4a843}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.hidden{display:none!important}
.app-layout{display:flex;min-height:100vh}
.app-sidebar{width:400px;min-width:400px;flex-shrink:0;background:linear-gradient(180deg,rgba(212,168,67,.03),rgba(255,255,255,0) 40%);border-right:1px solid var(--border-light);padding:32px 28px 80px;position:sticky;top:0;height:100vh;overflow-y:auto}
.app-sidebar .app-header{text-align:left;padding:0 0 14px}
.app-sidebar .app-header h1{font-size:1.5rem;margin-bottom:2px;cursor:pointer}
.app-sidebar .subtitle{font-size:.7em;color:#999}
.app-main{flex:1;min-width:0;padding:40px 48px 80px;overflow-y:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:var(--card-bg);color:var(--text);font-size:.82em;font-weight:500;cursor:pointer;white-space:nowrap}.btn:hover{opacity:.85}
.btn-gold{background:linear-gradient(135deg,#d4a843,#b8860b);color:#fff;border:none}
.quick{flex:1;padding:10px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-size:1.1em;font-family:monospace;letter-spacing:3px;text-align:center;outline:none}.quick:focus{border-color:#d4a843;border-style:solid}
.quick-hint{color:#666;font-size:.72em;white-space:nowrap}
.radio-group{display:flex;gap:12px}.radio-label{display:flex;align-items:center;gap:4px;font-size:.82em;cursor:pointer}
.sticky-actions{position:fixed;bottom:0;left:0;width:400px;background:var(--card-bg);padding:12px 28px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border-light);z-index:10;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
[data-theme="dark"] .sticky-actions{box-shadow:0 -4px 16px rgba(0,0,0,.3)}
.sticky-actions .btn{flex:1;justify-content:center;font-size:.82em;padding:8px 14px}
.floating-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 16px;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm)}
.floating-bar .bar-title{font-weight:700;font-size:.88em;color:var(--accent)}
.chart-wrapper{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.chart-wrapper svg{width:100%;height:auto;max-width:780px;display:block;margin:0 auto}
.analysis-content{font-size:.9rem;line-height:1.85;color:var(--text)}
.a-card{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.a-card h2{font-size:.85em;font-weight:600;color:#8b6914;margin-bottom:10px}[data-theme="dark"] .a-card h2{color:var(--accent)}
.a-card .body{font-size:.9rem;line-height:1.85;color:var(--text)}.a-card .body strong{color:var(--accent)}
.loading{text-align:center;padding:60px;color:var(--text-muted)}.spinner{width:32px;height:32px;margin:0 auto 12px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes blink{50%{opacity:0}}
.pattern-row{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}.pat-badge{padding:3px 10px;border-radius:12px;font-size:.7em;font-weight:600}.pat-ex{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff;font-size:.75em}.pat-gd{background:rgba(46,125,50,.12);color:#2e7d32;border:1px solid rgba(46,125,50,.2);font-size:.72em}.pat-ne{background:rgba(120,120,120,.06);color:var(--text-muted);font-size:.68em}.pat-ca{background:rgba(198,40,40,.12);color:#ef5350;border:1px solid rgba(198,40,40,.2);font-size:.72em}
@media(max-width:860px){.app-layout{flex-direction:column}.app-sidebar{width:100%;min-width:0;height:auto;position:static;border-right:none;padding:20px 16px 16px}.app-main{padding:20px 16px 80px}.sticky-actions{width:100%}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="app-sidebar">
    <header class="app-header">
        <h1 onclick="location='/'">紫微斗数 <button id="btn-theme" onclick="toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;line-height:1;vertical-align:middle;margin-left:4px">🌙</button></h1>
        <p class="subtitle">iztro JS 原版引擎 · 命盘解读</p>
    </header>
    <section style="padding:0 0 40px">
        <input type="text" id="quick" class="quick" maxlength="12" inputmode="numeric" placeholder="200508190135" style="width:100%;margin-bottom:8px">
        <p class="quick-hint" style="margin-bottom:14px">快捷输入 200508190135 → 自动填表</p>
        <div style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);overflow:visible;margin-bottom:10px">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent)">历法</span>
                <div class="radio-group"><label class="radio-label"><input type="radio" name="cal" value="solar" checked> 公历</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="cal" value="lunar"> 农历</label></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">年</label><input type="number" id="y" value="1991" min="1900" max="2100" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">月</label><input type="number" id="m" value="8" min="1" max="12" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">日</label><input type="number" id="d" value="15" min="1" max="31" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">时</label><input type="number" id="h" value="1" min="0" max="23" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">分</label><input type="number" id="min" value="0" min="0" max="59" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="padding:14px 16px;display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent)">性别</span>
                <div class="radio-group"><label class="radio-label"><input type="radio" name="g" value="男" checked> 男</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="g" value="女"> 女</label></div>
            </div>
        </div>
        <label class="radio-label" style="margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:.9em;font-weight:600;color:var(--accent)"><input type="checkbox" id="use-true-solar" style="width:18px;height:18px"> ⏱ 真太阳时校正</label>
        <p style="font-size:.72em;color:var(--text-muted);margin-bottom:8px">北京时间以120°E为基准，出生地经度不同会产生时间偏移，可能跨越时辰分界线改变命盘。</p>
        <div id="solar-info" style="display:none;font-size:.8em;color:var(--accent);margin-bottom:8px;line-height:1.6"></div>
        <div id="solar-row" style="display:none;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);margin-bottom:10px;position:relative">
            <div style="padding:14px 16px">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
                    <span style="font-weight:600;font-size:.82em;color:var(--accent);min-width:32px">经度</span>
                    <input type="number" id="longitude" step="0.01" placeholder="120" value="120" style="flex:1;border:1px solid var(--border-light);border-radius:6px;padding:7px 10px;font-size:.88em;background:var(--bg);color:var(--text);outline:none">
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-weight:600;font-size:.82em;color:var(--accent);min-width:32px">出生地</span>
                    <div style="flex:1;position:relative">
                        <input type="text" id="location" placeholder="城市名，如：东莞" autocomplete="off" style="width:100%;border:1px solid var(--border-light);border-radius:6px;padding:7px 10px;font-size:.88em;background:var(--bg);color:var(--text);outline:none">
                    </div>
                    <button id="btn-geocode" class="btn" style="font-size:.78em;padding:5px 12px;border-radius:6px;flex-shrink:0" onclick="geocodeCity()">🔍 定位</button>
                </div>
            </div>
            <div id="geocode-status" style="display:none;padding:4px 16px 10px;font-size:.74em;color:#4caf50"></div>
        </div>
    </section>
    <div style="margin-top:auto;padding:12px 0;border-top:1px solid var(--border-light)">
            <details id="session-details"><summary style="cursor:pointer;font-size:.78em;color:var(--text-muted);margin-bottom:8px">💬 会话记录 (<span id="session-count">0</span>)</summary>
            <div id="session-list" style="max-height:200px;overflow-y:auto;font-size:.74em"></div>
            </details>
        </div>
    <div class="sticky-actions">
        <button id="btn-render" class="btn btn-gold">🔮 排盘</button>
        <button id="btn-analyze" class="btn btn-gold" disabled>🧠 AI 解读</button>
    </div>
</aside>
<main class="app-main">
    <section id="welcome-section"><div style="text-align:center;padding:120px 40px;color:var(--text-muted)"><div style="font-size:3em;margin-bottom:16px">🔮</div><p style="font-size:1em;margin-bottom:8px">输入出生信息，点击「排盘」开始分析</p><p style="font-size:.75em">iztro JS 原版引擎 · 紫微斗数命盘解读</p></div></section>
    <section id="loading-section" class="hidden"><div class="loading"><div class="spinner"></div><p>紫微排盘中...</p></div></section>
    <section id="chart-section" class="hidden">
        <div class="floating-bar"><span class="bar-title">🔮 紫微命盘</span>
            <span style="font-size:.72em;color:var(--text-muted)">运限:</span>
            <input type="number" id="horo-year" value="2026" min="1900" max="2100" style="width:60px;padding:3px 4px;font-size:.68em;border:1px solid var(--border);border-radius:4px;background:var(--card-bg);color:var(--text)" onchange="if(astrolabe&&activeScopes.size>0){fetchLiuyao();renderChart()}">
            <button id="btn-decadal" class="btn" style="font-size:.68em;padding:3px 8px" onclick="toggleScope('decadal')">大限</button>
            <button id="btn-yearly" class="btn" style="font-size:.68em;padding:3px 8px" onclick="toggleScope('yearly')">流年</button>
            <button id="btn-monthly" class="btn" style="font-size:.68em;padding:3px 8px" onclick="toggleScope('monthly')">流月</button>
            <button id="btn-daily" class="btn" style="font-size:.68em;padding:3px 8px" onclick="toggleScope('daily')">流日</button>
            <button id="btn-flystar" class="btn" style="font-size:.7em;padding:3px 10px" onclick="toggleFlyStars()">✈️ 飞星</button>
            <span id="horo-result" style="font-size:.7em;color:var(--accent)"></span>
            <div class="pattern-row" id="patterns"></div>
        </div>
        <div id="flystar-panel" class="hidden" style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;font-size:.74em;max-height:260px;overflow-y:auto"></div>
        <div class="chart-wrapper" id="zw-chart"></div>
        <div id="star-detail" class="hidden" style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:16px;margin-bottom:14px;font-size:.8em;line-height:1.7"></div>
        <div id="decadal-panel" style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px 18px;margin-top:14px;font-size:.78em"></div>
    </section>
    <section id="analysis-section" class="hidden">
        <div class="floating-bar"><span class="bar-title">📜 命盘解读</span></div>
        <div id="analysis-content" class="analysis-content"></div>
        <div id="chat-section" style="margin-top:14px">
            <div class="floating-bar"><span class="bar-title">💬 追问</span></div>
            <div id="chat-messages" style="margin-bottom:10px"></div>
            <div style="display:flex;gap:8px">
                <textarea id="chat-input" rows="2" placeholder="追问Agent，例如：我今年换工作合适吗？财运怎么样？" style="flex:1;padding:10px;border:1px solid var(--border-light);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-size:.85em;resize:none;outline:none"></textarea>
                <button id="btn-chat-send" class="btn btn-gold" style="align-self:flex-end;flex-shrink:0" onclick="sendChat()">发送</button>
            </div>
        </div>
    </section>
</main>
</div>
<div id="pw-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center">
    <div style="background:var(--card-bg);border-radius:14px;padding:28px;width:340px;max-width:90vw;text-align:center">
        <h3 style="margin-bottom:8px;color:var(--accent)">🔐 深度分析需要密码</h3>
        <p style="font-size:.8em;color:var(--text-muted);margin-bottom:16px">API 调用成本较高，请向管理员获取密码</p>
        <input type="password" id="pw-input" placeholder="请输入密码" style="width:100%;padding:10px;font-size:.9em;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;background:var(--bg);color:var(--text)">
        <div id="pw-error" style="color:#ef5350;font-size:.78em;margin-bottom:8px"></div>
        <div style="display:flex;gap:8px"><button id="btn-pw-cancel" class="btn" style="flex:1">取消</button><button id="btn-pw-confirm" class="btn btn-gold" style="flex:1">确认</button></div>
    </div>
</div>
<div id="city-suggestions" style="display:none;position:fixed;z-index:99999;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;max-height:280px;overflow-y:auto;font-size:.82em;line-height:1.8;box-shadow:0 4px 24px rgba(0,0,0,.35)"></div>
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js" defer></script>
<script>
const $=id=>document.getElementById(id);
let astrolabe=null,plateData=null,selectedPalace=null,activeStem=null;
const activeScopes=new Set(); // 'decadal','yearly','monthly','daily'

// Theme
(function(){const t=localStorage.getItem('bazi_theme');$('btn-theme').textContent=t==='dark'?'☀️':'🌙'})();
function toggleTheme(){const n=document.documentElement.getAttribute('data-theme')==='dark'?'':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('bazi_theme',n);$('btn-theme').textContent=n==='dark'?'☀️':'🌙';if(astrolabe)renderChart()}

// Quick input
$('quick').addEventListener('input',function(){const v=this.value.replace(/\D/g,'');if(v.length<8)return;$('y').value=v.slice(0,4);$('m').value=parseInt(v.slice(4,6));$('d').value=parseInt(v.slice(6,8));if(v.length>=10)$('h').value=parseInt(v.slice(8,10));if(v.length>=12)$('min').value=parseInt(v.slice(10,12))});
$('quick').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-render').click()});

// Form data
function getB(){const c=document.querySelector('input[name="cal"]:checked')?.value||'solar';const g=document.querySelector('input[name="g"]:checked')?.value||'男';return{y:parseInt($('y').value),m:parseInt($('m').value),d:parseInt($('d').value),h:parseInt($('h').value),min:parseInt($('min').value||'0'),gender:g,cal:c}}

// True solar time
function getAdjustedHour(h,min,lng){const o=Math.round((lng-120)*4);let t=h*60+min+o;if(t<0)t+=1440;if(t>=1440)t-=1440;return{hour:Math.floor(t/60),minute:Math.round(t%60),offset:o}}
function updateSolarInfo(){if(!$('use-true-solar').checked){$('solar-info').style.display='none';return}const h=parseInt($('h').value)||0,m=parseInt($('min').value)||0,lng=parseFloat($('longitude').value)||120;const adj=getAdjustedHour(h,m,lng);const shi=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];const oi=Math.floor((h+1)/2)%12,ai=Math.floor((adj.hour+1)/2)%12;$('solar-info').style.display='block';$('solar-info').textContent='校正: '+h+':'+String(m).padStart(2,'0')+' ('+shi[oi]+'时) → '+adj.hour+':'+String(adj.minute).padStart(2,'0')+' ('+shi[ai]+'时) · '+(adj.offset>0?'提前':'推后')+Math.abs(adj.offset)+'分钟'}
$('use-true-solar').addEventListener('change',function(){$('solar-row').style.display=this.checked?'block':'none';$('solar-info').style.display=this.checked?'block':'none';if(this.checked)updateSolarInfo()});
['longitude','h','min'].forEach(id=>$(id).addEventListener('input',()=>{if($('use-true-solar').checked)updateSolarInfo()}));

// City autocomplete (on body)
$('location').addEventListener('input',function(){const v=this.value.trim();if(v.length<1){$('city-suggestions').style.display='none';return}fetch('/api/cities?q='+encodeURIComponent(v)).then(r=>r.json()).then(d=>{const cities=d.results||d;if(!cities||!cities.length){$('city-suggestions').style.display='none';return}$('city-suggestions').innerHTML=cities.slice(0,8).map(c=>'<div class="city-opt" style="padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border-light);font-size:1em" data-lon="'+c.lon.toFixed(2)+'" data-name="'+c.display_name.split('，')[0]+'">'+c.display_name+' ('+c.lon.toFixed(2)+'°)</div>').join('');var rect=this.getBoundingClientRect();$('city-suggestions').style.cssText='display:block;position:fixed;top:'+(rect.bottom+2)+'px;left:'+rect.left+'px;width:'+rect.width+'px;z-index:99999;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;max-height:280px;overflow-y:auto;font-size:.82em;line-height:1.8;box-shadow:0 4px 24px rgba(0,0,0,.35)'})});
$('city-suggestions').addEventListener('mousedown',function(e){const d=e.target.closest('.city-opt');if(d){$('location').value=d.dataset.name;$('longitude').value=d.dataset.lon;$('geocode-status').style.display='block';$('geocode-status').textContent='已定位: '+d.dataset.name+' · 经度 '+d.dataset.lon+'°E';$('city-suggestions').style.display='none';updateSolarInfo()}});
document.addEventListener('click',function(e){if(!e.target.closest('#location')&&!e.target.closest('#city-suggestions'))$('city-suggestions').style.display='none'});

async function geocodeCity(){const loc=$('location').value.trim();if(!loc)return;const btn=$('btn-geocode');btn.disabled=true;try{const r=await fetch('/api/geocode?q='+encodeURIComponent(loc));const d=await r.json();if(d.error){$('geocode-status').style.display='block';$('geocode-status').textContent='未找到该地点';return}const c=d.results?d.results[0]:null;if(!c){$('geocode-status').style.display='block';$('geocode-status').textContent='未找到该地点';return}$('longitude').value=c.lon.toFixed(2);$('location').value=c.display_name.split('，')[0];$('geocode-status').style.display='block';$('geocode-status').textContent='已定位: '+c.display_name+' · 经度 '+c.lon.toFixed(2)+'°E';updateSolarInfo()}catch(e){$('geocode-status').style.display='block';$('geocode-status').textContent='网络错误'}finally{btn.disabled=false}}

// Paipan
$('btn-render').addEventListener('click',()=>{
    const b=getB();if(!b.y||!b.m||!b.d)return;
    liuyaoCache=null;activeStem=null;selectedPalace=null;activeScopes.clear();
    $('welcome-section').classList.add('hidden');$('loading-section').classList.remove('hidden');$('chart-section').classList.add('hidden');$('analysis-section').classList.add('hidden');
    let hh=b.h,mm=b.min;if($('use-true-solar').checked){const lng=parseFloat($('longitude').value)||120;const adj=getAdjustedHour(b.h,b.min,lng);hh=adj.hour;mm=adj.minute}
    const hi=Math.floor((hh+1)/2)%12;
    try{astrolabe=b.cal==='lunar'?iztro.astro.byLunar(b.y+'-'+b.m+'-'+b.d,hi,b.gender,false,true,'zh-CN'):iztro.astro.bySolar(b.y+'-'+b.m+'-'+b.d,hi,b.gender,true,'zh-CN')}
    catch(e){$('loading-section').innerHTML='<p style="color:#ef5350;text-align:center;padding:60px">排盘失败: '+e.message+'</p>';return}
    try{renderChart()}catch(e){$('loading-section').innerHTML='<p style="color:#ef5350;text-align:center;padding:60px">渲染失败: '+e.message+'</p>';return}
    $('loading-section').classList.add('hidden');$('chart-section').classList.remove('hidden');$('btn-analyze').disabled=false;
    fetch('/api/ziwei/paipan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:b.y,month:b.m,day:b.d,hour:hh,minute:mm,gender:b.gender,is_lunar:b.cal==='lunar',longitude:parseFloat($('longitude').value)||120,location:$('location').value||''})}).then(r=>r.json()).then(d=>{plateData=d;$('patterns').innerHTML=(d.patterns||[]).map(pp=>{const lv=pp.level||'中';const pre=lv==='上吉'?'⭐ ':lv==='吉'?'✅ ':lv==='忌'?'⚠️ ':'';return'<span class="pat-badge pat-'+(lv==='上吉'?'ex':lv==='吉'?'gd':lv==='忌'?'ca':'ne')+'" title="'+(pp.desc||'')+'">'+pre+pp.name+'</span>'}).join('')}).catch(()=>{});
});

// Horoscope scope toggle (independent, can stack)
let liuyaoCache=null;
function fetchLiuyao(){
    if(!astrolabe)return;
    const b=getB(),ty=parseInt($('horo-year').value)||new Date().getFullYear();
    fetch('/api/ziwei/horoscope',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:b.y,month:b.m,day:b.d,hour:b.h,minute:b.min,gender:b.gender,target_year:ty})}).then(r=>r.json()).then(d=>{liuyaoCache=d;renderChart()}).catch(()=>{});
}
function toggleScope(scope){
    if(activeScopes.has(scope))activeScopes.delete(scope);else activeScopes.add(scope);
    ['decadal','yearly','monthly','daily'].forEach(s=>{const btn=$('btn-'+s);if(btn)btn.style.cssText=activeScopes.has(s)?'font-size:.68em;padding:3px 8px;border:1px solid var(--accent);border-radius:6px;background:rgba(212,168,67,.12);color:var(--accent);font-weight:600':'font-size:.68em;padding:3px 8px'});
    renderChart();
    if(activeScopes.size>0)fetchLiuyao();
}

// GAN_SIHUA table
const GAN_SIHUA={甲:{禄:'廉贞',权:'破军',科:'武曲',忌:'太阳'},乙:{禄:'天机',权:'天梁',科:'紫微',忌:'太阴'},丙:{禄:'天同',权:'天机',科:'文昌',忌:'廉贞'},丁:{禄:'太阴',权:'天同',科:'天机',忌:'巨门'},戊:{禄:'贪狼',权:'太阴',科:'右弼',忌:'天机'},己:{禄:'武曲',权:'贪狼',科:'天梁',忌:'文曲'},庚:{禄:'太阳',权:'武曲',科:'太阴',忌:'天同'},辛:{禄:'巨门',权:'太阳',科:'文曲',忌:'文昌'},壬:{禄:'天梁',权:'紫微',科:'左辅',忌:'武曲'},癸:{禄:'破军',权:'巨门',科:'太阴',忌:'贪狼'}};

// Fly star panel
function toggleFlyStars(){if(!astrolabe)return;const el=$('flystar-panel');if(!el.classList.contains('hidden')){el.classList.add('hidden');return}el.classList.remove('hidden');const palaces=Array.isArray(astrolabe.palaces)?astrolabe.palaces:typeof astrolabe.palaces==='function'?astrolabe.palaces():[];let h='<div style="font-weight:700;color:var(--accent);margin-bottom:6px">十二宫飞星</div>';for(const p of palaces){const gan=p.heavenlyStem;const fly=GAN_SIHUA[gan];if(!fly)continue;let items=[];for(const[mu,sn]of Object.entries(fly)){let t='?';for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===sn){t=pp.name;break}items.push('<span style="color:'+(mu==='禄'?'#2e7d32':mu==='权'?'#7b1fa2':mu==='科'?'#1565c0':'#c62828')+'">化'+mu+'→'+t+'</span>')}h+='<div style="padding:2px 6px;border-left:2px solid var(--accent);margin-bottom:3px;font-size:.85em"><b style="color:var(--accent)">'+p.name+'</b>('+gan+'): '+items.join(' · ')+'</div>'}el.innerHTML=h}

function toggleStem(stem){activeStem=(activeStem===stem)?null:stem;renderChart()}

// ═══ SVG Render ═══
function renderChart(){
    if(!astrolabe)return;
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    const S={bg:isDark?'#19192b':'#f8f8fa',cell:isDark?'#1a1a2e':'#fff',border:isDark?'#555':'#bbb',text:isDark?'#999':'#777',gold:'#d4a843'};
    const palaces=Array.isArray(astrolabe.palaces)?astrolabe.palaces:typeof astrolabe.palaces==='function'?astrolabe.palaces():[];
    const soulBr=astrolabe.earthlyBranchOfSoulPalace,bodyBr=astrolabe.earthlyBranchOfBodyPalace,fec=astrolabe.fiveElementsClass;
    let horoscope=null;
    if(activeScopes.size>0)try{const hy=parseInt($('horo-year').value)||new Date().getFullYear();horoscope=astrolabe.horoscope(hy+'-07-01',parseInt($('h').value)||1)}catch(e){}
    const siHua=[];for(const p of palaces)for(const s of[...p.majorStars,...p.minorStars])if(s.mutagen)siHua.push({star:s.name,hua:s.mutagen,palace:p.name});

    const W=780,H=960,pad=14,cellW=(W-2*pad)/4,cellH=(H-2*pad-24)/4;
    const GRID={'巳':[0,0],'午':[1,0],'未':[2,0],'申':[3,0],'辰':[0,1],'酉':[3,1],'卯':[0,2],'戌':[3,2],'寅':[0,3],'丑':[1,3],'子':[2,3],'亥':[3,3]};
    const BR=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const sfSet=new Set();if(selectedPalace){const i=BR.indexOf(selectedPalace);if(i>=0){sfSet.add(selectedPalace);sfSet.add(BR[(i+6)%12]);sfSet.add(BR[(i+4)%12]);sfSet.add(BR[(i+8)%12])}}

    let svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'">';
    svg+='<rect width="'+W+'" height="'+H+'" fill="'+S.bg+'" rx="8"/>';
    svg+='<text x="'+W/2+'" y="24" text-anchor="middle" fill="#d4a843" font-size="18" font-weight="700">紫微斗数 · '+fec+'</text>';

    for(const p of palaces){
        const br=p.earthlyBranch,st=p.heavenlyStem;if(!br)continue;const pos=GRID[br];if(!pos)continue;
        const x=pad+pos[0]*cellW,y=pad+pos[1]*cellH+34;
        const isSoul=br===soulBr,isBody=br===bodyBr,isSF=sfSet.has(br),isSel=br===selectedPalace;
        const stroke=isSel?'#d4a843':isSF?'#64b5f6':isSoul?'#d4a843':isBody?'#7c4dff':'#999';
        svg+='<rect x="'+(x+1)+'" y="'+(y+1)+'" width="'+(cellW-2)+'" height="'+(cellH-2)+'" rx="4" fill="'+S.cell+'" stroke="'+stroke+'" stroke-width="'+(isSel?2.5:isSF||isSoul||isBody?2:1)+'" style="cursor:pointer" onclick="selectPalace(\''+br+'\')"/>';
        svg+='<text x="'+(x+cellW/2)+'" y="'+(y+16)+'" text-anchor="middle" fill="#888" font-size="18" font-weight="800" style="pointer-events:none">'+br+'</text>';
        svg+='<text x="'+(x+cellW/2)+'" y="'+(y+cellH-4)+'" text-anchor="middle" fill="'+(isSoul?'#c62828':'#888')+'" font-size="11" font-weight="600" style="pointer-events:none">'+p.name+'</text>';
        // 宫干 (点击触飞化线)
        var gzCls=activeStem===st?'font-weight:700;fill:#d4a843':'fill:#d4a843';
        svg+='<text x="'+(x+cellW-6)+'" y="'+(y+cellH-12)+'" text-anchor="end" style="cursor:pointer;'+gzCls+'" font-size="9" onclick="event.stopPropagation();toggleStem(\''+st+'\')">'+st+br+'</text>';
        if(isSoul)svg+='<text x="'+(x+cellW-6)+'" y="'+(y+12)+'" text-anchor="end" fill="#d4a843" font-size="10" font-weight="700" style="pointer-events:none">命</text>';
        if(isBody)svg+='<text x="'+(x+cellW-6)+'" y="'+(y+22)+'" text-anchor="end" fill="#7c4dff" font-size="10" font-weight="700" style="pointer-events:none">身</text>';

        let sy=y+30;
        // 主星
        for(const s of p.majorStars){
            const clr=s.type==='major'?'#d4a843':'#ce93d8';
            svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="'+clr+'" font-size="12" font-weight="600" style="cursor:pointer" onclick="event.stopPropagation();showStarDetail(\''+s.name+'\')">'+s.name;
            if(s.brightness)svg+='<tspan fill="'+(s.brightness==='庙'?'#d4a843':s.brightness==='旺'?'#e8a860':s.brightness==='陷'?'#c62828':'#888')+'" font-size="9">'+s.brightness+'</tspan>';
            if(s.mutagen){const hc={'禄':'#2e7d32','权':'#7b1fa2','科':'#1565c0','忌':'#c62828'};svg+='<tspan fill="'+hc[s.mutagen]+'" font-size="9">◈</tspan>'}
            // 自化标记：本宫天干四化包含此星
            if(st&&GAN_SIHUA[st]){const selfMu=Object.entries(GAN_SIHUA[st]).find(([mu,sn])=>sn===s.name);if(selfMu&&!s.mutagen){const hc={'禄':'#2e7d32','权':'#7b1fa2','科':'#1565c0','忌':'#c62828'};svg+='<tspan fill="'+hc[selfMu[0]]+'" font-size="8">自化'+selfMu[0]+'</tspan>'}}
            svg+='</text>';sy+=16;
        }
        const minors=p.minorStars||[];
        // 吉星
        const ausp=(p.minorStars||[]).filter(s=>s.type==='soft'||s.type==='tianma'||s.type==='lucun');
        if(ausp.length){svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#ce93d8" font-size="9">'+ausp.map(s=>s.name).join(' ')+'</text>';sy+=12}
        // 煞星 (红色可见)
        const sha=(p.minorStars||[]).filter(s=>s.type==='tough');
        if(sha.length){svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#ef5350" font-size="9">'+sha.map(s=>s.name).join(' ')+'</text>';sy+=12}
        // 运限流曜 (按scope分别显示 + 后端liuyao数据)
        if(horoscope||liuyaoCache){
            // CDN horoscope markers (decadal stars)
            if(horoscope&&activeScopes.has('decadal')&&horoscope.decadal&&horoscope.decadal.stars&&horoscope.decadal.stars[p.index]){
                const names=horoscope.decadal.stars[p.index].map(s=>s.name).join(' ');
                if(names){svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#4a9eff" font-size="7">'+names+'</text>';sy+=9}
            }
            // 后端流曜数据 (yearly流禄/流羊/流昌等)
            if(liuyaoCache&&activeScopes.has('yearly')){
                const ly=liuyaoCache.liuyao||{};let cellLy=[];
                for(const[k,v]of Object.entries(ly))if(v===p.name)cellLy.push(k.replace('流',''));
                if(cellLy.length){svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#5cb85c" font-size="7">'+cellLy.join(' ')+'</text>';sy+=9}
            }
        }
        // 十二长生
        const cs12=p.changsheng12||'',bs12=p.boshi12||'';
        if(cs12)svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="'+S.text+'" font-size="8">'+cs12+(bs12?' · '+bs12:'')+'</text>';sy+=9;
        // 运限标记
        let hy=y+cellH-16;
        if(horoscope){
            const marks=[{key:'decadal',label:'大限',color:'#4a9eff'},{key:'yearly',label:'流年',color:'#5cb85c'},{key:'monthly',label:'流月',color:'#f0ad4e'},{key:'daily',label:'流日',color:'#d4a843'}];
            for(const m of marks)if(activeScopes.has(m.key)&&horoscope[m.key]&&horoscope[m.key].index===p.index){svg+='<text x="'+(x+3)+'" y="'+hy+'" fill="'+m.color+'" font-size="9">'+m.label+'</text>';hy-=7}
        }
    }

    // 中心区
    const cx=pad+cellW,cy=pad+cellH+34,cw=cellW*2,ch=cellH*2;
    svg+='<rect x="'+(cx+1)+'" y="'+(cy+1)+'" width="'+(cw-2)+'" height="'+(ch-2)+'" rx="4" fill="'+S.cell+'" stroke="#999"/>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+32)+'" text-anchor="middle" fill="#d4a843" font-size="16" font-weight="700">紫微斗数</text>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+52)+'" text-anchor="middle" fill="'+S.text+'" font-size="10">'+fec+' · 命宫: '+soulBr+' / 身宫: '+bodyBr+'</text>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+70)+'" text-anchor="middle" fill="#d4a843" font-size="10">生年四化:</text>';
    const huaLabel={'禄':'◈','权':'▲','科':'◎','忌':'✕'},huaColor={'禄':'#2e7d32','权':'#7b1fa2','科':'#1565c0','忌':'#c62828'};
    let hy2=cy+84;
    for(const sh of siHua){svg+='<text x="'+(cx+cw/2)+'" y="'+hy2+'" text-anchor="middle" fill="'+huaColor[sh.hua]+'" font-size="9">'+(huaLabel[sh.hua]||'')+' '+sh.star+'化'+sh.hua+' → '+sh.palace+'</text>';hy2+=14}
    // 大限四化 (从后端liuyaoCache获取大限干支)
    if(activeScopes.has('decadal')&&liuyaoCache&&liuyaoCache.decadal_gz){
        const dGz=liuyaoCache.decadal_gz,dGan=dGz[0];
        if(dGan&&GAN_SIHUA[dGan]){
            const dFly=GAN_SIHUA[dGan];
            svg+='<text x="'+(cx+cw/2)+'" y="'+hy2+'" text-anchor="middle" fill="#4a9eff" font-size="9">大限 '+dGz+' 四化:</text>';hy2+=14;
            for(const[mu,sn]of Object.entries(dFly)){
                let tgtP='?';for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===sn){tgtP=pp.name;break}
                svg+='<text x="'+(cx+cw/2)+'" y="'+hy2+'" text-anchor="middle" fill="'+huaColor[mu]+'" font-size="8">'+(huaLabel[mu]||'')+' '+sn+' → '+tgtP+'</text>';hy2+=12;
            }
        }
    }

    // 飞化连线
    if(activeStem){
        const srcPalace=palaces.find(p=>p.heavenlyStem===activeStem);
        if(srcPalace){const fly=GAN_SIHUA[activeStem];if(fly){const srcBr=srcPalace.earthlyBranch;const sp=GRID[srcBr];if(sp){const sx=pad+sp[0]*cellW+cellW/2,sY=pad+sp[1]*cellH+34+cellH/2;
            const hc2={'禄':'#2e7d32','权':'#7b1fa2','科':'#1565c0','忌':'#c62828'};
            for(const[mu,sn]of Object.entries(fly)){let tp=null;for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===sn){tp=pp;break}if(tp){const tbr=tp.earthlyBranch,tp2=GRID[tbr];if(tp2){const tx=pad+tp2[0]*cellW+cellW/2,tY=pad+tp2[1]*cellH+34+cellH/2;
                svg+='<line x1="'+sx+'" y1="'+sY+'" x2="'+tx+'" y2="'+tY+'" stroke="'+hc2[mu]+'" stroke-width="2" opacity="0.7"/>';
                svg+='<circle cx="'+tx+'" cy="'+tY+'" r="3" fill="'+hc2[mu]+'"/>';
            }}}}
        }}
    }

    // 三方四正线
    if(selectedPalace){const si=BR.indexOf(selectedPalace);if(si>=0){const sp=GRID[selectedPalace];if(sp){const sX=pad+sp[0]*cellW+cellW/2,sY=pad+sp[1]*cellH+34+cellH/2;[BR[(si+4)%12],BR[(si+8)%12],BR[(si+6)%12]].forEach(sfb=>{const fp=GRID[sfb];if(fp){const tX=pad+fp[0]*cellW+cellW/2,tY=pad+fp[1]*cellH+34+cellH/2;svg+='<line x1="'+sX+'" y1="'+sY+'" x2="'+tX+'" y2="'+tY+'" stroke="#7c4dff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>'}})}}}
    svg+='</svg>';
    $('zw-chart').innerHTML=svg;

    // 大限面板
    const birthY=parseInt($('y').value)||1991,curAge=new Date().getFullYear()-birthY;
    let dp='<div style="font-weight:700;color:var(--accent);margin-bottom:8px">大限时间轴 (当前 '+curAge+'岁)</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    for(const p of palaces){const dec=p.decadal||p.stage||{};const dr=dec.range;if(!dr)continue;const isCur=curAge>=dr[0]&&curAge<=dr[1];dp+='<div style="padding:4px 10px;border:1px solid var(--border-light);border-radius:8px;font-size:.85em;'+(isCur?'background:rgba(212,168,67,.12);border-color:var(--accent);font-weight:700':'')+'"><span style="color:var(--accent)">'+(dec.heavenlyStem||'')+(dec.earthlyBranch||'')+'</span> '+p.name+' <span style="color:var(--text-muted)">'+dr[0]+'-'+dr[1]+'岁</span></div>'}
    $('decadal-panel').innerHTML=dp+'</div>';
}

function showStarDetail(name){
    if(!astrolabe||!name)return;const el=$('star-detail');
    try{const star=astrolabe.star(name);if(!star){el.classList.add('hidden');return}
        const palaces=star.palaces?star.palaces():[];const opp=star.oppositePalace?star.oppositePalace():null;
        const sf=star.surroundedPalaces?star.surroundedPalaces():[];const hasHua=star.hasMutagen?star.hasMutagen():null;
        const bright=star.isBright?star.isBright():undefined;
        let h='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><b style="color:#d4a843;font-size:1.1em">⭐ '+name+'</b>';
        if(bright!==undefined)h+='<span style="font-size:.75em;padding:2px 6px;border-radius:4px;background:'+(bright?'#d4a843':'#888')+';color:#fff">'+(bright?'庙旺':'落陷')+'</span>';
        if(hasHua)h+='<span style="font-size:.75em;color:#c62828">化'+hasHua+'</span>';
        h+=' <button onclick="$(\'star-detail\').classList.add(\'hidden\')" style="margin-left:auto;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1.2em">✕</button></div>';
        if(palaces.length)h+='<div>📍 所在宫位: <b>'+palaces.map(p=>p.name||p.getName?.()||'?').join('、')+'</b></div>';
        if(opp)h+='<div>🔁 对宫: <b>'+(opp.name||opp.getName?.()||'?')+'</b></div>';
        if(sf.length)h+='<div>△ 三方四正: <b>'+sf.map(p=>p.name||p.getName?.()||'?').join('、')+'</b></div>';
        if(sf.length){
            const sfHasHua=sf.some(p=>{const sts=[...p.majorStars||[],...p.minorStars||[]];return sts.some(s=>s.mutagen)});
            if(sfHasHua){const huaStars=[];for(const p of sf)for(const s of[...p.majorStars||[],...p.minorStars||[]])if(s.mutagen)huaStars.push(s.name+'化'+s.mutagen+'('+(p.name||'')+')');if(huaStars.length)h+='<div>✨ 三方四化: <b>'+huaStars.join('、')+'</b></div>'}
        }
        el.innerHTML=h;el.classList.remove('hidden');
    }catch(e){console.error('star detail:',e);el.classList.add('hidden')}
}
function selectPalace(br){selectedPalace=(selectedPalace===br)?null:br;renderChart()}

// AI analysis
let _pwResolve=null,conversationMessages=null,currentSessionId=null;

// Session management
async function loadSessions(){
    try{const r=await fetch('/api/ziwei/sessions');const sessions=await r.json();$('session-count').textContent=sessions.length;
        $('session-list').innerHTML=sessions.map(s=>`<div style="padding:4px 6px;margin:2px 0;border-radius:4px;cursor:pointer;${s.id===currentSessionId?'background:rgba(212,168,67,.08);':''}" onclick="switchSession('${s.id}')">
            <span style="color:var(--accent);font-weight:600">${s.title||'未命名'}</span>
            <span style="color:var(--text-muted);font-size:.85em;margin-left:6px">${s.message_count}条</span>
            <button onclick="event.stopPropagation();deleteSession('${s.id}')" style="float:right;background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:.8em">✕</button>
        </div>`).join('')||'<div style="color:var(--text-muted)">暂无会话</div>'}
    catch(e){}
}
async function saveSession(){
    if(!conversationMessages||!conversationMessages.length)return;
    const title=$('y').value+'-'+$('m').value+'-'+$('d').value+' '+($('g').value||'男');
    const body={title:title,messages:conversationMessages,plate_summary:title};
    try{
        if(currentSessionId){await fetch('/api/ziwei/sessions/'+currentSessionId,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})}
        else{const r=await fetch('/api/ziwei/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();currentSessionId=d.id}
        loadSessions();
    }catch(e){}
}
async function switchSession(id){
    try{const r=await fetch('/api/ziwei/sessions/'+id);const s=await r.json();if(!s||s.error)return;
        currentSessionId=id;conversationMessages=s.messages||[];
        // Show chat history
        $('analysis-section').classList.remove('hidden');$('analysis-content').innerHTML='';
        $('chat-messages').innerHTML=conversationMessages.filter(m=>m.role!=='system').map(m=>`<div style="margin:4px 0;padding:6px 10px;border-radius:6px;font-size:.8em;${m.role==='user'?'background:rgba(212,168,67,.06);':'background:var(--card-bg);border:1px solid var(--border-light);'}"><b style="color:${m.role==='user'?'var(--accent)':'var(--text-muted)'}">${m.role==='user'?'你':'Agent'}：</b>${m.content.replace(/\n/g,'<br>')}</div>`).join('');
        loadSessions();
    }catch(e){}
}
async function deleteSession(id){
    if(!confirm('删除此会话？'))return;
    await fetch('/api/ziwei/sessions/'+id,{method:'DELETE'});
    if(currentSessionId===id){currentSessionId=null;conversationMessages=null;$('chat-messages').innerHTML=''}
    loadSessions();
}
loadSessions();
function promptPassword(){return new Promise(r=>{_pwResolve=r;$('pw-overlay').classList.remove('hidden');$('pw-input').value='';$('pw-error').textContent='';$('pw-input').focus()})}
$('btn-pw-confirm').addEventListener('click',()=>{if(_pwResolve){_pwResolve($('pw-input').value);$('pw-overlay').classList.add('hidden')}});
$('btn-pw-cancel').addEventListener('click',()=>{if(_pwResolve){_pwResolve(null);$('pw-overlay').classList.add('hidden')}});
$('pw-input').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-pw-confirm').click()});

async function doAnalyze(password){
    $('analysis-content').innerHTML='<p style="text-align:center;color:var(--text-muted)">AI 正在解读你的紫微命盘...</p>';
    // 优先用 SSE 流式
    try{const r=await fetch('/api/ziwei/analyze/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plate:plateData,password:password||''})});
        if(r.status===403){const d=await r.json();if(d.need_password){const p=await promptPassword();if(!p){$('btn-analyze').disabled=false;$('btn-analyze').textContent='🧠 AI 解读';return}return doAnalyze(p)}}
        if(!r.ok){const d=await r.json();$('analysis-content').innerHTML='<p style="color:#ef5350">分析失败: '+(d.error||'')+'</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='重试';return}
        const reader=r.body.getReader();const decoder=new TextDecoder();let fullText='';let buf='';$('analysis-content').innerHTML='';
        while(true){const{value,done}=await reader.read();if(done)break;buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
            for(const line of lines){if(line.startsWith('data: ')){try{const d=JSON.parse(line.slice(6));if(d.error){$('analysis-content').innerHTML='<p style="color:#ef5350">'+d.error+'</p>';return}
                        if(d.type==='content_block_delta'&&d.delta?.text){fullText+=d.delta.text;$('analysis-content').innerHTML=formatCards(fullText)+'<span style="animation:blink 1s infinite">▌</span>'}else if(d.type==='message_stop'){}
                    }catch(e){}}}
        }$('analysis-content').innerHTML=formatCards(fullText);$('btn-analyze').textContent='重新解读';$('btn-analyze').disabled=false;
        // 模拟 messages 数组给会话
        const sp=conversationMessages?conversationMessages.find(m=>m.role==='system'):null;
        conversationMessages=[{role:'system',content:sp?.content||''},{role:'user',content:'请解读命盘'},{role:'assistant',content:fullText}];saveSession();
    }catch(e){$('analysis-content').innerHTML='<p style="color:#ef5350">流式失败，请重试</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='重试'}
}
$('btn-analyze').addEventListener('click',()=>{if(!plateData)return;$('btn-analyze').disabled=true;$('btn-analyze').textContent='分析中...';$('analysis-section').classList.remove('hidden');doAnalyze('')});

// Chat
async function sendChat(){
    const input=$('chat-input'),reply=input.value.trim();if(!reply||!conversationMessages)return;
    input.disabled=true;$('btn-chat-send').disabled=true;$('chat-messages').innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:rgba(212,168,67,.06);border-radius:8px;font-size:.82em"><b style="color:var(--accent)">你：</b>'+reply+'</div>';
    try{const r=await fetch('/api/ziwei/analyze/continue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationMessages,reply:reply})});const d=await r.json();
        if(d.need_password){const p=await promptPassword();if(!p){input.disabled=false;$('btn-chat-send').disabled=false;return};const r2=await fetch('/api/ziwei/analyze/continue',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:conversationMessages,reply:reply,password:p})});const d2=await r2.json();if(d2.success)appendChatReply(d2.analysis)}
        else if(d.success)appendChatReply(d.analysis);
        else{$('chat-messages').innerHTML+='<div style="color:#ef5350;font-size:.78em">'+(d.error||'失败')+'</div>'}
    }catch(e){$('chat-messages').innerHTML+='<div style="color:#ef5350;font-size:.78em">网络错误</div>'}
    input.value='';input.disabled=false;$('btn-chat-send').disabled=false;
}
function appendChatReply(text){
    $('chat-messages').innerHTML+='<div style="margin:8px 0;padding:8px 12px;background:var(--card-bg);border:1px solid var(--border-light);border-radius:8px;font-size:.82em"><b style="color:var(--accent)">Agent：</b>'+text.replace(/\n/g,'<br>')+'</div>';
    conversationMessages.push({role:'user',content:$('chat-input').value.trim()});
    conversationMessages.push({role:'assistant',content:text});
    saveSession();
}
$('chat-input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendChat()}});
function formatCards(t){t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const p=t.split(/^## /gm);if(p.length<2)return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');let h='';for(let i=1;i<p.length;i++){const l=p[i].split('\n');h+='<div class="a-card"><h2>'+l[0].trim()+'</h2><div class="body">'+l.slice(1).join('\n').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')+'</div></div>'}return h}
</script>
