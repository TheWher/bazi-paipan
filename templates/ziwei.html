<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘</title>
<script>(function(){var t=localStorage.getItem('bazi_theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme:dark)').matches)document.documentElement.setAttribute('data-theme','dark')})()</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--card-bg:#fff;--text:#000;--text-muted:#666;--accent:#000;--primary:#000;--primary-hover:#333;--border:#ccc;--border-light:#e5e5e5;--shadow-sm:0 0 0 1px rgba(0,0,0,.04);--shadow-lg:0 2px 16px rgba(0,0,0,.08);--gold:#000;--radius:18px;--radius-sm:12px}
[data-theme="dark"]{--bg:#1a1a2e;--card-bg:#16213e;--text:#e0e0e0;--text-muted:#999;--accent:#d4a843;--primary:#d4a843;--primary-hover:#e8c860;--border:#444;--border-light:#2a2a3e;--shadow-sm:0 0 0 1px rgba(255,255,255,.03);--shadow-lg:0 2px 16px rgba(0,0,0,.3);--gold:#d4a843}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.hidden{display:none!important}
.app-layout{display:flex;min-height:100vh}
.app-sidebar{width:400px;min-width:400px;flex-shrink:0;background:linear-gradient(180deg,rgba(212,168,67,.03),rgba(255,255,255,0) 40%);border-right:1px solid var(--border-light);padding:32px 28px 80px;position:sticky;top:0;height:100vh;overflow-y:auto}
.app-sidebar .app-header{text-align:left;padding:0 0 14px}
.app-sidebar .app-header h1{font-size:1.5rem;margin-bottom:2px;cursor:pointer}
.app-sidebar .subtitle{font-size:.7em;color:#999}
.app-main{flex:1;min-width:0;padding:40px 48px 80px;overflow-y:auto}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:var(--card-bg);color:var(--text);font-size:.82em;font-weight:500;cursor:pointer;white-space:nowrap}.btn:hover{opacity:.85}
.btn-gold{background:linear-gradient(135deg,#d4a843,#b8860b);color:#fff;border:none}
.quick{flex:1;padding:10px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-size:1.1em;font-family:monospace;letter-spacing:3px;text-align:center;outline:none}.quick:focus{border-color:#d4a843;border-style:solid}
.quick-hint{color:#666;font-size:.72em;white-space:nowrap}
.radio-group{display:flex;gap:12px}.radio-label{display:flex;align-items:center;gap:4px;font-size:.82em;cursor:pointer}
.sticky-actions{position:fixed;bottom:0;left:0;width:400px;background:var(--card-bg);padding:12px 28px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border-light);z-index:10;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
[data-theme="dark"] .sticky-actions{box-shadow:0 -4px 16px rgba(0,0,0,.3)}
.sticky-actions .btn{flex:1;justify-content:center;font-size:.82em;padding:8px 14px}
.floating-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 16px;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm)}
.floating-bar .bar-title{font-weight:700;font-size:.88em;color:var(--accent)}
.chart-wrapper{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.chart-wrapper svg{width:100%;height:auto;max-width:780px;display:block;margin:0 auto}
.analysis-content{font-size:.9rem;line-height:1.85;color:var(--text)}
.a-card{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.a-card h2{font-size:.85em;font-weight:600;color:#8b6914;margin-bottom:10px}[data-theme="dark"] .a-card h2{color:var(--accent)}
.a-card .body{font-size:.9rem;line-height:1.85;color:var(--text)}.a-card .body strong{color:var(--accent)}
.loading{text-align:center;padding:60px;color:var(--text-muted)}.spinner{width:32px;height:32px;margin:0 auto 12px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}@keyframes blink{50%{opacity:0}}
.reasoning-details{margin:6px 0 10px 12px;padding:6px 10px 6px 14px;background:rgba(212,168,67,.04);border-left:2px solid rgba(212,168,67,.25);border-radius:4px;font-size:.82em;line-height:1.7}
.reasoning-details summary{cursor:pointer;color:var(--text-muted);font-size:.78em;font-weight:600;user-select:none;padding:2px 0}
.reasoning-details summary:hover{color:var(--accent)}
.reasoning-details .step{margin:1px 0;padding:1px 0 1px 8px;border-left:1px solid rgba(212,168,67,.12)}
.reasoning-details .step .risk{color:#ef5350}
.reasoning-details .step .conclusion{color:var(--accent)}
.pattern-row{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}.pat-badge{padding:3px 10px;border-radius:12px;font-size:.7em;font-weight:600}.pat-ex{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff;font-size:.75em}.pat-gd{background:rgba(46,125,50,.12);color:#2e7d32;border:1px solid rgba(46,125,50,.2);font-size:.72em}.pat-ne{background:rgba(120,120,120,.06);color:var(--text-muted);font-size:.68em}.pat-ca{background:rgba(198,40,40,.12);color:#ef5350;border:1px solid rgba(198,40,40,.2);font-size:.72em}
@media(max-width:860px){.app-layout{flex-direction:column}.app-sidebar{width:100%;min-width:0;height:auto;position:static;border-right:none;padding:20px 16px 16px}.app-main{padding:20px 16px 80px}.sticky-actions{width:100%}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="app-sidebar">
    <header class="app-header">
        <h1 onclick="location='/'">紫微斗数 <button id="btn-theme" onclick="event.stopPropagation();toggleTheme()" style="background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;line-height:1;vertical-align:middle;margin-left:4px">🌙</button></h1>
        <p class="subtitle">iztro JS 原版引擎 · 命盘解读</p>
    </header>
    <section style="padding:0 0 40px">
        <input type="text" id="quick" class="quick" maxlength="12" inputmode="numeric" placeholder="200508190135" style="width:100%;margin-bottom:8px">
        <p class="quick-hint" style="margin-bottom:14px">快捷输入 200508190135 → 自动填表</p>
        <div style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);overflow:visible;margin-bottom:10px">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent)">历法</span>
                <div class="radio-group"><label class="radio-label"><input type="radio" name="cal" value="solar" checked> 公历</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="cal" value="lunar"> 农历</label></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">年</label><input type="number" id="y" value="1991" min="1900" max="2100" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">月</label><input type="number" id="m" value="8" min="1" max="12" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">日</label><input type="number" id="d" value="15" min="1" max="31" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">时</label><input type="number" id="h" value="1" min="0" max="23" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">分</label><input type="number" id="min" value="0" min="0" max="59" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="padding:14px 16px;display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent)">性别</span>
                <div class="radio-group"><label class="radio-label"><input type="radio" name="g" value="男" checked> 男</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="g" value="女"> 女</label></div>
            </div>
        </div>
        <label class="radio-label" style="margin-bottom:6px;display:flex;align-items:center;gap:8px;font-size:.9em;font-weight:600;color:var(--accent)"><input type="checkbox" id="use-true-solar" style="width:18px;height:18px"> ⏱ 真太阳时校正</label>
        <p style="font-size:.72em;color:var(--text-muted);margin-bottom:8px">北京时间以120°E为基准，出生地经度不同会产生时间偏移，可能跨越时辰分界线改变命盘。</p>
        <div id="solar-info" style="display:none;font-size:.8em;color:var(--accent);margin-bottom:8px;line-height:1.6"></div>
        <div id="solar-row" style="display:none;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);margin-bottom:10px;position:relative">
            <div style="padding:14px 16px">
                <div style="display:flex;align-items:center;gap:6px;margin-bottom:8px">
                    <span style="font-weight:600;font-size:.82em;color:var(--accent);min-width:32px">经度</span>
                    <input type="number" id="longitude" step="0.01" placeholder="120" value="120" style="flex:1;border:1px solid var(--border-light);border-radius:6px;padding:7px 10px;font-size:.88em;background:var(--bg);color:var(--text);outline:none">
                </div>
                <div style="display:flex;align-items:center;gap:6px">
                    <span style="font-weight:600;font-size:.82em;color:var(--accent);min-width:32px">出生地</span>
                    <div style="flex:1;position:relative">
                        <input type="text" id="location" placeholder="城市名，如：东莞" autocomplete="off" style="width:100%;border:1px solid var(--border-light);border-radius:6px;padding:7px 10px;font-size:.88em;background:var(--bg);color:var(--text);outline:none">
                    </div>
                    <button id="btn-geocode" class="btn" style="font-size:.78em;padding:5px 12px;border-radius:6px;flex-shrink:0" onclick="geocodeCity()">🔍 定位</button>
                </div>
            </div>
            <div id="geocode-status" style="display:none;padding:4px 16px 10px;font-size:.74em;color:#4caf50"></div>
        </div>
    </section>
    <div style="margin-top:auto;padding:12px 0;border-top:1px solid var(--border-light)">
            <details id="session-details" open><summary style="cursor:pointer;font-size:.82em;color:var(--accent);margin-bottom:8px;font-weight:600">💬 历史会话 (<span id="session-count">0</span>)</summary>
            <div id="session-list" style="max-height:240px;overflow-y:auto;font-size:.78em;line-height:1.6"></div>
            </details>
        </div>
    <div class="sticky-actions">
        <button id="btn-render" class="btn btn-gold">🔮 排盘</button>
        <button id="btn-analyze" class="btn btn-gold" disabled>🧠 AI 解读</button>
    </div>
</aside>
<main class="app-main">
    <section id="welcome-section"><div style="text-align:center;padding:120px 40px;color:var(--text-muted)"><div style="font-size:3em;margin-bottom:16px">🔮</div><p style="font-size:1em;margin-bottom:8px">输入出生信息，点击「排盘」开始分析</p><p style="font-size:.75em">排盘后点击 AI 解读 → 自动跳转水墨报告页</p></div></section>
    <section id="loading-section" class="hidden"><div class="loading"><div class="spinner"></div><p>紫微排盘中...</p></div></section>
    <section id="result-section" class="hidden">
        <div style="text-align:center;padding:60px 40px">
            <div style="font-size:2em;margin-bottom:12px">✅</div>
            <p style="font-size:.95em;color:var(--text);margin-bottom:8px">排盘完成</p>
            <p style="font-size:.78em;color:var(--text-muted)">点击下方「AI 解读」生成水墨风格命盘报告</p>
        </div>
    </section>
</main>
</div>
<div id="pw-overlay" class="hidden" style="position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;display:flex;align-items:center;justify-content:center">
    <div style="background:var(--card-bg);border-radius:14px;padding:28px;width:340px;max-width:90vw;text-align:center">
        <h3 style="margin-bottom:8px;color:var(--accent)">🔐 深度分析需要密码</h3>
        <p style="font-size:.8em;color:var(--text-muted);margin-bottom:16px">API 调用成本较高，请向管理员获取密码</p>
        <input type="password" id="pw-input" placeholder="请输入密码" style="width:100%;padding:10px;font-size:.9em;border:1px solid var(--border);border-radius:8px;margin-bottom:12px;background:var(--bg);color:var(--text)">
        <div id="pw-error" style="color:#ef5350;font-size:.78em;margin-bottom:8px"></div>
        <div style="display:flex;gap:8px"><button id="btn-pw-cancel" class="btn" style="flex:1">取消</button><button id="btn-pw-confirm" class="btn btn-gold" style="flex:1">确认</button></div>
    </div>
</div>
<div id="city-suggestions" style="display:none;position:fixed;z-index:99999;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;max-height:280px;overflow-y:auto;font-size:.82em;line-height:1.8;box-shadow:0 4px 24px rgba(0,0,0,.35)"></div>
<script>
const $=id=>document.getElementById(id);
let plateData=null;

(function(){const t=localStorage.getItem('bazi_theme');$('btn-theme').textContent=t==='dark'?'☀️':'🌙'})();
function toggleTheme(){const n=document.documentElement.getAttribute('data-theme')==='dark'?'':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('bazi_theme',n);$('btn-theme').textContent=n==='dark'?'☀️':'🌙'}

$('quick').addEventListener('input',function(){const v=this.value.replace(/\D/g,'');if(v.length<8)return;$('y').value=v.slice(0,4);$('m').value=parseInt(v.slice(4,6));$('d').value=parseInt(v.slice(6,8));if(v.length>=10)$('h').value=parseInt(v.slice(8,10));if(v.length>=12)$('min').value=parseInt(v.slice(10,12))});
$('quick').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-render').click()});

function getB(){const c=document.querySelector('input[name="cal"]:checked')?.value||'solar';const g=document.querySelector('input[name="g"]:checked')?.value||'男';return{y:parseInt($('y').value),m:parseInt($('m').value),d:parseInt($('d').value),h:parseInt($('h').value),min:parseInt($('min').value||'0'),gender:g,cal:c}}

function getAdjustedHour(h,min,lng){const o=Math.round((lng-120)*4);let t=h*60+min+o;if(t<0)t+=1440;if(t>=1440)t-=1440;return{hour:Math.floor(t/60),minute:Math.round(t%60),offset:o}}

$('btn-render').addEventListener('click',()=>{
    const b=getB();if(!b.y||!b.m||!b.d)return;
    $('welcome-section').classList.add('hidden');$('loading-section').classList.remove('hidden');
    let hh=b.h,mm=b.min;
    if($('use-true-solar').checked){const lng=parseFloat($('longitude').value)||120;const adj=getAdjustedHour(b.h,b.min,lng);hh=adj.hour;mm=adj.minute}
    fetch('/api/ziwei/paipan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:b.y,month:b.m,day:b.d,hour:hh,minute:mm,gender:b.gender,is_lunar:b.cal==='lunar',longitude:parseFloat($('longitude').value)||120,location:$('location').value||''})})
    .then(r=>r.json()).then(d=>{plateData=d;$('loading-section').classList.add('hidden');$('result-section').classList.remove('hidden');$('btn-analyze').disabled=false})
    .catch(()=>{$('loading-section').innerHTML='<p style="color:#ef5350">排盘失败</p>'});
});

$('btn-analyze').addEventListener('click',async()=>{
    if(!plateData)return;
    $('btn-analyze').disabled=true;$('btn-analyze').textContent='分析中...';
    $('result-section').classList.add('hidden');$('loading-section').classList.remove('hidden');$('loading-section').innerHTML='<p style="text-align:center;padding:60px;color:#666">正在请求AI解读...</p>';
    try{
        const title=$('y').value+'-'+$('m').value+'-'+$('d').value+' '+$('h').value+':00';
        const sr=await fetch('/api/ziwei/sessions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({title,messages:[],plate_data:plateData,plate_summary:title})});
        const sd=await sr.json();
        const sid=sd.id;
        $('loading-section').innerHTML='<p style="text-align:center;padding:60px;color:#666">AI分析中，即将跳转报告页...</p>';
        const r=await fetch('/api/ziwei/analyze/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plate:plateData,password:''})});
        const reader=r.body.getReader();const decoder=new TextDecoder();let fullText='',buf='';
        while(true){
            const{value,done}=await reader.read();
            if(done){
                await fetch('/api/ziwei/sessions/'+sid,{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'assistant',content:fullText}]})});
                window.location.href='/ziwei/report/'+sid;return;
            }
            buf+=decoder.decode(value,{stream:true});const lines=buf.split('\n');buf=lines.pop()||'';
            for(const line of lines){if(line.startsWith('data: '))try{const d=JSON.parse(line.slice(6));if(d.type==='content_block_delta'&&d.delta?.text)fullText+=d.delta.text}catch(e){}}
        }
    }catch(e){$('loading-section').innerHTML='<p style="color:#ef5350">分析失败，请重试</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='重试'}
});

async function loadSessions(){
    try{const r=await fetch('/api/ziwei/sessions');const sessions=await r.json();$('session-count').textContent=sessions.length;
        if(sessions.length>0)$('session-details').open=true;
        $('session-list').innerHTML=sessions.map(s=>'<div style="padding:6px 8px;margin:3px 0;border-radius:6px;cursor:pointer" onclick="window.location.href=\'/ziwei/report/'+s.id+'\'"><span style="color:var(--accent);font-weight:600">\u{1F4DD} '+s.title+'</span><span style="color:var(--text-muted);font-size:.8em;margin-left:4px">'+s.message_count+'\u6761</span><button onclick="event.stopPropagation();fetch(\'/api/ziwei/sessions/'+s.id+'{method:\'DELETE\'}).then(()=>loadSessions())" style="float:right;background:none;border:none;color:var(--text-muted);cursor:pointer">\u2715</button></div>').join('')||'<div style="color:var(--text-muted);padding:8px;text-align:center">\u6682\u65e0\u5386\u53f2\u4f1a\u8bdd</div>'}
    catch(e){}
}
loadSessions();
</script>
</body>
</html>
