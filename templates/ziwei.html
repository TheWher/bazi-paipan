<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘</title>
<script>(function(){var t=localStorage.getItem('bazi_theme');if(t){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark')}})();</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--card-bg:#fff;--text:#000;--text-muted:#666;--accent:#000;--primary:#000;--primary-hover:#333;--border:#ccc;--border-light:#e5e5e5;--shadow-sm:0 0 0 1px rgba(0,0,0,.04);--shadow:0 0 0 1px rgba(0,0,0,.06);--shadow-lg:0 2px 16px rgba(0,0,0,.08);--gold:#000;--radius:18px;--radius-sm:12px}
[data-theme="dark"]{--bg:#1a1a2e;--card-bg:#16213e;--text:#e0e0e0;--text-muted:#999;--accent:#d4a843;--primary:#d4a843;--primary-hover:#e8c860;--border:#444;--border-light:#2a2a3e;--shadow-sm:0 0 0 1px rgba(255,255,255,.03);--shadow:0 0 0 1px rgba(255,255,255,.05);--shadow-lg:0 2px 16px rgba(0,0,0,.3);--gold:#d4a843}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.hidden{display:none!important}
.app-layout{display:flex;gap:0;min-height:100vh;position:relative;z-index:1}
.app-sidebar{width:400px;min-width:400px;flex-shrink:0;background:linear-gradient(180deg,rgba(212,168,67,.03) 0%,rgba(255,255,255,0) 40%);border-right:1px solid var(--border-light);padding:32px 28px 80px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.app-sidebar .app-header{text-align:left;padding:0 0 14px}
.app-sidebar .app-header h1{font-size:1.5rem;margin-bottom:2px;cursor:pointer}
.app-sidebar .subtitle{font-size:.7em;color:#999}
.app-main{flex:1;min-width:0;padding:40px 48px 80px;overflow-y:auto}
.app-sidebar .form-section{background:none;border:none;padding:0 0 40px;box-shadow:none;margin-bottom:0}
_:-ms-input-placeholder,:root .form-group{display:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:var(--card-bg);color:var(--text);font-size:.82em;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:hover{background:var(--primary-hover)}
.btn-gold{background:linear-gradient(135deg,#d4a843,#b8860b);color:#fff;border:none}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.quick-input-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.quick-input{flex:1;min-width:240px;padding:10px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-size:1.1em;font-family:'SF Mono','Consolas','Courier New',monospace;letter-spacing:3px;text-align:center}
.quick-input:focus{outline:none;border-color:#d4a843;border-style:solid}
.quick-hint{color:#666;font-size:.72em;white-space:nowrap}
.radio-group{display:flex;gap:12px}
.radio-label{display:flex;align-items:center;gap:4px;font-size:.82em;cursor:pointer}
.sticky-actions{position:fixed;bottom:0;left:0;width:400px;background:var(--card-bg);padding:12px 28px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border-light);z-index:10;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
[data-theme="dark"] .sticky-actions{box-shadow:0 -4px 16px rgba(0,0,0,.3)}
.sticky-actions .btn{flex:1;justify-content:center;font-size:.82em;padding:8px 14px}
.floating-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 16px;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm)}
.floating-bar .bar-title{font-weight:700;font-size:.88em;color:var(--accent)}
.chart-wrapper{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.chart-wrapper svg{width:100%;height:auto;max-width:720px;display:block;margin:0 auto}
.analysis-content{font-size:.9rem;line-height:1.85;color:var(--text)}
.a-card{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.a-card h2{font-size:.85em;font-weight:600;color:#8b6914;margin-bottom:10px}
[data-theme="dark"] .a-card h2{color:var(--accent)}
.a-card .body{font-size:.9rem;line-height:1.85;color:var(--text)}.a-card .body strong{color:var(--accent)}
.loading-spinner{text-align:center;padding:60px;color:var(--text-muted)}.spinner{width:32px;height:32px;margin:0 auto 12px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.pattern-row{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}.pat-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:12px;font-size:.7em;font-weight:600}.pat-ex{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff}.pat-gd{background:rgba(212,168,67,.12);color:var(--gold)}.pat-ne{background:rgba(120,120,120,.08);color:var(--text-muted)}.pat-ca{background:rgba(198,40,40,.1);color:#ef5350}
.toolbar-btn{padding:4px 10px;font-size:.7em}
@media(max-width:860px){.app-layout{flex-direction:column}.app-sidebar{width:100%;min-width:0;height:auto;position:static;border-right:none;padding:20px 16px 16px}.app-main{padding:20px 16px 80px}.sticky-actions{width:100%}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="app-sidebar">
    <header class="app-header">
        <h1 onclick="location='/'">紫微斗数 <button id="btn-theme" onclick="toggleTheme()" title="切换日/夜模式" style="background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;line-height:1;vertical-align:middle;margin-left:4px">🌙</button></h1>
        <p class="subtitle">iztro JS 原版引擎 · 命盘解读</p>
    </header>
    <section class="form-section">
        <input type="text" id="quick" class="quick-input" maxlength="12" inputmode="numeric" placeholder="200508190135">
        <p class="quick-hint">快捷输入 200508190135 → 自动填表</p>
        <div style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;margin:14px 0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent);min-width:32px">历法</span>
                <div class="radio-group" style="flex:1"><label class="radio-label"><input type="radio" name="cal" value="solar" checked> 公历</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="cal" value="lunar"> 农历</label></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">年</label><input type="number" id="y" value="1991" min="1900" max="2100" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">月</label><input type="number" id="m" value="8" min="1" max="12" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">日</label><input type="number" id="d" value="15" min="1" max="31" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">时</label><input type="number" id="h" value="1" min="0" max="23" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">分</label><input type="number" id="min" value="0" min="0" max="59" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="padding:14px 16px;display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent);min-width:32px">性别</span>
                <div class="radio-group" style="flex:1"><label class="radio-label"><input type="radio" name="g" value="男" checked> 男</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="g" value="女"> 女</label></div>
            </div>
        </div>
        <label class="radio-label" style="margin-bottom:4px;display:flex;align-items:center;gap:6px"><input type="checkbox" id="use-true-solar" onchange="document.getElementById('solar-row').style.display=this.checked?'flex':'none';updateSolarInfo()"> ⏱ 真太阳时校正</label>
        <p style="font-size:.62em;color:var(--text-muted);margin-bottom:6px">北京时间以东经120°为准，出生地经度不同会产生时间偏差，可能跨过时辰分界线从而改变命盘</p>
        <div id="solar-info" style="display:none;font-size:.68em;color:var(--accent);margin-bottom:8px"></div>
        <div id="solar-row" style="display:none;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;margin-bottom:10px">
            <div style="padding:10px 16px;display:flex;align-items:center;gap:6px">
                <span style="font-weight:600;font-size:.75em;color:var(--accent);white-space:nowrap">经度</span>
                <input type="number" id="longitude" step="0.01" placeholder="120" value="120" style="width:55px;border:none;padding:6px 0;font-size:.85em;background:transparent;color:var(--text);outline:none">
                <span style="font-weight:600;font-size:.75em;color:var(--accent);white-space:nowrap;margin-left:4px">出生地</span>
                <div style="flex:1;position:relative">
                    <input type="text" id="location" placeholder="城市名，如：东莞" autocomplete="off" style="width:100%;border:none;padding:6px 0;font-size:.85em;background:transparent;color:var(--text);outline:none">
                    <div id="city-suggestions" style="display:none;position:absolute;top:100%;left:0;right:0;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;max-height:180px;overflow-y:auto;z-index:20;font-size:.75em"></div>
                </div>
                <button id="btn-geocode" class="btn" style="font-size:.7em;padding:3px 8px;border-radius:6px" onclick="geocodeCity()">🔍</button>
            </div>
            <div id="geocode-status" style="display:none;padding:4px 16px 8px;font-size:.68em;color:#4caf50"></div>
        </div>
    </section>
    <div class="sticky-actions">
        <button id="btn-render" class="btn btn-gold">🔮 排盘</button>
        <button id="btn-analyze" class="btn btn-gold" disabled>🧠 AI 解读</button>
    </div>
</aside>
<main class="app-main">
    <section id="welcome-section"><div style="text-align:center;padding:120px 40px;color:var(--text-muted)"><div style="font-size:3em;margin-bottom:16px">🔮</div><p style="font-size:1em;margin-bottom:8px">输入出生信息，点击「排盘」开始分析</p><p style="font-size:.75em">iztro JS 原版引擎 · 紫微斗数命盘解读</p></div></section>
    <section id="loading-section" class="hidden"><div class="loading-spinner"><div class="spinner"></div><p>紫微排盘中...</p></div></section>
    <section id="chart-section" class="hidden">
        <div class="floating-bar"><span class="bar-title">🔮 紫微命盘</span>
            <select id="horo-scope" style="padding:4px 8px;font-size:.74em;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text)"><option value="origin">本命</option><option value="decadal">大限</option><option value="yearly">流年</option></select>
            <button id="btn-flystar" class="btn" style="font-size:.7em;padding:3px 10px" onclick="toggleFlyStars()">✈️ 飞星</button>
            <span id="horo-result" style="font-size:.7em;color:var(--accent)"></span>
            <div class="pattern-row" id="patterns"></div>
        </div>
        <div id="flystar-panel" class="hidden" style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;font-size:.74em;max-height:260px;overflow-y:auto"></div>
        <div class="chart-wrapper" id="zw-chart"></div>
        <div id="decadal-panel" style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px 18px;margin-top:14px;font-size:.78em"></div>
    </section>
    <section id="analysis-section" class="hidden">
        <div class="floating-bar"><span class="bar-title">📜 命盘解读</span></div>
        <div id="analysis-content" class="analysis-content"></div>
    </section>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let astrolabe=null,plateData=null,selectedPalace=null;
(function(){const t=localStorage.getItem('bazi_theme');document.getElementById('btn-theme').textContent=t==='dark'?'☀️':'🌙'})();
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('bazi_theme',n);document.getElementById('btn-theme').textContent=n==='dark'?'☀️':'🌙';if(astrolabe)renderChart()}
document.getElementById('horo-scope').addEventListener('change',()=>{if(astrolabe)renderChart()});

const GAN_SIHUA={甲:{禄:'廉贞',权:'破军',科:'武曲',忌:'太阳'},乙:{禄:'天机',权:'天梁',科:'紫微',忌:'太阴'},丙:{禄:'天同',权:'天机',科:'文昌',忌:'廉贞'},丁:{禄:'太阴',权:'天同',科:'天机',忌:'巨门'},戊:{禄:'贪狼',权:'太阴',科:'右弼',忌:'天机'},己:{禄:'武曲',权:'贪狼',科:'天梁',忌:'文曲'},庚:{禄:'太阳',权:'武曲',科:'太阴',忌:'天同'},辛:{禄:'巨门',权:'太阳',科:'文曲',忌:'文昌'},壬:{禄:'天梁',权:'紫微',科:'左辅',忌:'武曲'},癸:{禄:'破军',权:'巨门',科:'太阴',忌:'贪狼'}};
function toggleFlyStars(){if(!astrolabe)return;const el=$('flystar-panel');if(!el.classList.contains('hidden')){el.classList.add('hidden');return}el.classList.remove('hidden');const palaces=Array.isArray(astrolabe.palaces)?astrolabe.palaces:typeof astrolabe.palaces==='function'?astrolabe.palaces():[];let html='<div style="font-weight:700;color:var(--accent);margin-bottom:6px">✈️ 十二宫飞星</div>';for(const p of palaces){const gan=p.heavenlyStem;const fly=GAN_SIHUA[gan];if(!fly)continue;let items=[];for(const[mu,sn]of Object.entries(fly)){let tgt='?';for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===sn){tgt=pp.name;break}items.push('<span style="color:'+(mu==='禄'?'#2e7d32':mu==='权'?'#7b1fa2':mu==='科'?'#1565c0':'#c62828')+'">化'+mu+'→'+tgt+'</span>')}html+='<div style="padding:2px 6px;border-left:2px solid var(--accent);margin-bottom:3px;font-size:.85em"><b style="color:var(--accent)">'+p.name+'</b>('+gan+'): '+items.join('·')+'</div>'}el.innerHTML=html}

document.getElementById('quick').addEventListener('input',function(){const v=this.value.replace(/\D/g,'');if(v.length<8)return;document.getElementById('y').value=v.slice(0,4);document.getElementById('m').value=parseInt(v.slice(4,6));document.getElementById('d').value=parseInt(v.slice(6,8));if(v.length>=10)document.getElementById('h').value=parseInt(v.slice(8,10));if(v.length>=12)document.getElementById('min').value=parseInt(v.slice(10,12))});
document.getElementById('quick').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-render').click()});

function getB(){const c=document.querySelector('input[name="cal"]:checked')?.value||'solar';const g=document.querySelector('input[name="g"]:checked')?.value||'男';return{y:parseInt(document.getElementById('y').value),m:parseInt(document.getElementById('m').value),d:parseInt(document.getElementById('d').value),h:parseInt(document.getElementById('h').value),min:parseInt(document.getElementById('min').value||'0'),gender:g,cal:c}}

// 城市自动补全
document.getElementById('location').addEventListener('input',function(){const v=this.value.trim();if(v.length<1){document.getElementById('city-suggestions').style.display='none';return}fetch('/api/cities?q='+encodeURIComponent(v)).then(r=>r.json()).then(d=>{const cities=d.results||d;const el=document.getElementById('city-suggestions');if(!cities||!cities.length){el.style.display='none';return}el.innerHTML=cities.slice(0,8).map(c=>'<div class="city-opt" style="padding:6px 10px;cursor:pointer;border-bottom:1px solid var(--border-light)" data-lon="'+c.lon.toFixed(2)+'" data-name="'+c.display_name.split('，')[0]+'">'+c.display_name+' ('+c.lon.toFixed(2)+'°)</div>').join('');el.style.display='block'})});
document.getElementById('city-suggestions').addEventListener('click',function(e){const d=e.target.closest('.city-opt');if(d){document.getElementById('location').value=d.dataset.name;document.getElementById('longitude').value=d.dataset.lon;this.style.display='none'}});
document.getElementById('city-suggestions').addEventListener('mousedown',function(e){const d=e.target.closest('.city-opt');if(d){document.getElementById('location').value=d.dataset.name;document.getElementById('longitude').value=d.dataset.lon;document.getElementById('geocode-status').style.display='block';document.getElementById('geocode-status').textContent='✅ 已定位: '+d.dataset.name+' · 经度 '+d.dataset.lon+'°E';this.style.display='none';updateSolarInfo()}});
document.addEventListener('click',function(e){if(!e.target.closest('#location')&&!e.target.closest('#city-suggestions'))document.getElementById('city-suggestions').style.display='none'});

async function geocodeCity(){const loc=document.getElementById('location').value.trim();if(!loc)return;const btn=document.getElementById('btn-geocode');btn.disabled=true;try{const r=await fetch('/api/geocode?q='+encodeURIComponent(loc));const d=await r.json();if(d.error||!d.results||!d.results.length){document.getElementById('geocode-status').style.display='block';document.getElementById('geocode-status').textContent='❌ 未找到该地点';return}const c=d.results[0];document.getElementById('longitude').value=c.lon.toFixed(2);document.getElementById('location').value=c.display_name.split('，')[0];document.getElementById('geocode-status').style.display='block';document.getElementById('geocode-status').textContent='✅ 已定位: '+c.display_name+' · 经度 '+c.lon.toFixed(2)+'°E';updateSolarInfo()}catch(e){document.getElementById('geocode-status').style.display='block';document.getElementById('geocode-status').textContent='❌ 网络错误'}finally{btn.disabled=false}}

// 真太阳时校正
function getAdjustedHour(h,min,lng){const offset=Math.round((lng-120)*4);let total=h*60+min+offset;if(total<0)total+=1440;if(total>=1440)total-=1440;return{hour:Math.floor(total/60),minute:Math.round(total%60),offset:offset}}
function updateSolarInfo(){if(!document.getElementById('use-true-solar').checked){document.getElementById('solar-info').style.display='none';return}const h=parseInt(document.getElementById('h').value)||0;const m=parseInt(document.getElementById('min').value)||0;const lng=parseFloat(document.getElementById('longitude').value)||120;const adj=getAdjustedHour(h,m,lng);const shi=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];const origIdx=Math.floor((h+1)/2)%12;const adjIdx=Math.floor((adj.hour+1)/2)%12;const origShi=shi[origIdx];const adjShi=shi[adjIdx];const dir=adj.offset>0?'提前':'推后';document.getElementById('solar-info').style.display='block';document.getElementById('solar-info').textContent='校正: '+h+':'+(m||'00').padStart(2,'0')+' ('+origShi+'时) → '+adj.hour+':'+String(adj.minute).padStart(2,'0')+' ('+adjShi+'时) · 偏移'+Math.abs(adj.offset)+'分钟'+dir}

document.getElementById('btn-render').addEventListener('click',()=>{
    const b=getB();if(!b.y||!b.m||!b.d)return;
    $('welcome-section').classList.add('hidden');$('loading-section').classList.remove('hidden');$('chart-section').classList.add('hidden');$('analysis-section').classList.add('hidden');
    let hh=b.h,mm=b.min;if(document.getElementById('use-true-solar').checked){const lng=parseFloat(document.getElementById('longitude').value)||120;const adj=getAdjustedHour(b.h,b.min,lng);hh=adj.hour;mm=adj.minute}
    const hi=Math.floor((hh+1)/2)%12;
    try{
        astrolabe=b.cal==='lunar'?iztro.astro.byLunar(b.y+'-'+b.m+'-'+b.d,hi,b.gender,false,true,'zh-CN'):iztro.astro.bySolar(b.y+'-'+b.m+'-'+b.d,hi,b.gender,true,'zh-CN');
    }catch(e){$('loading-section').innerHTML='<p style="color:#ef5350">排盘失败: '+e.message+'</p>';return}
    try{renderChart()}catch(e){$('loading-section').innerHTML='<p style="color:#ef5350">渲染失败: '+e.message+'</p>';return}
    $('loading-section').classList.add('hidden');$('chart-section').classList.remove('hidden');$('btn-analyze').disabled=false;
    // 获取格局
    fetch('/api/ziwei/paipan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:b.y,month:b.m,day:b.d,hour:hh,minute:mm,gender:b.gender,is_lunar:b.cal==='lunar',longitude:parseFloat(document.getElementById('longitude').value)||120,location:document.getElementById('location').value||''})}).then(r=>r.json()).then(d=>{plateData=d;const p=d.patterns||[];$('patterns').innerHTML=p.map(pp=>'<span class="pat-badge pat-'+(pp.level==='上吉'?'ex':pp.level==='吉'?'gd':pp.level==='忌'?'ca':'ne')+'">'+pp.name+'</span>').join('');}).catch(()=>{});
});

function renderChart(){
    if(!astrolabe)return;
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    const S={bg:isDark?'#19192b':'#fff',cell:isDark?'#1a1a2e':'#fafafa',border:isDark?'#999':'#ccc',text:isDark?'#888':'#666',gold:'#d4a843'};
    const palaces=Array.isArray(astrolabe.palaces)?astrolabe.palaces:typeof astrolabe.palaces==='function'?astrolabe.palaces():[];
    const soulBr=astrolabe.earthlyBranchOfSoulPalace,bodyBr=astrolabe.earthlyBranchOfBodyPalace,fec=astrolabe.fiveElementsClass;
    const scope=document.getElementById('horo-scope').value;let horoscope=null;
    if(scope!=='origin')try{horoscope=astrolabe.horoscope(new Date(),parseInt(document.getElementById('h').value)||1)}catch(e){}
    const siHua=[];for(const p of palaces)for(const s of[...p.majorStars,...p.minorStars])if(s.mutagen)siHua.push({star:s.name,hua:s.mutagen,palace:p.name});

    const W=720,H=880,pad=12,cellW=(W-2*pad)/4,cellH=(H-2*pad-24)/4;
    const GRID={'巳':[0,0],'午':[1,0],'未':[2,0],'申':[3,0],'辰':[0,1],'酉':[3,1],'卯':[0,2],'戌':[3,2],'寅':[0,3],'丑':[1,3],'子':[2,3],'亥':[3,3]};
    const BR=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
    const sfSet=new Set();if(selectedPalace){const i=BR.indexOf(selectedPalace);if(i>=0){sfSet.add(selectedPalace);sfSet.add(BR[(i+6)%12]);sfSet.add(BR[(i+4)%12]);sfSet.add(BR[(i+8)%12])}}

    let svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'">';
    svg+='<rect width="'+W+'" height="'+H+'" fill="'+S.bg+'" rx="8"/>';
    svg+='<text x="'+W/2+'" y="22" text-anchor="middle" fill="#d4a843" font-size="16" font-weight="700">紫微斗数 · '+fec+'</text>';

    for(const p of palaces){
        const br=p.earthlyBranch;if(!br)continue;const pos=GRID[br];if(!pos)continue;
        const x=pad+pos[0]*cellW,y=pad+pos[1]*cellH+30;
        const isSoul=br===soulBr,isBody=br===bodyBr,isSF=sfSet.has(br),isSel=br===selectedPalace;
        const stroke=isSel?'#d4a843':isSF?'#64b5f6':isSoul?'#d4a843':isBody?'#7c4dff':'#999';
        svg+='<rect x="'+(x+1)+'" y="'+(y+1)+'" width="'+(cellW-2)+'" height="'+(cellH-2)+'" rx="4" fill="'+S.cell+'" stroke="'+stroke+'" stroke-width="'+(isSel?2.5:isSF||isSoul||isBody?2:1)+'" style="cursor:pointer" onclick="selectPalace(\''+br+'\')"/>';
        svg+='<text x="'+(x+cellW/2)+'" y="'+(y+14)+'" text-anchor="middle" fill="#888" font-size="15" font-weight="800" style="pointer-events:none">'+br+'</text>';
        svg+='<text x="'+(x+cellW/2)+'" y="'+(y+cellH-5)+'" text-anchor="middle" fill="'+(isSoul?'#c62828':'#888')+'" font-size="10" font-weight="600" style="pointer-events:none">'+p.name+'</text>';
        if(isSoul)svg+='<text x="'+(x+cellW-6)+'" y="'+(y+9)+'" text-anchor="end" fill="#d4a843" font-size="9" font-weight="700" style="pointer-events:none">命</text>';
        if(isBody)svg+='<text x="'+(x+cellW-6)+'" y="'+(y+18)+'" text-anchor="end" fill="#7c4dff" font-size="9" font-weight="700" style="pointer-events:none">身</text>';

        let sy=y+32;
        // 主星（大字）
        for(const s of p.majorStars){
            const clr=s.type==='major'?'#d4a843':s.type==='soft'?'#ce93d8':s.type==='tough'?'#5a5a6e':'#888';
            svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="'+clr+'" font-size="11" font-weight="600">'+s.name;
            if(s.brightness)svg+='<tspan fill="'+(s.brightness==='庙'?'#d4a843':s.brightness==='旺'?'#e8a860':s.brightness==='陷'?'#c62828':'#888')+'" font-size="8">'+s.brightness+'</tspan>';
            if(s.mutagen)svg+='<tspan fill="'+(s.mutagen==='禄'?'#2e7d32':s.mutagen==='权'?'#7b1fa2':s.mutagen==='科'?'#1565c0':'#c62828')+'" font-size="7">◈</tspan>';
            svg+='</text>';sy+=14;
        }
        // 辅星——全显示，吉星紫色/煞星灰色分行
        const minors=p.minorStars||[];
        const ausp=minors.filter(s=>s.type==='soft'||s.type==='tianma'||s.type==='lucun');
        const sha=minors.filter(s=>s.type==='tough');
        if(ausp.length){
            svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#ce93d8" font-size="8">'+ausp.map(s=>s.name).join(' ')+'</text>';sy+=10;
        }
        if(sha.length){
            svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#5a5a6e" font-size="8">'+sha.map(s=>s.name).join(' ')+'</text>';sy+=10;
        }
        // 十二长生 + 博士十二神 + 岁前
        const cs12=p.changsheng12||'',bs12=p.boshi12||'',sq12=p.suiqian12||'';
        if(cs12)svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#888" font-size="7">'+cs12+(bs12?'·'+bs12:'')+(sq12?'·'+sq12:'')+'</text>';sy+=10;
        // 运限标记
        let hy=y+cellH-12;
        if(horoscope){
            if(horoscope.decadal&&horoscope.decadal.index===p.index){svg+='<text x="'+(x+3)+'" y="'+hy+'" fill="#4a9eff" font-size="6">大限</text>';hy-=7}
            if(horoscope.yearly&&horoscope.yearly.index===p.index){svg+='<text x="'+(x+3)+'" y="'+hy+'" fill="#5cb85c" font-size="6">流年</text>'}
        }
    }
    const cx=pad+cellW,cy=pad+cellH+32,cw=cellW*2,ch=cellH*2;
    svg+='<rect x="'+(cx+1)+'" y="'+(cy+1)+'" width="'+(cw-2)+'" height="'+(ch-2)+'" rx="4" fill="'+S.cell+'" stroke="#999"/>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+30)+'" text-anchor="middle" fill="#d4a843" font-size="14" font-weight="700">紫微斗数</text>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+48)+'" text-anchor="middle" fill="#888" font-size="9">'+fec+' · 命宫: '+soulBr+' / 身宫: '+bodyBr+'</text>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+66)+'" text-anchor="middle" fill="#d4a843" font-size="9">生年四化:</text>';
    const huaLabel={'禄':'◈','权':'▲','科':'◎','忌':'✕'};
    const huaColor={'禄':'#2e7d32','权':'#7b1fa2','科':'#1565c0','忌':'#c62828'};
    let hy2=cy+78;
    for(const sh of siHua){
        svg+='<text x="'+(cx+cw/2)+'" y="'+hy2+'" text-anchor="middle" fill="'+huaColor[sh.hua]+'" font-size="8">'+(huaLabel[sh.hua]||'')+' '+sh.star+'化'+sh.hua+' → '+sh.palace+'</text>';hy2+=12;
    }
    // 三方四正三角线（画在中心区之后，不被遮挡）
    if(selectedPalace){
        const si=BR.indexOf(selectedPalace);
        if(si>=0){
            const spPos=GRID[selectedPalace];
            if(spPos){
                const sxo=pad+spPos[0]*cellW+cellW/2,syo=pad+spPos[1]*cellH+30+cellH/2;
                [BR[(si+4)%12],BR[(si+8)%12],BR[(si+6)%12]].forEach(sfb=>{
                    const sfp=GRID[sfb];
                    if(sfp){const txo=pad+sfp[0]*cellW+cellW/2,tyo=pad+sfp[1]*cellH+30+cellH/2;
                        svg+='<line x1="'+sxo+'" y1="'+syo+'" x2="'+txo+'" y2="'+tyo+'" stroke="#7c4dff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>';}
                });
            }
        }
    }
    svg+='</svg>';
    $('zw-chart').innerHTML=svg;
    // 大限时间轴面板
    const birthY=parseInt(document.getElementById('y').value)||1991;
    const curAge=new Date().getFullYear()-birthY;
    let dp='<div style="font-weight:700;color:var(--accent);margin-bottom:8px">📅 大限时间轴 (当前 '+curAge+'岁)</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    for(const p of palaces){
        const dec=p.decadal||p.stage||{};const dr=dec.range;if(!dr)continue;
        const isCur=curAge>=dr[0]&&curAge<=dr[1];
        const bg=isCur?'background:rgba(212,168,67,.12);border-color:var(--accent)':'';const fw=isCur?'font-weight:700':'';
        dp+='<div style="padding:4px 10px;border:1px solid var(--border-light);border-radius:8px;font-size:.85em;'+bg+'"><span style="'+fw+';color:var(--accent)">'+(dec.heavenlyStem||'')+(dec.earthlyBranch||'')+'</span> '+p.name+' <span style="color:var(--text-muted)">'+dr[0]+'-'+dr[1]+'岁</span></div>';
    }
    dp+='</div>';
    $('decadal-panel').innerHTML=dp;
}
function selectPalace(br){selectedPalace=(selectedPalace===br)?null:br;renderChart()}

$('btn-analyze').addEventListener('click',async()=>{
    if(!plateData)return;$('btn-analyze').disabled=true;$('btn-analyze').textContent='⏳ 分析中...';$('analysis-section').classList.remove('hidden');$('analysis-content').innerHTML='<p style="text-align:center;color:var(--text-muted)">AI 正在解读你的紫微命盘...</p>';
    try{const r=await fetch('/api/ziwei/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plate:plateData})});const d=await r.json();if(!d.success){$('analysis-content').innerHTML='<p style="color:#ef5350">分析失败</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='🧠 重试';return}$('analysis-content').innerHTML=formatCards(d.analysis);$('btn-analyze').textContent='🔄 重新解读';$('btn-analyze').disabled=false}catch(e){$('analysis-content').innerHTML='<p style="color:#ef5350">网络错误</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='🧠 重试'}
});
function formatCards(t){t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const p=t.split(/^## /gm);if(p.length<2)return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');let h='';for(let i=1;i<p.length;i++){const l=p[i].split('\n');h+='<div class="a-card"><h2>'+l[0].trim()+'</h2><div class="body">'+l.slice(1).join('\n').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')+'</div></div>'}return h}
</script>
