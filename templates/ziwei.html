<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#1a1a24;color:#c8c8d0}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:320px;min-width:320px;background:#1a1a20;border-right:1px solid #3a3a4a;padding:16px 14px 80px;position:sticky;top:0;height:100vh;overflow-y:auto}
.sidebar h2{color:#d4a843;font-size:1rem;margin-bottom:12px;cursor:pointer}
.main{flex:1;padding:20px 24px;overflow-y:auto}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:6px 10px;margin-bottom:12px}
.frm label{font-size:.7em;color:#888}.frm input,.frm select{padding:6px 8px;font-size:.78em;border:1px solid #3a3a4a;border-radius:5px;background:#1e1e2c;color:#c8c8d0}
.btn{display:inline-flex;align-items:center;gap:4px;padding:7px 14px;border:1px solid #3a3a4a;border-radius:6px;background:#1e1e2c;color:#c8c8d0;font-size:.78em;cursor:pointer}.btn:hover{opacity:.85}
.btn-gold{background:linear-gradient(135deg,#c8a850,#8b6914);color:#fff;border:none}
.quick{width:100%;padding:8px;font-size:.82em;border:1px solid #3a3a4a;border-radius:6px;background:#1e1e2c;color:#c8c8d0;font-family:monospace;margin-bottom:8px}
.info-panel{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin:12px 0}
.info-card{background:#1e1e2c;border:1px solid #3a3a4a;border-radius:6px;padding:8px 10px;font-size:.72em}
.info-card .lbl{color:#888;font-size:.8em}.info-card .val{font-weight:600;color:#d4a843}
.patterns{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}
.pat-badge{padding:2px 7px;border-radius:10px;font-size:.68em;font-weight:600}
.pat-ex{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff}
.pat-gd{background:rgba(212,168,67,.12);color:#c8a850}
.pat-ne{background:rgba(120,120,120,.1);color:#aaa}
.pat-ca{background:rgba(198,40,40,.12);color:#ef5350}
#zw-chart{width:100%;max-width:640px;min-height:500px;margin-bottom:16px}
#zw-chart svg{width:100%;height:auto}
.horo-bar{display:flex;align-items:center;gap:8px;padding:8px 12px;background:#1e1e2c;border:1px solid #3a3a4a;border-radius:6px;margin-bottom:12px;flex-wrap:wrap}
.horo-bar label{font-size:.72em;color:#888}.horo-bar select{padding:4px 6px;font-size:.72em;background:#1a1a24;color:#c8c8d0;border:1px solid #3a3a4a;border-radius:4px}
.horo-result{font-size:.7em;color:#d4a843;margin-left:auto}
.loading{text-align:center;padding:40px;color:#888}.spinner{width:28px;height:28px;margin:0 auto 10px;border:3px solid #3a3a4a;border-top-color:#d4a843;border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.analysis{display:flex;flex-direction:column;gap:12px;margin-top:12px}
.a-card{background:#1e1e2c;border:1px solid #3a3a4a;border-radius:10px;padding:18px}
.a-card h2{font-size:.88em;color:#d4a843;margin-bottom:8px}
.a-card .body{font-size:.8em;line-height:1.7}
.a-card .body strong{color:#d4a843}
.bg-pink{background:linear-gradient(135deg,#1e1e2c,rgba(233,30,99,.03))}
.bg-blue{background:linear-gradient(135deg,#1e1e2c,rgba(33,150,243,.03))}
.bg-purple{background:linear-gradient(135deg,#1e1e2c,rgba(156,39,176,.03))}
.hidden{display:none!important}
@media(max-width:860px){.app-layout{flex-direction:column}.sidebar{width:100%;min-width:0;height:auto;position:static}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar">
    <h2 onclick="location='/'">🔮 紫微斗数</h2>
    <p style="font-size:.62em;color:#666;margin-bottom:10px">iztro JS 原版引擎 · react-iztro 风格排盘</p>
    <input class="quick" id="quick" maxlength="12" inputmode="numeric" placeholder="200508190135">
    <div class="frm">
        <div><label>历法</label><select id="cal"><option value="solar">公历</option><option value="lunar">农历</option></select></div>
        <div><label>年份</label><input id="y" type="number" value="1991" min="1900" max="2100"></div>
        <div><label>月份</label><input id="m" type="number" value="8" min="1" max="12"></div>
        <div><label>日期</label><input id="d" type="number" value="15" min="1" max="31"></div>
        <div><label>时</label><input id="h" type="number" value="1" min="0" max="23"></div>
        <div><label>分</label><input id="min" type="number" value="0" min="0" max="59"></div>
        <div><label>性别</label><select id="g"><option value="男">男</option><option value="女">女</option></select></div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:8px">
        <button id="btn-paipan" class="btn btn-gold" style="flex:1">🔮 排盘</button>
        <button id="btn-analyze" class="btn" disabled style="flex:1">🧠 解读</button>
    </div>
    <div class="info-panel">
        <div class="info-card"><div class="lbl">五行局</div><div class="val" id="i-wx">—</div></div>
        <div class="info-card"><div class="lbl">命宫/身宫</div><div class="val" id="i-ms">—</div></div>
        <div class="info-card"><div class="lbl">当前大限</div><div class="val" id="i-dl">—</div></div>
        <div class="info-card"><div class="lbl">格局</div><div class="val" id="i-pat">—</div></div>
    </div>
    <div class="patterns" id="patterns"></div>
</aside>
<main class="main">
    <div id="loading" class="loading hidden"><div class="spinner"></div><p>排盘中...</p></div>
    <div id="chart-area" class="hidden">
        <div class="horo-bar">
            <label>📅 运限</label>
            <select id="horo-scope"><option value="origin">本命</option><option value="decadal">大限</option><option value="yearly">流年</option></select>
            <button id="btn-flystar" class="btn" style="font-size:.7em;padding:4px 10px" onclick="toggleFlyStars()">✈️ 飞星全览</button>
            <span class="horo-result" id="horo-result"></span>
        </div>
        <div id="flystar-panel" class="hidden" style="background:#1e1e2c;border:1px solid #3a3a4a;border-radius:8px;padding:12px;margin-bottom:10px;font-size:.75em;max-height:300px;overflow-y:auto"></div>
        <div id="zw-chart"></div>
    </div>
    <div id="analysis-section" class="hidden">
        <div class="horo-bar"><span style="font-weight:600">📜 命盘解读</span></div>
        <div id="analysis-content" class="analysis"></div>
    </div>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let astrolabe=null,patData=null,horoData=null,selectedPalace=null;
const P_NAMES={0:'疾厄',1:'財帛',2:'子女',3:'夫妻',4:'兄弟',5:'命宮',6:'父母',7:'福德',8:'田宅',9:'官祿',10:'交友',11:'遷移'};
const BR=['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const GRID={'巳':[0,0],'午':[1,0],'未':[2,0],'申':[3,0],'辰':[0,1],'酉':[3,1],'卯':[0,2],'戌':[3,2],'寅':[0,3],'丑':[1,3],'子':[2,3],'亥':[3,3]};
const BCLR={'庙':'#d4a843','旺':'#e8a860','得':'#7cb342','利':'#5c6bc0','平':'#888','不':'#78909c','陷':'#c62828'};
const HCLR={'禄':'#2e7d32','权':'#7b1fa2','科':'#1565c0','忌':'#c62828'};
// 三方四正映射: [对宫, 三合1, 三合2]
function sansifangIdx(br){const i=BR.indexOf(br);if(i<0)return[];return[BR[(i+6)%12],BR[(i+4)%12],BR[(i+8)%12]]}
// 宫干四化表: 天干→{禄,权,科,忌}
const GAN_SIHUA={甲:{禄:'廉贞',权:'破军',科:'武曲',忌:'太阳'},乙:{禄:'天机',权:'天梁',科:'紫微',忌:'太阴'},
丙:{禄:'天同',权:'天机',科:'文昌',忌:'廉贞'},丁:{禄:'太阴',权:'天同',科:'天机',忌:'巨门'},
戊:{禄:'贪狼',权:'太阴',科:'右弼',忌:'天机'},己:{禄:'武曲',权:'贪狼',科:'天梁',忌:'文曲'},
庚:{禄:'太阳',权:'武曲',科:'太阴',忌:'天同'},辛:{禄:'巨门',权:'太阳',科:'文曲',忌:'文昌'},
壬:{禄:'天梁',权:'紫微',科:'左辅',忌:'武曲'},癸:{禄:'破军',权:'巨门',科:'太阴',忌:'贪狼'}};
const GAN_ORDER='甲乙丙丁戊己庚辛壬癸'.split('');


$('quick').addEventListener('input',function(){
    const v=this.value.replace(/\D/g,'');if(v.length<8)return;
    $('y').value=v.slice(0,4);$('m').value=parseInt(v.slice(4,6));$('d').value=parseInt(v.slice(6,8));
    if(v.length>=10)$('h').value=parseInt(v.slice(8,10));if(v.length>=12)$('min').value=parseInt(v.slice(10,12));
});
$('quick').addEventListener('keydown',e=>{if(e.key==='Enter')$('btn-paipan').click()});

function getBirthParams(){
    return{
        y:parseInt($('y').value),m:parseInt($('m').value),d:parseInt($('d').value),
        h:parseInt($('h').value),min:parseInt($('min').value||'0'),
        gender:$('g').value,cal:$('cal').value
    };
}

// ═══ 排盘 ═══
$('btn-paipan').addEventListener('click',()=>{
    const p=getBirthParams();if(!p.y||!p.m||!p.d)return;
    $('loading').classList.remove('hidden');$('chart-area').classList.add('hidden');$('analysis-section').classList.add('hidden');
    $('btn-analyze').disabled=true;

    const hourIdx=Math.floor((p.h+1)/2)%12; // 0=子...11=亥
    const isLunar=p.cal==='lunar';
    try{
        if(isLunar)astrolabe=iztro.astro.byLunar(`${p.y}-${p.m}-${p.d}`,hourIdx,p.gender,false,true,'zh-CN');
        else astrolabe=iztro.astro.bySolar(`${p.y}-${p.m}-${p.d}`,hourIdx,p.gender,true,'zh-CN');
    }catch(e){alert('排盘失败: '+e.message);$('loading').classList.add('hidden');return}

    renderChart();$('loading').classList.add('hidden');$('chart-area').classList.remove('hidden');
    $('btn-analyze').disabled=false;

    // Fetch our Python patterns from backend
    fetch('/api/ziwei/paipan',{method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({year:p.y,month:p.m,day:p.d,hour:p.h,minute:p.min,gender:p.gender,is_lunar:isLunar})
    }).then(r=>r.json()).then(d=>{
        patData=d.patterns||[];renderInfo(d);
    }).catch(()=>{});
});

function renderInfo(d){
    if(!d)return;
    $('i-wx').textContent=d.five_elements_class||'—';
    $('i-ms').textContent=(d.soul_palace||'?')+'/'+(d.body_palace||'?');
    // 当前大限
    const birthY=parseInt((d.input?.birth_datetime||'').slice(0,4));
    const age=new Date().getFullYear()-birthY;
    let dl='—';
    for(const p of d.palaces||[]){const m=(p.decadal_range||'').match(/(\d+)-(\d+)/);if(m&&age>=parseInt(m[1])&&age<=parseInt(m[2])){dl=p.name+' '+p.decadal_dizhi;break}}
    $('i-dl').textContent=dl;
    $('i-pat').textContent=patData.length?patData.length+'个格局':'—';
    // 格局badges
    const el=$('patterns');
    el.innerHTML=patData.map(p=>`<span class="pat-badge pat-${p.level==='上吉'?'ex':p.level==='吉'?'gd':p.level==='忌'?'ca':'ne'}">${p.name}</span>`).join('');
}

// ═══ 活盘渲染 ═══
function renderChart(){
    if(!astrolabe)return;
    const palaces=astrolabe.palaces();
    const fec=astrolabe.fiveElementsClass;
    const soulIdx=astrolabe.earthlyBranchOfSoulPalace;
    const bodyIdx=astrolabe.earthlyBranchOfBodyPalace;
    const scope=$('horo-scope').value;

    const W=640,H=680,pad=10,cellW=(W-2*pad)/4,cellH=(H-2*pad)/4;

    // 收集四化
    const siHua=[];for(const p of palaces)for(const s of[...p.majorStars,...p.minorStars])if(s.siHua)siHua.push({star:s.name,hua:s.siHua,palace:p.getName()});

    // 运限叠盘
    let overlay={stars:[],mutagens:[]}; // {branch->stars}
    if(scope!=='origin'&&horoData){
        // 用 horoscope API 获取运限星曜
        try{
            const h=astrolabe.horoscope(new Date(),parseInt($('h').value)||1);
            if(scope==='decadal'&&h.decadal){const d=h.decadal;if(d.stars)overlay=parseScope(d,'decadal')}
            if(scope==='yearly'&&h.yearly){const y=h.yearly;if(y.stars)overlay=parseScope(y,'yearly')}
        }catch(e){console.log('horoscope not available:',e)}
    }
    function parseScope(item,scope){const r={stars:{},mutagens:[]};if(!item||!item.stars)return r;for(const s of item.stars){const b=s.palace?.earthlyBranch||'';if(b){if(!r.stars[b])r.stars[b]=[];r.stars[b].push({name:s.name,scope});if(s.siHua)r.mutagens.push({star:s.name,hua:s.siHua});}}return r}

    // 选中宫的三方四正
    let sfSet=new Set();
    if(selectedPalace){
        const idxs=sansifangIdx(selectedPalace);
        sfSet=new Set([selectedPalace,...idxs]);
    }

    let svg=`<svg id="zw-svg" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}">`;
    svg+=`<rect width="${W}" height="${H}" fill="#1a1a24" rx="8"/>`;
    svg+=`<text x="${W/2}" y="20" text-anchor="middle" fill="#d4a843" font-size="13" font-weight="700">紫微斗数 · ${fec}</text>`;

    for(const p of palaces){
        const br=p.earthlyBranch;const st=p.heavenlyStem;
        const pos=GRID[br];if(!pos)continue;
        const x=pad+pos[0]*cellW,y=pad+pos[1]*cellH;
        const isSoul=br===soulIdx,isBody=br===bodyIdx;
        const isSF=sfSet.has(br);const isSel=br===selectedPalace;
        const stroke=isSel?'#d4a843':isSF?isSoul?'#d4a843':isBody?'#7c4dff':'#64b5f6':'#3a3a4a';
        const fill=isSel?'#2a2a38':isSF?'#222238':'#1e1e2c';
        const sw=isSel?2.5:isSF?2:isSoul||isBody?2:1;

        svg+=`<rect id="cell-${br}" x="${x+1}" y="${y+1}" width="${cellW-2}" height="${cellH-2}" rx="4" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" style="cursor:pointer" onclick="selectPalace('${br}')"/>`;
        svg+=`<text x="${x+cellW/2}" y="${y+15}" text-anchor="middle" fill="#888" font-size="14" font-weight="800" style="pointer-events:none">${br}</text>`;
        svg+=`<text x="${x+cellW/2}" y="${y+cellH-5}" text-anchor="middle" fill="${isSoul?'#c62828':'#888'}" font-size="8" font-weight="600" style="pointer-events:none">${p.getName()}</text>`;
        if(isSoul)svg+=`<text x="${x+cellW-5}" y="${y+9}" text-anchor="end" fill="#d4a843" font-size="7" font-weight="700" style="pointer-events:none">命</text>`;
        if(isBody)svg+=`<text x="${x+cellW-5}" y="${y+17}" text-anchor="end" fill="#7c4dff" font-size="7" font-weight="700" style="pointer-events:none">身</text>`;

        let sy=y+26;
        const majorStars=[...p.majorStars];
        // 叠盘星
        if(overlay.stars[br])for(const os of overlay.stars[br]){if(!majorStars.find(s=>s.name===os.name))majorStars.push(os)}
        for(const s of majorStars){
            const isScope=(s.scope||'origin')!=='origin';
            const clr=isScope?(s.scope==='decadal'?'#64b5f6':'#81c784'):(s.type==='major'?'#d4a843':s.type==='soft'?'#ce93d8':s.type==='tough'?'#5a5a6e':'#888');
            svg+=`<text x="${x+cellW/2}" y="${sy}" text-anchor="middle" fill="${clr}" font-size="${isScope?7.5:9}" font-weight="${isScope?400:600}" style="cursor:pointer" onclick="event.stopPropagation();showStarDetail('${s.name}')">${s.name}`;
            if(s.brightness)svg+=`<tspan fill="${BCLR[s.brightness]||'#888'}" font-size="6">${s.brightness}</tspan>`;
            if(s.siHua)svg+=`<tspan fill="${HCLR[s.siHua]||'#888'}" font-size="7">◈</tspan>`;
            svg+=`</text>`;sy+=11;
        }
        for(const s of (p.minorStars||[]).slice(0,3)){
            svg+=`<text x="${x+cellW/2}" y="${sy}" text-anchor="middle" fill="${s.type==='soft'?'#ce93d8':s.type==='tough'?'#5a5a6e':'#888'}" font-size="6.5" style="cursor:pointer" onclick="event.stopPropagation();showStarDetail('${s.name}')">${s.name}</text>`;sy+=9;
        }
    }
    // 中心
    const cx=pad+cellW,cy=pad+cellH,cw=cellW*2,ch=cellH*2;
    svg+=`<rect x="${cx+1}" y="${cy+1}" width="${cw-2}" height="${ch-2}" rx="4" fill="#1e1e2c" stroke="#3a3a4a"/>`;
    svg+=`<text x="${cx+cw/2}" y="${cy+24}" text-anchor="middle" fill="#d4a843" font-size="11" font-weight="700">紫微斗数</text>`;
    svg+=`<text x="${cx+cw/2}" y="${cy+44}" text-anchor="middle" fill="#888" font-size="8.5">${fec}</text>`;
    svg+=`<text x="${cx+cw/2}" y="${cy+62}" text-anchor="middle" fill="#888" font-size="8.5">命: ${soulIdx} / 身: ${bodyIdx}</text>`;
    svg+=`<text x="${cx+cw/2}" y="${cy+82}" text-anchor="middle" fill="#d4a843" font-size="8.5">${siHua.map(s=>s.star+'化'+s.hua).join('·')}</text>`;
    // 飞星信息
    if(selectedPalace){
        const selP=palaces.find(pp=>pp.earthlyBranch===selectedPalace);
        if(selP){
            const gan=selP.heavenlyStem;const fly=GAN_SIHUA[gan];
            if(fly){
                let fy=cy+100;
                svg+=`<text x="${cx+cw/2}" y="${fy}" text-anchor="middle" fill="#d4a843" font-size="8" font-weight="700">${selP.getName()}宫干${gan}→飞星:</text>`;fy+=14;
                for(const[mu,starName] of Object.entries(fly)){
                    const hc=HCLR[mu]||'#888';const em={禄:'◈',权:'▲',科:'◎',忌:'✕'};
                    // 找这颗星在哪
                    let target='?';for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===starName){target=pp.getName();break}
                    svg+=`<text x="${cx+cw/2}" y="${fy}" text-anchor="middle" fill="${hc}" font-size="7.5">${em[mu]||''} 化${mu}入${target}(${starName})</text>`;fy+=12;
                }
            }
        }
    }
    svg+=`<text id="sel-info" x="${cx+cw/2}" y="${cy+160}" text-anchor="middle" fill="#64b5f6" font-size="8"></text>`;
    svg+='</svg>';
    $('zw-chart').innerHTML=svg;
    updateSelectedInfo();
}

// ═══ 宫位交互 ═══
function selectPalace(br){
    selectedPalace=(selectedPalace===br)?null:br;
    renderChart();
}
function updateSelectedInfo(){
    if(!selectedPalace||!astrolabe)return;
    const p=astrolabe.palaces().find(pp=>pp.earthlyBranch===selectedPalace);
    if(!p)return;
    const sf=sansifangIdx(selectedPalace);
    const stars=[...p.majorStars.map(s=>s.name),...p.minorStars.map(s=>s.name)];
    const muts=[];
    for(const s of[...p.majorStars,...p.minorStars])if(s.siHua)muts.push(s.name+'化'+s.siHua);
    const txt=`${p.getName()} · 对宫${sf[0]} · 三合${sf[1]}${sf[2]} · ${stars.length?stars.slice(0,4).join('+'):'空宫'}${muts.length?' ['+muts.join(',')+']':''}`;
    const el=$('sel-info');if(el)el.textContent=txt;
    $('horo-result').textContent=p.getName()+': '+stars.slice(0,5).join('·')+(p.majorStars.length===0?' (空宫)':'')+(muts.length?' | '+muts.join('·'):'');
}

// ═══ 星曜详情 ═══
function showStarDetail(name){
    if(!astrolabe)return;
    const starInfo=astrolabe.star(name);
    if(!starInfo)return;
    const palaces=starInfo.palaces?.()||[];
    const opp=starInfo.oppositePalace?.();
    const sf=starInfo.surroundedPalaces?.()||[];
    const hasHua=starInfo.hasMutagen?.();
    const bright=starInfo.isBright?.();
    let msg=`⭐ ${name}\n`;
    if(bright!==undefined)msg+=`亮度: ${bright?'庙旺':'落陷'}\n`;
    if(hasHua)msg+=`四化: ${hasHua}\n`;
    msg+=`所在宫位: ${palaces.map(p=>p.getName()).join(',')}\n`;
    if(opp)msg+=`对宫: ${opp.getName()}\n`;
    if(sf.length)msg+=`三方四正: ${sf.map(p=>p.getName()).join(',')}`;
    alert(msg);
}

// ═══ 运限切换 ═══
$('horo-scope').addEventListener('change',()=>{
    if(!astrolabe)return;
    const scope=$('horo-scope').value;
    if(scope==='origin'){horoData=null;renderChart();$('horo-result').textContent='';return}
    try{
        const h=astrolabe.horoscope(new Date(),parseInt($('h').value)||1);
        horoData=h;
        if(scope==='decadal')$('horo-result').textContent='大限: '+h.decadal?.heavenlyStem+h.decadal?.earthlyBranch;
        if(scope==='yearly')$('horo-result').textContent='流年: '+h.yearly?.heavenlyStem+h.yearly?.earthlyBranch;
        renderChart();
    }catch(e){$('horo-result').textContent='运限数据暂不可用';horoData=null;}
});

// ═══ 飞星全览 ═══
function toggleFlyStars(){
    if(!astrolabe)return;
    const el=$('flystar-panel');
    if(!el.classList.contains('hidden')){el.classList.add('hidden');return}
    el.classList.remove('hidden');
    const palaces=astrolabe.palaces();
    const em={禄:'◈',权:'▲',科:'◎',忌:'✕'};
    let html='<div style="font-weight:700;color:#d4a843;margin-bottom:8px">✈️ 十二宫飞星全览</div>';
    for(const p of palaces){
        const gan=p.heavenlyStem;const fly=GAN_SIHUA[gan];
        if(!fly)continue;
        let items=[];
        for(const[mu,starName] of Object.entries(fly)){
            let target='?';for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===starName){target=pp.getName();break}
            items.push(`<span style="color:${HCLR[mu]||'#888'}">${em[mu]||''}化${mu}→${target}(${starName})</span>`);
        }
        html+=`<div style="margin-bottom:4px;padding:4px 8px;border-left:2px solid #d4a843;font-size:.8em"><span style="color:#d4a843;font-weight:600">${p.getName()}</span>(${gan}): ${items.join(' · ')}</div>`;
    }
    const jiStars=[];for(const p of palaces)for(const s of[...p.majorStars,...p.minorStars])if(s.siHua==='忌'){const t=P_NAMES[p.getIndex()]||p.getName();jiStars.push(`${s.name}化忌入${t}`)}
    if(jiStars.length)html+=`<div style="margin-top:8px;padding:6px 8px;background:rgba(198,40,40,.08);border-radius:6px;font-size:.78em;color:#ef5350">⚠️ 全局化忌: ${jiStars.join(' · ')}</div>`;
    el.innerHTML=html;
}

// ═══ LLM解读 (复用后端) ═══
$('btn-analyze').addEventListener('click',async()=>{
    const p=getBirthParams();if(!astrolabe)return;
    $('btn-analyze').disabled=true;$('btn-analyze').textContent='⏳...';
    $('analysis-section').classList.remove('hidden');
    $('analysis-content').innerHTML='<p style="text-align:center;color:#888">AI解读中...</p>';

    // 用iztro JS数据构建plate传给后端
    const palaces=astrolabe.palaces();
    const siHuaList=[];
    for(const p of palaces)for(const s of[...p.majorStars,...p.minorStars])
        if(s.siHua)siHuaList.push({star:s.name,mutagen:'化'+s.siHua,palace:p.getName(),branch:p.earthlyBranch});

    const plateData={
        input:{birth_datetime:`${$('y').value}-${$('m').value}-${$('d').value} ${$('h').value}:${$('min').value}`,gender:$('g').value},
        five_elements_class:astrolabe.fiveElementsClass,
        soul_palace:astrolabe.earthlyBranchOfSoulPalace,
        body_palace:astrolabe.earthlyBranchOfBodyPalace,
        palaces:[],year_mutagens:siHuaList,patterns:patData||[]
    };
    for(const pp of palaces){
        const dec=pp.decadal||pp.stage||{};
        plateData.palaces.push({
            name:pp.getName(),dizhi:pp.heavenlyStem+pp.earthlyBranch,earthly_branch:pp.earthlyBranch,
            major_stars:pp.majorStars.map(s=>({name:s.name,type:s.type,brightness:s.brightness||''})),
            minor_stars:pp.minorStars.map(s=>({name:s.name,type:s.type})),
            mutagens:[],decadal_range:dec.range?`${dec.range[0]}-${dec.range[1]}`:'',
            decadal_dizhi:(dec.heavenlyStem||'')+(dec.earthlyBranch||''),
            tags:pp===astrolabe.getSoulPalace?.()?['命宫']:pp===astrolabe.getBodyPalace?.()?['身宫']:[],
            is_empty:!pp.majorStars.length,grid_row:0,grid_col:0,index:pp.getIndex?.()||0
        });
    }

    try{
        const r=await fetch('/api/ziwei/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plate:plateData})});
        const d=await r.json();
        if(!d.success){$('analysis-content').innerHTML='<p style="color:#ef5350">分析失败: '+(d.error||'')+'</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='🧠 重试';return}
        $('analysis-content').innerHTML=formatCards(d.analysis);
        $('btn-analyze').textContent='🔄 重新解读';$('btn-analyze').disabled=false;
    }catch(e){$('analysis-content').innerHTML='<p style="color:#ef5350">网络错误</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='🧠 重试';}
});

function formatCards(text){
    text=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    const parts=text.split(/^## /gm);
    if(parts.length<2)return text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
    let html='';
    for(let i=1;i<parts.length;i++){
        const lines=parts[i].split('\n');const title=lines[0].trim();
        const body=lines.slice(1).join('\n').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');
        const bg=title.includes('感情')?'bg-pink':title.includes('大限')?'bg-blue':title.includes('流年')?'bg-purple':'';
        html+=`<div class="a-card ${bg}"><h2>${title}</h2><div class="body">${body}</div></div>`;
    }
    return html;
}
