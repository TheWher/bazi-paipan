<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>(function(){var t=localStorage.getItem('bazi_theme');if(t){document.documentElement.setAttribute('data-theme',t)}else if(window.matchMedia('(prefers-color-scheme:dark)').matches){document.documentElement.setAttribute('data-theme','dark')}})();</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#fff;--card-bg:#fff;--text:#000;--text-muted:#666;--accent:#000;--primary:#000;--primary-hover:#333;--border:#ccc;--border-light:#e5e5e5;--shadow-sm:0 0 0 1px rgba(0,0,0,.04);--shadow:0 0 0 1px rgba(0,0,0,.06);--shadow-lg:0 2px 16px rgba(0,0,0,.08);--gold:#000;--radius:18px;--radius-sm:12px}
[data-theme="dark"]{--bg:#1a1a2e;--card-bg:#16213e;--text:#e0e0e0;--text-muted:#999;--accent:#d4a843;--primary:#d4a843;--primary-hover:#e8c860;--border:#444;--border-light:#2a2a3e;--shadow-sm:0 0 0 1px rgba(255,255,255,.03);--shadow:0 0 0 1px rgba(255,255,255,.05);--shadow-lg:0 2px 16px rgba(0,0,0,.3);--gold:#d4a843}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
.hidden{display:none!important}
.app-layout{display:flex;gap:0;min-height:100vh;position:relative;z-index:1}
.app-sidebar{width:400px;min-width:400px;flex-shrink:0;background:linear-gradient(180deg,rgba(212,168,67,.03) 0%,rgba(255,255,255,0) 40%);border-right:1px solid var(--border-light);padding:32px 28px 80px;position:sticky;top:0;height:100vh;overflow-y:auto;display:flex;flex-direction:column}
.app-sidebar .app-header{text-align:left;padding:0 0 14px}
.app-sidebar .app-header h1{font-size:1.5rem;margin-bottom:2px;cursor:pointer}
.app-sidebar .subtitle{font-size:.7em;color:#999}
.app-main{flex:1;min-width:0;padding:40px 48px 80px;overflow-y:auto}
.app-sidebar .form-section{background:none;border:none;padding:0 0 40px;box-shadow:none;margin-bottom:0}
_:-ms-input-placeholder,:root .form-group{display:none}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border:1px solid var(--border);border-radius:20px;background:var(--card-bg);color:var(--text);font-size:.82em;font-weight:500;cursor:pointer;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff;border-color:var(--primary)}.btn-primary:hover{background:var(--primary-hover)}
.btn-gold{background:linear-gradient(135deg,#d4a843,#b8860b);color:#fff;border:none}
.btn-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
.quick-input-row{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.quick-input{flex:1;min-width:240px;padding:10px 14px;border:1.5px dashed var(--border);border-radius:var(--radius-sm);background:var(--card-bg);color:var(--text);font-size:1.1em;font-family:'SF Mono','Consolas','Courier New',monospace;letter-spacing:3px;text-align:center}
.quick-input:focus{outline:none;border-color:#d4a843;border-style:solid}
.quick-hint{color:#666;font-size:.72em;white-space:nowrap}
.radio-group{display:flex;gap:12px}
.radio-label{display:flex;align-items:center;gap:4px;font-size:.82em;cursor:pointer}
.sticky-actions{position:fixed;bottom:0;left:0;width:400px;background:var(--card-bg);padding:12px 28px 14px;display:flex;gap:8px;flex-wrap:wrap;border-top:1px solid var(--border-light);z-index:10;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
[data-theme="dark"] .sticky-actions{box-shadow:0 -4px 16px rgba(0,0,0,.3)}
.sticky-actions .btn{flex:1;justify-content:center;font-size:.82em;padding:8px 14px}
.floating-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:10px 16px;background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm)}
.floating-bar .bar-title{font-weight:700;font-size:.88em;color:var(--accent)}
.chart-wrapper{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);margin-bottom:18px}
.chart-wrapper svg{width:100%;height:auto;max-width:720px;display:block;margin:0 auto}
.analysis-content{font-size:.9rem;line-height:1.85;color:var(--text)}
.a-card{background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);padding:20px 22px;box-shadow:var(--shadow-sm);margin-bottom:14px}
.a-card h2{font-size:.85em;font-weight:600;color:#8b6914;margin-bottom:10px}
[data-theme="dark"] .a-card h2{color:var(--accent)}
.a-card .body{font-size:.9rem;line-height:1.85;color:var(--text)}.a-card .body strong{color:var(--accent)}
.loading-spinner{text-align:center;padding:60px;color:var(--text-muted)}.spinner{width:32px;height:32px;margin:0 auto 12px;border:3px solid var(--border-light);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}@keyframes spin{to{transform:rotate(360deg)}}
.pattern-row{display:flex;flex-wrap:wrap;gap:6px;margin-left:auto}.pat-badge{display:inline-flex;align-items:center;gap:3px;padding:3px 10px;border-radius:12px;font-size:.7em;font-weight:600}.pat-ex{background:linear-gradient(135deg,#d4a843,#8b6914);color:#fff}.pat-gd{background:rgba(212,168,67,.12);color:var(--gold)}.pat-ne{background:rgba(120,120,120,.08);color:var(--text-muted)}.pat-ca{background:rgba(198,40,40,.1);color:#ef5350}
.toolbar-btn{padding:4px 10px;font-size:.7em}
@media(max-width:860px){.app-layout{flex-direction:column}.app-sidebar{width:100%;min-width:0;height:auto;position:static;border-right:none;padding:20px 16px 16px}.app-main{padding:20px 16px 80px}.sticky-actions{width:100%}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="app-sidebar">
    <header class="app-header">
        <h1 onclick="location='/'">зҙ«еҫ®ж–—ж•° <button id="btn-theme" onclick="toggleTheme()" title="еҲҮжҚўж—Ҙ/еӨңжЁЎејҸ" style="background:none;border:1px solid var(--border);border-radius:50%;width:32px;height:32px;cursor:pointer;font-size:16px;line-height:1;vertical-align:middle;margin-left:4px">рҹҢҷ</button></h1>
        <p class="subtitle">iztro JS еҺҹзүҲеј•ж“Һ В· е‘Ҫзӣҳи§ЈиҜ»</p>
    </header>
    <section class="form-section">
        <input type="text" id="quick" class="quick-input" maxlength="12" inputmode="numeric" placeholder="200508190135">
        <p class="quick-hint">еҝ«жҚ·иҫ“е…Ҙ 200508190135 вҶ’ иҮӘеҠЁеЎ«иЎЁ</p>
        <div style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius);overflow:hidden;margin:14px 0">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent);min-width:32px">еҺҶжі•</span>
                <div class="radio-group" style="flex:1"><label class="radio-label"><input type="radio" name="cal" value="solar" checked> е…¬еҺҶ</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="cal" value="lunar"> еҶңеҺҶ</label></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">е№ҙ</label><input type="number" id="y" value="1991" min="1900" max="2100" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">жңҲ</label><input type="number" id="m" value="8" min="1" max="12" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">ж—Ҙ</label><input type="number" id="d" value="15" min="1" max="31" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="display:flex;border-bottom:1px solid var(--border-light)">
                <div style="flex:1;padding:12px 16px;border-right:1px solid var(--border-light)"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">ж—¶</label><input type="number" id="h" value="1" min="0" max="23" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
                <div style="flex:1;padding:12px 16px"><label style="display:block;font-size:.68em;color:var(--text-muted);margin-bottom:4px">еҲҶ</label><input type="number" id="min" value="0" min="0" max="59" style="width:100%;border:none;padding:4px 0;font-size:1em;background:transparent;color:var(--text);outline:none"></div>
            </div>
            <div style="padding:14px 16px;display:flex;align-items:center;gap:12px">
                <span style="font-weight:600;font-size:.8em;color:var(--accent);min-width:32px">жҖ§еҲ«</span>
                <div class="radio-group" style="flex:1"><label class="radio-label"><input type="radio" name="g" value="з”·" checked> з”·</label><label class="radio-label" style="margin-left:16px"><input type="radio" name="g" value="еҘі"> еҘі</label></div>
            </div>
        </div>
    </section>
    <div class="sticky-actions">
        <button id="btn-render" class="btn btn-gold">рҹ”® жҺ’зӣҳ</button>
        <button id="btn-analyze" class="btn btn-gold" disabled>рҹ§  AI и§ЈиҜ»</button>
    </div>
</aside>
<main class="app-main">
    <section id="welcome-section"><div style="text-align:center;padding:120px 40px;color:var(--text-muted)"><div style="font-size:3em;margin-bottom:16px">рҹ”®</div><p style="font-size:1em;margin-bottom:8px">иҫ“е…ҘеҮәз”ҹдҝЎжҒҜпјҢзӮ№еҮ»гҖҢжҺ’зӣҳгҖҚејҖе§ӢеҲҶжһҗ</p><p style="font-size:.75em">iztro JS еҺҹзүҲеј•ж“Һ В· зҙ«еҫ®ж–—ж•°е‘Ҫзӣҳи§ЈиҜ»</p></div></section>
    <section id="loading-section" class="hidden"><div class="loading-spinner"><div class="spinner"></div><p>зҙ«еҫ®жҺ’зӣҳдёӯ...</p></div></section>
    <section id="chart-section" class="hidden">
        <div class="floating-bar"><span class="bar-title">рҹ”® зҙ«еҫ®е‘Ҫзӣҳ</span>
            <select id="horo-scope" style="padding:4px 8px;font-size:.74em;border:1px solid var(--border);border-radius:6px;background:var(--card-bg);color:var(--text)"><option value="origin">жң¬е‘Ҫ</option><option value="decadal">еӨ§йҷҗ</option><option value="yearly">жөҒе№ҙ</option></select>
            <button id="btn-flystar" class="btn" style="font-size:.7em;padding:3px 10px" onclick="toggleFlyStars()">вңҲпёҸ йЈһжҳҹ</button>
            <span id="horo-result" style="font-size:.7em;color:var(--accent)"></span>
            <div class="pattern-row" id="patterns"></div>
        </div>
        <div id="flystar-panel" class="hidden" style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:12px;margin-bottom:10px;font-size:.74em;max-height:260px;overflow-y:auto"></div>
        <div class="chart-wrapper" id="zw-chart"></div>
        <div id="decadal-panel" style="background:var(--card-bg);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:14px 18px;margin-top:14px;font-size:.78em"></div>
    </section>
    <section id="analysis-section" class="hidden">
        <div class="floating-bar"><span class="bar-title">рҹ“ң е‘Ҫзӣҳи§ЈиҜ»</span></div>
        <div id="analysis-content" class="analysis-content"></div>
    </section>
</main>
</div>
<script src="https://cdn.jsdelivr.net/npm/iztro/dist/iztro.min.js"></script>
<script>
const $=id=>document.getElementById(id);
let astrolabe=null,plateData=null,selectedPalace=null;
(function(){const t=localStorage.getItem('bazi_theme');document.getElementById('btn-theme').textContent=t==='dark'?'вҳҖпёҸ':'рҹҢҷ'})();
function toggleTheme(){const c=document.documentElement.getAttribute('data-theme'),n=c==='dark'?'':'dark';document.documentElement.setAttribute('data-theme',n);localStorage.setItem('bazi_theme',n);document.getElementById('btn-theme').textContent=n==='dark'?'вҳҖпёҸ':'рҹҢҷ';if(astrolabe)renderChart()}
document.getElementById('horo-scope').addEventListener('change',()=>{if(astrolabe)renderChart()});

const GAN_SIHUA={з”І:{зҰ„:'е»үиҙһ',жқғ:'з ҙеҶӣ',з§‘:'жӯҰжӣІ',еҝҢ:'еӨӘйҳі'},д№ҷ:{зҰ„:'еӨ©жңә',жқғ:'еӨ©жўҒ',з§‘:'зҙ«еҫ®',еҝҢ:'еӨӘйҳҙ'},дёҷ:{зҰ„:'еӨ©еҗҢ',жқғ:'еӨ©жңә',з§‘:'ж–ҮжҳҢ',еҝҢ:'е»үиҙһ'},дёҒ:{зҰ„:'еӨӘйҳҙ',жқғ:'еӨ©еҗҢ',з§‘:'еӨ©жңә',еҝҢ:'е·Ёй—Ё'},жҲҠ:{зҰ„:'иҙӘзӢј',жқғ:'еӨӘйҳҙ',з§‘:'еҸіејј',еҝҢ:'еӨ©жңә'},е·ұ:{зҰ„:'жӯҰжӣІ',жқғ:'иҙӘзӢј',з§‘:'еӨ©жўҒ',еҝҢ:'ж–ҮжӣІ'},еәҡ:{зҰ„:'еӨӘйҳі',жқғ:'жӯҰжӣІ',з§‘:'еӨӘйҳҙ',еҝҢ:'еӨ©еҗҢ'},иҫӣ:{зҰ„:'е·Ёй—Ё',жқғ:'еӨӘйҳі',з§‘:'ж–ҮжӣІ',еҝҢ:'ж–ҮжҳҢ'},еЈ¬:{зҰ„:'еӨ©жўҒ',жқғ:'зҙ«еҫ®',з§‘:'е·Ұиҫ…',еҝҢ:'жӯҰжӣІ'},зҷё:{зҰ„:'з ҙеҶӣ',жқғ:'е·Ёй—Ё',з§‘:'еӨӘйҳҙ',еҝҢ:'иҙӘзӢј'}};
function toggleFlyStars(){if(!astrolabe)return;const el=$('flystar-panel');if(!el.classList.contains('hidden')){el.classList.add('hidden');return}el.classList.remove('hidden');const palaces=Array.isArray(astrolabe.palaces)?astrolabe.palaces:typeof astrolabe.palaces==='function'?astrolabe.palaces():[];let html='<div style="font-weight:700;color:var(--accent);margin-bottom:6px">вңҲпёҸ еҚҒдәҢе®«йЈһжҳҹ</div>';for(const p of palaces){const gan=p.heavenlyStem;const fly=GAN_SIHUA[gan];if(!fly)continue;let items=[];for(const[mu,sn]of Object.entries(fly)){let tgt='?';for(const pp of palaces)for(const s of[...pp.majorStars,...pp.minorStars])if(s.name===sn){tgt=pp.name;break}items.push('<span style="color:'+(mu==='зҰ„'?'#2e7d32':mu==='жқғ'?'#7b1fa2':mu==='з§‘'?'#1565c0':'#c62828')+'">еҢ–'+mu+'вҶ’'+tgt+'</span>')}html+='<div style="padding:2px 6px;border-left:2px solid var(--accent);margin-bottom:3px;font-size:.85em"><b style="color:var(--accent)">'+p.name+'</b>('+gan+'): '+items.join('В·')+'</div>'}el.innerHTML=html}

document.getElementById('quick').addEventListener('input',function(){const v=this.value.replace(/\D/g,'');if(v.length<8)return;document.getElementById('y').value=v.slice(0,4);document.getElementById('m').value=parseInt(v.slice(4,6));document.getElementById('d').value=parseInt(v.slice(6,8));if(v.length>=10)document.getElementById('h').value=parseInt(v.slice(8,10));if(v.length>=12)document.getElementById('min').value=parseInt(v.slice(10,12))});
document.getElementById('quick').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('btn-render').click()});

function getB(){const c=document.querySelector('input[name="cal"]:checked')?.value||'solar';const g=document.querySelector('input[name="g"]:checked')?.value||'з”·';return{y:parseInt(document.getElementById('y').value),m:parseInt(document.getElementById('m').value),d:parseInt(document.getElementById('d').value),h:parseInt(document.getElementById('h').value),min:parseInt(document.getElementById('min').value||'0'),gender:g,cal:c}}

document.getElementById('btn-render').addEventListener('click',()=>{
    const b=getB();if(!b.y||!b.m||!b.d)return;
    $('welcome-section').classList.add('hidden');$('loading-section').classList.remove('hidden');$('chart-section').classList.add('hidden');$('analysis-section').classList.add('hidden');
    const hi=Math.floor((b.h+1)/2)%12;
    try{
        astrolabe=b.cal==='lunar'?iztro.astro.byLunar(b.y+'-'+b.m+'-'+b.d,hi,b.gender,false,true,'zh-CN'):iztro.astro.bySolar(b.y+'-'+b.m+'-'+b.d,hi,b.gender,true,'zh-CN');
    }catch(e){$('loading-section').innerHTML='<p style="color:#ef5350">жҺ’зӣҳеӨұиҙҘ: '+e.message+'</p>';return}
    try{renderChart()}catch(e){$('loading-section').innerHTML='<p style="color:#ef5350">жёІжҹ“еӨұиҙҘ: '+e.message+'</p>';return}
    $('loading-section').classList.add('hidden');$('chart-section').classList.remove('hidden');$('btn-analyze').disabled=false;
    // иҺ·еҸ–ж јеұҖ
    fetch('/api/ziwei/paipan',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({year:b.y,month:b.m,day:b.d,hour:b.h,minute:b.min,gender:b.gender,is_lunar:b.cal==='lunar'})}).then(r=>r.json()).then(d=>{plateData=d;const p=d.patterns||[];$('patterns').innerHTML=p.map(pp=>'<span class="pat-badge pat-'+(pp.level==='дёҠеҗү'?'ex':pp.level==='еҗү'?'gd':pp.level==='еҝҢ'?'ca':'ne')+'">'+pp.name+'</span>').join('');}).catch(()=>{});
});

function renderChart(){
    if(!astrolabe)return;
    const isDark=document.documentElement.getAttribute('data-theme')==='dark';
    const S={bg:isDark?'#19192b':'#fff',cell:isDark?'#1a1a2e':'#fafafa',border:isDark?'#999':'#ccc',text:isDark?'#888':'#666',gold:'#d4a843'};
    const palaces=Array.isArray(astrolabe.palaces)?astrolabe.palaces:typeof astrolabe.palaces==='function'?astrolabe.palaces():[];
    const soulBr=astrolabe.earthlyBranchOfSoulPalace,bodyBr=astrolabe.earthlyBranchOfBodyPalace,fec=astrolabe.fiveElementsClass;
    const scope=document.getElementById('horo-scope').value;let horoscope=null;
    if(scope!=='origin')try{horoscope=astrolabe.horoscope(new Date(),parseInt(document.getElementById('h').value)||1)}catch(e){}
    const siHua=[];for(const p of palaces)for(const s of[...p.majorStars,...p.minorStars])if(s.mutagen)siHua.push({star:s.name,hua:s.mutagen,palace:p.name});

    const W=640,H=780,pad=10,cellW=(W-2*pad)/4,cellH=(H-2*pad-20)/4;
    const GRID={'е·і':[0,0],'еҚҲ':[1,0],'жңӘ':[2,0],'з”і':[3,0],'иҫ°':[0,1],'й…ү':[3,1],'еҚҜ':[0,2],'жҲҢ':[3,2],'еҜ…':[0,3],'дё‘':[1,3],'еӯҗ':[2,3],'дәҘ':[3,3]};
    const BR=['еӯҗ','дё‘','еҜ…','еҚҜ','иҫ°','е·і','еҚҲ','жңӘ','з”і','й…ү','жҲҢ','дәҘ'];
    const sfSet=new Set();if(selectedPalace){const i=BR.indexOf(selectedPalace);if(i>=0){sfSet.add(selectedPalace);sfSet.add(BR[(i+6)%12]);sfSet.add(BR[(i+4)%12]);sfSet.add(BR[(i+8)%12])}}

    let svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 '+W+' '+H+'">';
    svg+='<rect width="'+W+'" height="'+H+'" fill="'+S.bg+'" rx="8"/>';
    svg+='<text x="'+W/2+'" y="20" text-anchor="middle" fill="#d4a843" font-size="13" font-weight="700">зҙ«еҫ®ж–—ж•° В· '+fec+'</text>';

    for(const p of palaces){
        const br=p.earthlyBranch;if(!br)continue;const pos=GRID[br];if(!pos)continue;
        const x=pad+pos[0]*cellW,y=pad+pos[1]*cellH+30;
        const isSoul=br===soulBr,isBody=br===bodyBr,isSF=sfSet.has(br),isSel=br===selectedPalace;
        const stroke=isSel?'#d4a843':isSF?'#64b5f6':isSoul?'#d4a843':isBody?'#7c4dff':'#999';
        svg+='<rect x="'+(x+1)+'" y="'+(y+1)+'" width="'+(cellW-2)+'" height="'+(cellH-2)+'" rx="4" fill="'+S.cell+'" stroke="'+stroke+'" stroke-width="'+(isSel?2.5:isSF||isSoul||isBody?2:1)+'" style="cursor:pointer" onclick="selectPalace(\''+br+'\')"/>';
        svg+='<text x="'+(x+cellW/2)+'" y="'+(y+14)+'" text-anchor="middle" fill="#888" font-size="13" font-weight="800" style="pointer-events:none">'+br+'</text>';
        svg+='<text x="'+(x+cellW/2)+'" y="'+(y+cellH-5)+'" text-anchor="middle" fill="'+(isSoul?'#c62828':'#888')+'" font-size="8" font-weight="600" style="pointer-events:none">'+p.name+'</text>';
        if(isSoul)svg+='<text x="'+(x+cellW-6)+'" y="'+(y+9)+'" text-anchor="end" fill="#d4a843" font-size="7" font-weight="700" style="pointer-events:none">е‘Ҫ</text>';
        if(isBody)svg+='<text x="'+(x+cellW-6)+'" y="'+(y+16)+'" text-anchor="end" fill="#7c4dff" font-size="7" font-weight="700" style="pointer-events:none">иә«</text>';

        let sy=y+26;
        // дё»жҳҹпјҲеӨ§еӯ—пјү
        for(const s of p.majorStars){
            const clr=s.type==='major'?'#d4a843':s.type==='soft'?'#ce93d8':s.type==='tough'?'#5a5a6e':'#888';
            svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="'+clr+'" font-size="9" font-weight="600">'+s.name;
            if(s.brightness)svg+='<tspan fill="'+(s.brightness==='еәҷ'?'#d4a843':s.brightness==='ж—ә'?'#e8a860':s.brightness==='йҷ·'?'#c62828':'#888')+'" font-size="6">'+s.brightness+'</tspan>';
            if(s.mutagen)svg+='<tspan fill="'+(s.mutagen==='зҰ„'?'#2e7d32':s.mutagen==='жқғ'?'#7b1fa2':s.mutagen==='з§‘'?'#1565c0':'#c62828')+'" font-size="7">в—Ҳ</tspan>';
            svg+='</text>';sy+=11;
        }
        // иҫ…жҳҹвҖ”вҖ”е…ЁжҳҫзӨәпјҢеҗүжҳҹзҙ«иүІ/з…һжҳҹзҒ°иүІеҲҶиЎҢ
        const minors=p.minorStars||[];
        const ausp=minors.filter(s=>s.type==='soft'||s.type==='tianma'||s.type==='lucun');
        const sha=minors.filter(s=>s.type==='tough');
        if(ausp.length){
            svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#ce93d8" font-size="6.5">'+ausp.map(s=>s.name).join(' ')+'</text>';sy+=8;
        }
        if(sha.length){
            svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#5a5a6e" font-size="6.5">'+sha.map(s=>s.name).join(' ')+'</text>';sy+=8;
        }
        // еҚҒдәҢй•ҝз”ҹ + еҚҡеЈ«еҚҒдәҢзҘһ + еІҒеүҚ
        const cs12=p.changsheng12||'',bs12=p.boshi12||'',sq12=p.suiqian12||'';
        if(cs12)svg+='<text x="'+(x+cellW/2)+'" y="'+sy+'" text-anchor="middle" fill="#888" font-size="5.5">'+cs12+(bs12?'В·'+bs12:'')+(sq12?'В·'+sq12:'')+'</text>';sy+=7;
        // иҝҗйҷҗж Үи®°
        let hy=y+cellH-12;
        if(horoscope){
            if(horoscope.decadal&&horoscope.decadal.index===p.index){svg+='<text x="'+(x+3)+'" y="'+hy+'" fill="#4a9eff" font-size="6">еӨ§йҷҗ</text>';hy-=7}
            if(horoscope.yearly&&horoscope.yearly.index===p.index){svg+='<text x="'+(x+3)+'" y="'+hy+'" fill="#5cb85c" font-size="6">жөҒе№ҙ</text>'}
        }
    }
    const cx=pad+cellW,cy=pad+cellH+30,cw=cellW*2,ch=cellH*2;
    svg+='<rect x="'+(cx+1)+'" y="'+(cy+1)+'" width="'+(cw-2)+'" height="'+(ch-2)+'" rx="4" fill="'+S.cell+'" stroke="#999"/>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+28)+'" text-anchor="middle" fill="#d4a843" font-size="12" font-weight="700">зҙ«еҫ®ж–—ж•°</text>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+46)+'" text-anchor="middle" fill="#888" font-size="8">'+fec+' В· е‘Ҫе®«: '+soulBr+' / иә«е®«: '+bodyBr+'</text>';
    svg+='<text x="'+(cx+cw/2)+'" y="'+(cy+64)+'" text-anchor="middle" fill="#d4a843" font-size="7.5">з”ҹе№ҙеӣӣеҢ–:</text>';
    const huaLabel={'зҰ„':'в—Ҳ','жқғ':'в–І','з§‘':'в—Һ','еҝҢ':'вң•'};
    const huaColor={'зҰ„':'#2e7d32','жқғ':'#7b1fa2','з§‘':'#1565c0','еҝҢ':'#c62828'};
    let hy2=cy+76;
    for(const sh of siHua){
        svg+='<text x="'+(cx+cw/2)+'" y="'+hy2+'" text-anchor="middle" fill="'+huaColor[sh.hua]+'" font-size="7">'+(huaLabel[sh.hua]||'')+' '+sh.star+'еҢ–'+sh.hua+' вҶ’ '+sh.palace+'</text>';hy2+=11;
    }
    // дёүж–№еӣӣжӯЈдёүи§’зәҝпјҲз”»еңЁдёӯеҝғеҢәд№ӢеҗҺпјҢдёҚиў«йҒ®жҢЎпјү
    if(selectedPalace){
        const si=BR.indexOf(selectedPalace);
        if(si>=0){
            const spPos=GRID[selectedPalace];
            if(spPos){
                const sxo=pad+spPos[0]*cellW+cellW/2,syo=pad+spPos[1]*cellH+30+cellH/2;
                [BR[(si+4)%12],BR[(si+8)%12],BR[(si+6)%12]].forEach(sfb=>{
                    const sfp=GRID[sfb];
                    if(sfp){const txo=pad+sfp[0]*cellW+cellW/2,tyo=pad+sfp[1]*cellH+30+cellH/2;
                        svg+='<line x1="'+sxo+'" y1="'+syo+'" x2="'+txo+'" y2="'+tyo+'" stroke="#7c4dff" stroke-width="1.5" opacity="0.5" stroke-dasharray="3,3"/>';}
                });
            }
        }
    }
    svg+='</svg>';
    $('zw-chart').innerHTML=svg;
    // еӨ§йҷҗж—¶й—ҙиҪҙйқўжқҝ
    const birthY=parseInt(document.getElementById('y').value)||1991;
    const curAge=new Date().getFullYear()-birthY;
    let dp='<div style="font-weight:700;color:var(--accent);margin-bottom:8px">рҹ“… еӨ§йҷҗж—¶й—ҙиҪҙ (еҪ“еүҚ '+curAge+'еІҒ)</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
    for(const p of palaces){
        const dec=p.decadal||p.stage||{};const dr=dec.range;if(!dr)continue;
        const isCur=curAge>=dr[0]&&curAge<=dr[1];
        const bg=isCur?'background:rgba(212,168,67,.12);border-color:var(--accent)':'';const fw=isCur?'font-weight:700':'';
        dp+='<div style="padding:4px 10px;border:1px solid var(--border-light);border-radius:8px;font-size:.85em;'+bg+'"><span style="'+fw+';color:var(--accent)">'+(dec.heavenlyStem||'')+(dec.earthlyBranch||'')+'</span> '+p.name+' <span style="color:var(--text-muted)">'+dr[0]+'-'+dr[1]+'еІҒ</span></div>';
    }
    dp+='</div>';
    $('decadal-panel').innerHTML=dp;
}
function selectPalace(br){selectedPalace=(selectedPalace===br)?null:br;renderChart()}

$('btn-analyze').addEventListener('click',async()=>{
    if(!plateData)return;$('btn-analyze').disabled=true;$('btn-analyze').textContent='вҸі еҲҶжһҗдёӯ...';$('analysis-section').classList.remove('hidden');$('analysis-content').innerHTML='<p style="text-align:center;color:var(--text-muted)">AI жӯЈеңЁи§ЈиҜ»дҪ зҡ„зҙ«еҫ®е‘Ҫзӣҳ...</p>';
    try{const r=await fetch('/api/ziwei/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({plate:plateData})});const d=await r.json();if(!d.success){$('analysis-content').innerHTML='<p style="color:#ef5350">еҲҶжһҗеӨұиҙҘ</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='рҹ§  йҮҚиҜ•';return}$('analysis-content').innerHTML=formatCards(d.analysis);$('btn-analyze').textContent='рҹ”„ йҮҚж–°и§ЈиҜ»';$('btn-analyze').disabled=false}catch(e){$('analysis-content').innerHTML='<p style="color:#ef5350">зҪ‘з»ңй”ҷиҜҜ</p>';$('btn-analyze').disabled=false;$('btn-analyze').textContent='рҹ§  йҮҚиҜ•'}
});
function formatCards(t){t=t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');const p=t.split(/^## /gm);if(p.length<2)return t.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');let h='';for(let i=1;i<p.length;i++){const l=p[i].split('\n');h+='<div class="a-card"><h2>'+l[0].trim()+'</h2><div class="body">'+l.slice(1).join('\n').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>')+'</div></div>'}return h}
</script>
