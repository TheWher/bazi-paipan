<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>八字排盘</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <!-- 标题 -->
        <header class="app-header">
            <h1>八字排盘</h1>
            <p class="subtitle">输入出生信息，一键排出完整命盘并生成 PDF 报告</p>
        </header>

        <!-- 表单 -->
        <section class="form-section">
            <div class="form-grid">
                <!-- 出生日期 -->
                <div class="form-group">
                    <label>出生年份</label>
                    <input type="number" id="year" placeholder="2005" min="1900" max="2100" value="2005">
                </div>
                <div class="form-group">
                    <label>月份</label>
                    <input type="number" id="month" placeholder="8" min="1" max="12" value="8">
                </div>
                <div class="form-group">
                    <label>日期</label>
                    <input type="number" id="day" placeholder="19" min="1" max="31" value="19">
                </div>
                <div class="form-group">
                    <label>时（24小时制）</label>
                    <input type="number" id="hour" placeholder="1" min="0" max="23" value="1">
                </div>
                <div class="form-group">
                    <label>分</label>
                    <input type="number" id="minute" placeholder="35" min="0" max="59" value="35">
                </div>

                <!-- 性别 -->
                <div class="form-group">
                    <label>性别</label>
                    <div class="radio-group">
                        <label class="radio-label">
                            <input type="radio" name="gender" value="男" checked> 男
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="gender" value="女"> 女
                        </label>
                    </div>
                </div>

                <!-- 出生地 -->
                <div class="form-group form-wide">
                    <label>出生地点</label>
                    <div class="location-row">
                        <div class="location-input-wrap">
                            <input type="text" id="location" placeholder="输入城市名，如：东莞" autocomplete="off">
                            <div id="city-suggestions" class="city-suggestions hidden"></div>
                        </div>
                        <button id="btn-geocode" class="btn btn-secondary">🔍 查询</button>
                    </div>
                    <div id="geocode-status" class="geocode-status hidden"></div>
                </div>

                <!-- 经度（隐藏，查询后填充） -->
                <input type="hidden" id="longitude" value="113.75">
            </div>

            <!-- 操作按钮 -->
            <div class="btn-row">
                <button id="btn-paipan" class="btn btn-primary btn-lg">⚡ 开始排盘</button>
                <button id="btn-analyze" class="btn btn-gold btn-lg" disabled>🧠 深度分析</button>
                <button id="btn-pdf" class="btn btn-accent btn-lg" disabled>📥 下载 PDF</button>
            </div>
        </section>

        <!-- 加载状态 -->
        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p id="loading-text">计算中...</p>
        </div>

        <!-- 错误信息 -->
        <div id="error-box" class="error-box hidden"></div>

        <!-- 排盘结果 -->
        <section id="result-section" class="result-section hidden">
            <!-- 基本输入回显 -->
            <div class="card">
                <h2 class="card-title">📋 基本信息</h2>
                <div class="info-grid" id="basic-info"></div>
            </div>

            <!-- 四柱命盘 -->
            <div class="card">
                <h2 class="card-title">🏛️ 四柱命盘</h2>
                <div class="table-scroll">
                    <table class="bazi-table" id="pillars-table">
                        <thead>
                            <tr>
                                <th></th>
                                <th>年柱</th>
                                <th>月柱</th>
                                <th>日柱</th>
                                <th>时柱</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr id="row-ganzhi"></tr>
                            <tr id="row-tiangan"></tr>
                            <tr id="row-dizhi"></tr>
                            <tr id="row-shishen"></tr>
                            <tr id="row-nayin"></tr>
                            <tr id="row-changsheng"></tr>
                            <tr id="row-canggan"></tr>
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 起运与大运 -->
            <div class="card">
                <h2 class="card-title">🔄 起运与大运</h2>
                <div id="qiyun-info" class="info-grid"></div>
                <div class="table-scroll">
                    <table class="bazi-table" id="dayun-table">
                        <thead>
                            <tr>
                                <th>步数</th>
                                <th>干支</th>
                                <th>年龄</th>
                                <th>年份</th>
                            </tr>
                        </thead>
                        <tbody id="dayun-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- 神煞速览 -->
            <div class="card">
                <h2 class="card-title">🔮 神煞速览</h2>
                <div id="shensha-info" class="info-grid"></div>
            </div>
        </section>

        <!-- 深度分析结果 -->
        <section id="analysis-section" class="result-section hidden">
            <div class="card">
                <h2 class="card-title">🧠 Agent 深度分析</h2>
                <div id="analysis-meta" class="analysis-meta"></div>
                <div id="analysis-content" class="analysis-content"></div>
            </div>
            <div class="btn-row">
                <button id="btn-analysis-pdf" class="btn btn-accent btn-lg">📥 下载含分析 PDF</button>
            </div>
        </section>

        <!-- 页脚 -->
        <footer class="app-footer">
            <div class="footer-access" id="footer-access">
                <div class="access-title">📱 手机 / 其他设备访问</div>
                <div class="access-urls" id="access-urls">
                    <span class="loading-text">检测中...</span>
                </div>
                <div class="access-qr" id="access-qr"></div>
                <div class="access-hint">
                    ⚠️ 手机和电脑需连接<strong>同一 WiFi</strong>才能通过局域网地址访问<br>
                    如需外网访问，请在命令行运行：<code>cloudflared tunnel --url http://localhost:5000</code>
                </div>
            </div>
            <hr class="footer-divider">
            <p>基于 <a href="https://github.com/yuangu/sxtwl" target="_blank">sxtwl 寿星天文历</a> 精确排盘</p>
            <p>真太阳时校正 · 五鼠遁起时 · 节气定月 · 起运精确到天</p>
        </footer>
    </div>

    <script>
        // ============================================================
        // 全局状态
        // ============================================================
        let plateData = null;       // 排盘结果
        let geocodeSelected = {     // 选中的经纬度
            lon: 113.75,
            lat: 23.02,
            display_name: ''
        };

        // ============================================================
        // DOM 引用
        // ============================================================
        const $ = (id) => document.getElementById(id);

        const elYear = $('year');
        const elMonth = $('month');
        const elDay = $('day');
        const elHour = $('hour');
        const elMinute = $('minute');
        const elLocation = $('location');
        const elLongitude = $('longitude');
        const elGeocodeStatus = $('geocode-status');
        const elBtnGeocode = $('btn-geocode');
        const elBtnPaipan = $('btn-paipan');
        const elBtnPdf = $('btn-pdf');
        const elLoading = $('loading');
        const elLoadingText = $('loading-text');
        const elErrorBox = $('error-box');
        const elResultSection = $('result-section');
        const elSuggestions = $('city-suggestions');

        // ============================================================
        // 工具函数
        // ============================================================
        function showLoading(text) {
            elLoadingText.textContent = text || '计算中...';
            elLoading.classList.remove('hidden');
            elErrorBox.classList.add('hidden');
        }

        function hideLoading() {
            elLoading.classList.add('hidden');
        }

        function showError(msg) {
            elErrorBox.textContent = '❌ ' + msg;
            elErrorBox.classList.remove('hidden');
            hideLoading();
        }

        function hideError() {
            elErrorBox.classList.add('hidden');
        }

        // ============================================================
        // 城市自动补全
        // ============================================================
        let suggestTimer = null;
        let suggestIndex = -1;

        elLocation.addEventListener('input', () => {
            clearTimeout(suggestTimer);
            const q = elLocation.value.trim();
            if (q.length < 1) {
                elSuggestions.classList.add('hidden');
                return;
            }
            suggestTimer = setTimeout(() => fetchSuggestions(q), 200);
        });

        elLocation.addEventListener('keydown', (e) => {
            const items = elSuggestions.querySelectorAll('.city-suggestion-item');
            if (e.key === 'ArrowDown') {
                e.preventDefault();
                suggestIndex = Math.min(suggestIndex + 1, items.length - 1);
                updateActiveSuggestion(items);
            } else if (e.key === 'ArrowUp') {
                e.preventDefault();
                suggestIndex = Math.max(suggestIndex - 1, 0);
                updateActiveSuggestion(items);
            } else if (e.key === 'Enter') {
                if (suggestIndex >= 0 && items.length > 0) {
                    e.preventDefault();
                    items[suggestIndex].click();
                }
            } else if (e.key === 'Escape') {
                elSuggestions.classList.add('hidden');
                suggestIndex = -1;
            }
        });

        elLocation.addEventListener('blur', () => {
            setTimeout(() => elSuggestions.classList.add('hidden'), 150);
        });

        function updateActiveSuggestion(items) {
            items.forEach((item, i) => {
                item.classList.toggle('active', i === suggestIndex);
            });
        }

        async function fetchSuggestions(q) {
            try {
                const resp = await fetch(`/api/cities?q=${encodeURIComponent(q)}`);
                const data = await resp.json();
                if (!data.results || data.results.length === 0) {
                    elSuggestions.classList.add('hidden');
                    return;
                }
                suggestIndex = -1;
                elSuggestions.innerHTML = data.results.map((r, i) => `
                    <div class="city-suggestion-item" data-index="${i}"
                         data-lon="${r.lon}" data-lat="${r.lat}" data-name="${r.display_name}">
                        <span class="city-name">${r.display_name}</span>
                        <span class="city-info">${r.lon.toFixed(2)}°E</span>
                    </div>
                `).join('');
                elSuggestions.classList.remove('hidden');

                // 点击事件
                elSuggestions.querySelectorAll('.city-suggestion-item').forEach(item => {
                    item.addEventListener('mousedown', (e) => {
                        e.preventDefault();
                        selectCity({
                            lon: parseFloat(item.dataset.lon),
                            lat: parseFloat(item.dataset.lat),
                            display_name: item.dataset.name,
                        });
                    });
                });
            } catch (err) {
                // 静默失败
            }
        }

        function selectCity(city) {
            geocodeSelected = city;
            elLocation.value = city.display_name;
            elLongitude.value = city.lon.toFixed(4);
            elSuggestions.classList.add('hidden');
            elGeocodeStatus.innerHTML = `
                <span class="geocode-ok">✅ 已定位：${city.display_name}</span>
                <span class="geocode-coords">经度 ${city.lon.toFixed(4)}°E · 纬度 ${city.lat.toFixed(4)}°N</span>
            `;
            elGeocodeStatus.classList.remove('hidden');
        }

        // ============================================================
        // 地理编码按钮
        // ============================================================
        elBtnGeocode.addEventListener('click', async () => {
            const loc = elLocation.value.trim();
            if (!loc) {
                showError('请输入出生地点');
                return;
            }

            showLoading('正在查询经纬度...');
            elBtnGeocode.disabled = true;
            hideError();

            try {
                const resp = await fetch(`/api/geocode?q=${encodeURIComponent(loc)}`);
                const data = await resp.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                if (!data.results || data.results.length === 0) {
                    showError('未找到该地点，请尝试更详细的地名（如"广东省东莞市"）');
                    return;
                }

                // 取第一个结果
                const r = data.results[0];
                selectCity({
                    lon: r.lon,
                    lat: r.lat,
                    display_name: r.display_name,
                });

                // 显示其他候选
                if (data.results.length > 1) {
                    let html = elGeocodeStatus.innerHTML;
                    html += '<div class="geocode-alt">其他候选：';
                    data.results.slice(1).forEach((alt, i) => {
                        html += `<a href="#" class="alt-link" data-lon="${alt.lon}" data-lat="${alt.lat}" data-name="${alt.display_name}">[${i + 1}] ${alt.display_name}</a> `;
                    });
                    html += '</div>';
                    elGeocodeStatus.innerHTML = html;

                    // 候选链接点击
                    elGeocodeStatus.querySelectorAll('.alt-link').forEach(link => {
                        link.addEventListener('click', (e) => {
                            e.preventDefault();
                            selectCity({
                                lon: parseFloat(link.dataset.lon),
                                lat: parseFloat(link.dataset.lat),
                                display_name: link.dataset.name,
                            });
                        });
                    });
                }

            } catch (err) {
                showError('网络错误或服务未启动，请确认服务器在运行');
            } finally {
                hideLoading();
                elBtnGeocode.disabled = false;
            }
        });

        // ============================================================
        // 排盘
        // ============================================================
        elBtnPaipan.addEventListener('click', async () => {
            hideError();

            // 收集参数
            const params = {
                year: parseInt(elYear.value),
                month: parseInt(elMonth.value),
                day: parseInt(elDay.value),
                hour: parseInt(elHour.value),
                minute: parseInt(elMinute.value) || 0,
                gender: document.querySelector('input[name="gender"]:checked').value,
                longitude: parseFloat(elLongitude.value) || 113.75,
                location: elLocation.value.trim() || '未知',
            };

            // 基本校验
            if (!params.year || !params.month || !params.day) {
                showError('请完整填写出生日期');
                return;
            }
            if (params.year < 1900 || params.year > 2100) {
                showError('年份范围 1900-2100');
                return;
            }

            showLoading('正在排盘计算...');
            elBtnPaipan.disabled = true;
            elBtnPdf.disabled = true;

            try {
                const resp = await fetch('/api/paipan', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params),
                });
                const data = await resp.json();

                if (data.error) {
                    showError(data.error);
                    return;
                }

                plateData = data;
                renderResult(data);
                elResultSection.classList.remove('hidden');
                elBtnPdf.disabled = false;
                elBtnAnalyze.disabled = false;
                elAnalysisSection.classList.add('hidden');
                analysisText = null;
                elResultSection.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                showError('网络错误，请检查服务是否启动');
            } finally {
                hideLoading();
                elBtnPaipan.disabled = false;
            }
        });

        // ============================================================
        // 渲染结果
        // ============================================================
        function renderResult(data) {
            // 基本信息
            const info = data.input;
            const solar = data.solar;
            const lunar = data.lunar;
            const leap = lunar.is_leap ? '（闰月）' : '';

            $('basic-info').innerHTML = `
                <div><span class="info-label">公历</span><span class="info-value">${info.birth_datetime}</span></div>
                <div><span class="info-label">农历</span><span class="info-value">${lunar.year}年${lunar.month}月${lunar.day}日${leap}</span></div>
                <div><span class="info-label">时辰</span><span class="info-value">${data.shichen}</span></div>
                <div><span class="info-label">性别</span><span class="info-value">${info.gender}</span></div>
                <div><span class="info-label">出生地</span><span class="info-value">${info.location}（${info.longitude}°E）</span></div>
                <div><span class="info-label">真太阳时校正</span><span class="info-value">${solar.correction_minutes > 0 ? '+' : ''}${solar.correction_minutes}分钟，约 ${solar.adjusted_hour} 时</span></div>
                <div><span class="info-label">日主</span><span class="info-value">${data.ri_zhu}（${data.year_type}）</span></div>
            `;

            // 四柱表格
            const pillars = data.pillars;
            const orders = ['year', 'month', 'day', 'hour'];
            const colNames = ['年柱', '月柱', '日柱', '时柱'];

            const ganRow = ['<td class="row-label">干支</td>'];
            const tianganRow = ['<td class="row-label">天干</td>'];
            const dizhiRow = ['<td class="row-label">地支</td>'];
            const shishenRow = ['<td class="row-label">十神</td>'];
            const nayinRow = ['<td class="row-label">纳音</td>'];
            const changshengRow = ['<td class="row-label">十二长生</td>'];
            const cangganRow = ['<td class="row-label">藏干</td>'];

            orders.forEach(p => {
                const d = pillars[p];
                const css = p === 'day' ? ' class="day-zhu"' : '';
                ganRow.push(`<td${css}>${d.gz}<span class="gz-sub">${d.gan}${d.zhi}</span></td>`);
                tianganRow.push(`<td${css}>${d.gan}</td>`);
                dizhiRow.push(`<td${css}>${d.zhi}</td>`);
                shishenRow.push(`<td${css}>${d.shishen}</td>`);
                nayinRow.push(`<td${css}>${d.nayin}</td>`);
                changshengRow.push(`<td${css}>${d.changsheng}</td>`);
                const cg = d.canggan.map(c => `${c.gan}`).join(' · ');
                cangganRow.push(`<td${css}>${cg}</td>`);
            });

            $('row-ganzhi').innerHTML = ganRow.join('');
            $('row-tiangan').innerHTML = tianganRow.join('');
            $('row-dizhi').innerHTML = dizhiRow.join('');
            $('row-shishen').innerHTML = shishenRow.join('');
            $('row-nayin').innerHTML = nayinRow.join('');
            $('row-changsheng').innerHTML = changshengRow.join('');
            $('row-canggan').innerHTML = cangganRow.join('');

            // 起运信息
            const qy = data.qiyun;
            const kong = data.kongwang;
            const kongDesc = orders
                .filter(p => kong.pillars[p])
                .map(p => colNames[orders.indexOf(p)] + '支' + pillars[p].zhi)
                .join('、') || '无';
            $('qiyun-info').innerHTML = `
                <div><span class="info-label">起运年龄</span><span class="info-value">${qy.age} 岁（虚岁 ${qy.age_xu}）</span></div>
                <div><span class="info-label">交运年份</span><span class="info-value">约 ${qy.year} 年</span></div>
                <div><span class="info-label">大运方向</span><span class="info-value">${qy.direction}（距节气 ${qy.diff_days} 天）</span></div>
                <div><span class="info-label">空亡</span><span class="info-value">${kong.kong1}${kong.kong2}（${kongDesc}）</span></div>
                <div><span class="info-label">胎元</span><span class="info-value">${data.taiyuan}</span></div>
                <div><span class="info-label">命宫 / 身宫</span><span class="info-value">${data.minggong} / ${data.shengong}</span></div>
            `;

            // 大运表格
            const dayunHtml = data.dayun.map(d => `
                <tr>
                    <td>第 ${d.step} 步</td>
                    <td class="dayun-gz">${d.gz}</td>
                    <td>${d.start_age} - ${d.end_age} 岁</td>
                    <td>${d.start_year} - ${d.end_year} 年</td>
                </tr>
            `).join('');
            $('dayun-tbody').innerHTML = dayunHtml;

            // 神煞信息
            const dzAll = orders.map(p => pillars[p].zhi);
            $('shensha-info').innerHTML = `
                <div><span class="info-label">日支${data.pillars.day.zhi}</span><span class="info-value">日坐${data.pillars.day.changsheng}，${data.ri_zhu}日主${data.pillars.day.zhi === '亥' ? '驿马星动' : data.pillars.day.zhi === '寅' || data.pillars.day.zhi === '申' || data.pillars.day.zhi === '巳' ? '四生支' : data.pillars.day.zhi === '子' || data.pillars.day.zhi === '午' || data.pillars.day.zhi === '卯' || data.pillars.day.zhi === '酉' ? '四正支' : '四库支'}</span></div>
                <div><span class="info-label">月支${data.pillars.month.zhi}</span><span class="info-value">月令${data.pillars.month.changsheng}</span></div>
                <div><span class="info-label">年支${data.pillars.year.zhi}</span><span class="info-value">纳音${data.pillars.year.nayin}</span></div>
                <div><span class="info-label">时支${data.pillars.hour.zhi}</span><span class="info-value">时柱${data.pillars.hour.shishen}，${data.pillars.hour.changsheng}</span></div>
            `;
        }

        // ============================================================
        // 下载 PDF
        // ============================================================
        elBtnPdf.addEventListener('click', async () => {
            hideError();
            showLoading('正在生成 PDF 报告...');
            elBtnPdf.disabled = true;

            try {
                const params = {
                    year: parseInt(elYear.value),
                    month: parseInt(elMonth.value),
                    day: parseInt(elDay.value),
                    hour: parseInt(elHour.value),
                    minute: parseInt(elMinute.value) || 0,
                    gender: document.querySelector('input[name="gender"]:checked').value,
                    longitude: parseFloat(elLongitude.value) || 113.75,
                    location: elLocation.value.trim() || '未知',
                };

                const resp = await fetch('/api/pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(params),
                });

                if (!resp.ok) {
                    const errData = await resp.json();
                    showError(errData.error || 'PDF 生成失败');
                    return;
                }

                // 触发浏览器下载
                const blob = await resp.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `八字命盘_${params.year}${String(params.month).padStart(2,'0')}${String(params.day).padStart(2,'0')}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

            } catch (err) {
                showError('网络错误，PDF 下载失败');
            } finally {
                hideLoading();
                elBtnPdf.disabled = false;
            }
        });

        // ============================================================
        // 深度分析
        // ============================================================
        const elBtnAnalyze = $('btn-analyze');
        const elAnalysisSection = $('analysis-section');
        const elAnalysisMeta = $('analysis-meta');
        const elAnalysisContent = $('analysis-content');
        const elBtnAnalysisPdf = $('btn-analysis-pdf');
        let analysisText = null;

        elBtnAnalyze.addEventListener('click', async () => {
            if (!plateData) return;

            hideError();
            showLoading('正在调用 Agent 进行深度分析（约需 60-120 秒，请耐心等待）...');
            elBtnAnalyze.disabled = true;
            elAnalysisSection.classList.add('hidden');

            try {
                const resp = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ plate: plateData }),
                });

                const data = await resp.json();

                if (!data.success) {
                    showError(data.error || '分析失败');
                    return;
                }

                analysisText = data.analysis;

                // 渲染分析结果
                elAnalysisMeta.innerHTML = `
                    <span class="analysis-model">模型：${data.model || 'DeepSeek'}</span>
                    <span class="analysis-tokens">Token：${JSON.stringify(data.usage)}</span>
                `;

                // 将 Markdown 转为 HTML（简单处理）
                let html = analysisText
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/\n\n/g, '</p><p>')
                    .replace(/\n/g, '<br>')
                    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
                    .replace(/\*(.+?)\*/g, '<em>$1</em>')
                    .replace(/^### (.+)$/gm, '<h4>$1</h4>')
                    .replace(/^## (.+)$/gm, '<h3>$1</h3>')
                    .replace(/^# (.+)$/gm, '<h2>$1</h2>')
                    .replace(/^- (.+)$/gm, '<li>$1</li>')
                    .replace(/\|(.+)\|/g, (match) => {
                        // 简单表格处理
                        return match.includes('---') ? '' : '<br>' + match + '<br>';
                    });

                elAnalysisContent.innerHTML = '<p>' + html + '</p>';
                elAnalysisSection.classList.remove('hidden');
                elBtnAnalysisPdf.disabled = false;

                // 滚动到分析区
                elAnalysisSection.scrollIntoView({ behavior: 'smooth' });

            } catch (err) {
                showError('网络错误或分析超时，请重试');
            } finally {
                hideLoading();
                elBtnAnalyze.disabled = false;
            }
        });

        // 下载含分析 PDF
        elBtnAnalysisPdf.addEventListener('click', async () => {
            if (!plateData || !analysisText) return;

            hideError();
            showLoading('正在生成含分析 PDF...');
            elBtnAnalysisPdf.disabled = true;

            try {
                const resp = await fetch('/api/pdf', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        ...plateData.input,
                        year: parseInt(plateData.input.birth_datetime.substring(0, 4)),
                        month: parseInt(plateData.input.birth_datetime.substring(5, 7)),
                        day: parseInt(plateData.input.birth_datetime.substring(8, 10)),
                        hour: parseInt(plateData.input.birth_datetime.substring(11, 13)),
                        minute: parseInt(plateData.input.birth_datetime.substring(14, 16) || '0'),
                        gender: plateData.input.gender,
                        longitude: plateData.input.longitude,
                        location: plateData.input.location,
                        analysis: analysisText,
                    }),
                });

                if (!resp.ok) {
                    const errData = await resp.json().catch(() => ({}));
                    showError(errData.error || 'PDF 生成失败');
                    return;
                }

                const blob = await resp.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `八字分析报告_${plateData.input.birth_datetime.substring(0, 10)}.pdf`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

            } catch (err) {
                showError('网络错误，下载失败');
            } finally {
                hideLoading();
                elBtnAnalysisPdf.disabled = false;
            }
        });

        // ============================================================
        // 网络访问信息
        // ============================================================
        (async function loadNetworkInfo() {
            try {
                const resp = await fetch('/api/network-info');
                const info = await resp.json();

                const urls = [];
                urls.push(`<a href="${info.localhost}" target="_blank">${info.localhost}</a> （本机）`);
                info.lan_urls.forEach(url => {
                    urls.push(`<a href="${url}" target="_blank">${url}</a>`);
                });

                const urlsDiv = document.getElementById('access-urls');
                urlsDiv.innerHTML = urls.join('<br>');

                // 生成第一个 LAN URL 的二维码
                if (info.lan_urls.length > 0) {
                    const qrDiv = document.getElementById('access-qr');
                    const qrUrl = `/api/qrcode?url=${encodeURIComponent(info.lan_urls[0])}`;
                    qrDiv.innerHTML = `<img src="${qrUrl}" alt="扫码访问" class="qr-img">`;
                }
            } catch (err) {
                document.getElementById('access-urls').innerHTML = '（仅本机可用）';
            }
        })();

        // ============================================================
        // 键盘快捷键
        // ============================================================
        document.addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') {
                elBtnPaipan.click();
            }
        });
    </script>
</body>
</html>
