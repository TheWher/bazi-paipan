<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘报告</title>
<style>
  :root {
    --paper: #f5f1e8; --paper-deep: #ebe5d5; --paper-card: #faf6ec;
    --ink: #2b2825; --ink-soft: #6b6660; --ink-faint: #a8a298;
    --vermillion: #c1432f; --vermillion-deep: #8e2f20;
    --azure: #2e6da4; --jade: #4a7c4e; --jade-soft: #6f9971;
    --line: #8b8378; --line-soft: #c4bdb0; --line-faint: #e0d9c8;
    --radius: 4px; --radius-sm: 2px;
  }
  [data-theme="dark"] {
    --paper: #1a1512; --paper-deep: #12100e; --paper-card: #221c18;
    --ink: #e0d8cf; --ink-soft: #a09890; --ink-faint: #706860;
    --vermillion: #e05545; --vermillion-deep: #a03020;
    --azure: #5a9dd4; --jade: #5aaa5e; --jade-soft: #4a8a4e;
    --line: #3a3028; --line-soft: #2a2018; --line-faint: #1a120e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper); color: var(--ink);
    font-family: "Source Han Serif SC", "Noto Serif SC", "STSong", "PingFang SC", serif;
    font-size: 14px; line-height: 1.7;
    background-image: radial-gradient(circle at 15% 25%, rgba(180,160,130,0.06), transparent 50%),
                      radial-gradient(circle at 85% 75%, rgba(180,160,130,0.05), transparent 50%);
    min-height: 100vh;
  }
  .no-print { display: block; }
  .report { max-width: 1080px; margin: 0 auto; padding: 24px; }

  /* ── 导航 ── */
  .nav-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0 16px; border-bottom: 1px solid var(--line-soft); margin-bottom: 20px;
  }
  .nav-bar .title { font-size: 18px; letter-spacing: 2px; color: var(--ink); }
  .nav-bar .btn-back {
    font-size: 12px; color: var(--ink-soft); text-decoration: none;
    border: 1px solid var(--line-soft); padding: 4px 12px; border-radius: 2px;
  }
  .nav-bar .btn-back:hover { border-color: var(--vermillion); color: var(--vermillion); }
  .nav-bar .btn-theme { background: none; border: 1px solid var(--line-soft); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; font-size: 14px; line-height: 1; color: var(--ink); padding: 0; }

  /* ── 命盘概要 ── */
  .info-bar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    background: var(--paper-card); border: 1px solid var(--line-soft);
    padding: 12px 16px; margin-bottom: 16px; font-size: 12px; line-height: 1.6;
  }
  .info-bar .label { color: var(--ink-faint); }
  .info-bar .value { color: var(--ink); font-weight: 600; }

  /* ── 4x4 宫格 ── */
  .ziwei-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
    height: 540px; background: var(--line-soft); gap: 1px; margin-bottom: 16px;
  }
  .palace {
    background: var(--paper); padding: 6px 8px; font-size: 10px; line-height: 1.4;
    display: flex; flex-direction: column; overflow: hidden; cursor: pointer;
    transition: background .15s;
    font-family: "Noto Serif SC","Source Han Serif SC","STSong","PingFang SC",serif;
  }
  .palace:hover { background: var(--paper-card); }
  .palace .p-hint { display:none; font-size:7px; color:var(--ink-faint); margin-top:auto; text-align:right; }
  .palace:hover .p-hint { display:block; }
  .palace.ming { box-shadow: inset 0 0 0 2px var(--vermillion); }
  /* 第一层：宫位头 */
  .palace .p-head {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    border-bottom: 1px dashed var(--line-faint); padding-bottom: 3px; margin-bottom: 4px;
  }
  .palace .p-dizhi { font-size: 11px; font-weight: 700; color: var(--ink); }
  .palace .p-gong { font-size: 10px; font-weight: 600; color: var(--ink); }
  .palace .p-ganzhi { font-size: 9px; color: var(--ink-faint); margin-left: auto; }
  .shen-badge {
    display: inline-block; color: var(--vermillion); border: 1px solid var(--vermillion);
    border-radius: 2px; font-size: 8px; padding: 0 3px; line-height: 1.3;
  }
  /* 第二层：主星区（楷体大字 + 亮度角标 + 四化色块） */
  .palace .p-stars { flex: 1; display: flex; flex-direction: column; gap: 1px; overflow: hidden; }
  .palace .star-row { display: flex; align-items: baseline; gap: 3px; line-height: 1.5; }
  .palace .star-name {
    font-family: "STKaiti","KaiTi","Noto Serif SC",serif;
    font-size: 13px; font-weight: 700; color: var(--ink); line-height: 1.35;
  }
  .palace .star-name.empty-star { color: var(--ink-faint); font-size: 11px; font-weight: 400; }
  .palace .star-bright { font-size: 8px; color: var(--ink-faint); font-family: "Noto Serif SC",serif; }
  .palace .star-bright.b-miao { color: var(--vermillion); font-weight: 700; }
  .palace .star-bright.b-wang { color: #c8742a; font-weight: 700; }
  .palace .mu-badge { font-size: 8px; font-weight: 700; padding: 0 3px; border-radius: 2px; line-height: 1.4; }
  .palace .mu-badge.mu-lu { background: var(--vermillion); color: var(--paper); }
  .palace .mu-badge.mu-quan { background: var(--azure); color: var(--paper); }
  .palace .mu-badge.mu-ke { background: var(--jade); color: var(--paper); }
  .palace .mu-badge.mu-ji { background: var(--ink); color: var(--paper); }
  /* 第三层：辅星（吉墨煞红） */
  .palace .p-aux {
    padding-top: 3px; margin-top: 2px; border-top: 1px dotted var(--line-faint);
    font-size: 9px; line-height: 1.5; font-family: "Noto Serif SC",serif;
  }
  .palace .aux-auspicious { color: var(--ink); }
  .palace .aux-malefic { color: var(--vermillion-deep); }
  .palace .aux-sep { color: var(--ink-faint); margin: 0 2px; }
  /* 底部条：大限 */
  .palace .p-daxian {
    margin-top: auto; padding-top: 3px; border-top: 1px dashed var(--line-faint);
    font-size: 9px; color: var(--ink-soft); display: flex; justify-content: space-between; gap: 4px;
  }
  .palace.current .p-daxian { color: var(--vermillion); font-weight: 700; }
  /* 飞星标记层 */
  .palace .p-fly {
    padding: 2px 0 0; font-size: 8px; line-height: 1.4; color: var(--ink-faint);
    display: flex; flex-wrap: wrap; gap: 1px 4px;
  }
  .palace .p-fly .fly-tag { display: inline-block; padding: 0 2px; border-radius: 2px; font-weight: 600; line-height: 1.3; }
  .palace .p-fly .fly-lu { color: var(--vermillion); }
  .palace .p-fly .fly-quan { color: var(--azure); }
  .palace .p-fly .fly-ke { color: var(--jade); }
  .palace .p-fly .fly-ji { color: var(--ink); text-decoration: underline; }
  .palace .p-fly .fly-arrow { color: var(--ink-faint); font-size: 7px; }
  .palace .p-fly .fly-target { color: var(--ink-soft); }
  /* 三合四正连线 */
  #grid-lines .sanhe-line { fill: none; stroke-width: 1.2; stroke-dasharray: 4 3; opacity: .65; }
  #grid-lines .sanhe-line.g0 { stroke: #2e6da4; }  /* 申子辰 水局 — 青 */
  #grid-lines .sanhe-line.g1 { stroke: #c1432f; }  /* 巳酉丑 金局 — 朱 */
  #grid-lines .sanhe-line.g2 { stroke: #4a7c4e; }  /* 寅午戌 火局 — 绿 */
  #grid-lines .sanhe-line.g3 { stroke: #b8860b; }  /* 亥卯未 木局 — 金 */
  #grid-lines .sanhe-line.duigong { stroke: var(--line-soft); stroke-dasharray: 2 4; opacity: .45; }
  #grid-lines .sanhe-line.highlight { stroke-dasharray: none; opacity: 1; stroke-width: 2.2; }  /* 保持分组色，加粗变实线 */
  .palace.hovering-sanhe { background: rgba(180,160,130,0.08) !important; }

  /* 中间 info：命盘三锚点 */
  .center-palace {
    grid-column: 2 / 4; grid-row: 2 / 4;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--paper); padding: 16px 18px; text-align: center;
    border-left: 1px solid var(--line); border-right: 1px solid var(--line);
    font-family: "Noto Serif SC","STSong",serif; position: relative;
  }
  .center-palace::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, rgba(193,67,47,0.04), transparent 70%);
    pointer-events: none;
  }
  .center-palace .c-ju { font-size: 13px; letter-spacing: 3px; color: var(--ink-soft); margin-bottom: 4px; position: relative; }
  .center-palace .c-ming-star {
    font-family: "STKaiti","KaiTi","Noto Serif SC",serif;
    font-size: 22px; font-weight: 700; color: var(--vermillion); letter-spacing: 2px;
    margin: 6px 0 8px; position: relative;
  }
  .center-palace .c-ming-star.empty { color: var(--ink-faint); font-size: 16px; }
  .center-palace .c-divider { width: 40px; height: 1px; background: var(--line-soft); margin: 4px auto; position: relative; }
  .center-palace .c-anchor { font-size: 11px; color: var(--ink); margin: 3px 0; position: relative; }
  .center-palace .c-anchor .lbl { color: var(--ink-faint); margin-right: 4px; }
  .center-palace .c-anchor strong { color: var(--ink); font-weight: 700; }
  .center-palace .c-current { margin-top: 8px; padding: 4px 10px; border: 1px solid var(--vermillion); color: var(--vermillion); font-size: 10px; font-weight: 700; position: relative; }

  /* ── 运限三层架构 ── */
  .yun-strip {
    margin-bottom: 14px; border: 1px solid var(--line-soft); background: var(--paper-card);
  }
  .yun-overview {
    display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
    padding: 8px 14px; background: var(--paper-deep);
    border-bottom: 1px solid var(--line-soft); font-size: 12px;
  }
  .yun-overview .ov-label { color: var(--ink-faint); font-size: 11px; }
  .yun-overview .ov-value { color: var(--ink); font-weight: 700; font-family: "Noto Serif SC",serif; }
  .yun-overview .ov-current { color: var(--vermillion); font-weight: 700; }
  .yun-overview .ov-year-input {
    width: 60px; padding: 2px 4px; font-size: 11px;
    border: 1px solid var(--line-soft); background: var(--paper); color: var(--ink); border-radius: 2px;
    font-family: inherit;
  }
  /* 大限轴 */
  .yun-decade {
    display: grid; grid-template-columns: repeat(12, 1fr);
    position: relative; border-bottom: 1px solid var(--line-soft);
  }
  .yun-decade .dec-cell {
    padding: 5px 2px; text-align: center; font-size: 9px; cursor: pointer;
    border-right: 1px solid var(--line-faint); position: relative;
    transition: background .15s;
  }
  .yun-decade .dec-cell:last-child { border-right: none; }
  .yun-decade .dec-cell:hover { background: var(--paper); }
  .yun-decade .dec-cell .d-gz { font-size: 11px; font-weight: 700; font-family: "Noto Serif SC",serif; }
  .yun-decade .dec-cell .d-ages { color: var(--ink-soft); font-size: 8px; }
  .yun-decade .dec-cell.current { background: rgba(193,67,47,0.06); }
  .yun-decade .dec-cell.current .d-gz { color: var(--vermillion); }
  .yun-decade .dec-cell.current::after {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--vermillion);
  }
  .yun-decade .dec-cell.active { background: rgba(46,109,164,0.08); box-shadow: inset 0 0 0 1px var(--azure); }
  /* 聚焦摘要行 + 下钻 */
  .yun-focus {
    display: flex; align-items: center; gap: 0; padding: 0; border-top: 1px solid var(--line-faint);
  }
  .yun-focus .focus-pill {
    flex: 1; padding: 7px 10px; cursor: pointer; text-align: center;
    border-right: 1px solid var(--line-faint); transition: background .15s;
    display: flex; align-items: center; justify-content: center; gap: 4px;
  }
  .yun-focus .focus-pill:last-child { border-right: none; }
  .yun-focus .focus-pill:hover { background: var(--paper); }
  .yun-focus .focus-pill.active { color: var(--vermillion); font-weight: 700; }
  .yun-focus .fp-label { font-size: 10px; color: var(--ink-faint); }
  .yun-focus .fp-value { font-size: 11px; color: var(--ink); font-family: "Noto Serif SC",serif; }
  .yun-focus .focus-pill.active .fp-value { color: var(--vermillion); }
  /* 下钻面板 */
  .yun-drill {
    display: none; padding: 6px 10px; background: var(--paper-deep);
    border-top: 1px solid var(--line-faint);
  }
  .yun-drill.open { display: block; }
  .yun-drill .drill-grid { display: grid; gap: 2px; }
  .yun-drill .drill-cell {
    padding: 4px; text-align: center; font-size: 9px; cursor: pointer;
    border: 1px solid var(--line-faint); background: var(--paper);
  }
  .yun-drill .drill-cell:hover { background: var(--paper-card); }
  .yun-drill .drill-cell .dc-gz { font-size: 11px; font-weight: 700; font-family: "Noto Serif SC",serif; }
  .yun-drill .drill-cell .dc-sub { color: var(--ink-soft); font-size: 8px; }
  .yun-drill .drill-cell.active { background: rgba(46,109,164,0.1); }
  .yun-drill .drill-cell.active .dc-gz { color: var(--azure); }
  /* 盘顶状态指示条 */
  .scope-status {
    display: none; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 5px 12px; background: rgba(46,109,164,0.06);
    border: 1px solid rgba(46,109,164,0.2); border-radius: 2px;
    margin-bottom: 10px; font-size: 11px; color: var(--ink);
  }
  .scope-status.show { display: flex; }
  .scope-status .ss-label { color: var(--azure); font-weight: 700; font-size: 10px; }
  .scope-status .ss-chip {
    display: inline-flex; align-items: center; gap: 3px;
    padding: 2px 7px; border-radius: 2px; font-size: 10px; font-weight: 600;
  }
  .scope-status .ss-chip.decade { background: var(--azure); color: var(--paper); }
  .scope-status .ss-chip.yearly { background: var(--vermillion); color: var(--paper); }
  .scope-status .ss-chip.monthly { background: var(--jade); color: var(--paper); }
  .scope-status .ss-clear {
    margin-left: auto; font-size: 10px; color: var(--ink-soft);
    cursor: pointer; border: 1px solid var(--line-soft); padding: 1px 8px; border-radius: 2px;
  }
  .scope-status .ss-clear:hover { color: var(--vermillion); border-color: var(--vermillion); }

  /* ── 分析 + 追问 ── */
  .analysis-area {
    background: var(--paper-card); border: 1px solid var(--line-soft);
    padding: 18px 20px; margin-bottom: 14px;
  }
  .analysis-area h2 {
    font-size: 15px; letter-spacing: 1px; margin: 16px 0 10px;
    border-left: 3px solid var(--vermillion); padding: 4px 0 4px 10px;
    font-weight: 700; line-height: 1.4;
  }
  .analysis-area h2:first-child { margin-top: 0; }
  .analysis-area h3 {
    font-size: 13px; letter-spacing: .5px; margin: 12px 0 6px;
    border-left: 2px solid var(--azure); padding: 2px 0 2px 8px;
    font-weight: 600; color: var(--ink-soft);
  }
  .analysis-area h4 {
    font-size: 12px; margin: 8px 0 4px;
    color: var(--ink-soft); font-weight: 600;
  }
  .analysis-text { font-size: 13px; line-height: 1.9; color: var(--ink); min-height: 100px; }
  .analysis-text strong { color: var(--ink); font-weight: 700; }
  .analysis-text em { color: var(--vermillion); font-style: normal; font-weight: 600; }
  .analysis-text p { margin: 0 0 10px; }
  .analysis-text ul, .analysis-text ol { margin: 6px 0 10px; padding-left: 18px; }
  .analysis-text li { margin-bottom: 4px; line-height: 1.8; }
  .analysis-text blockquote {
    margin: 8px 0 12px; padding: 8px 12px;
    background: rgba(180,160,130,0.06);
    border-left: 2px solid var(--line-soft);
    font-size: .95em; color: var(--ink-soft);
  }
  .analysis-text hr {
    border: none; border-top: 1px dashed var(--line-faint);
    margin: 14px 0;
  }
  .analysis-text .key-good { color: var(--jade); font-weight: 600; }
  .analysis-text .key-warn { color: var(--vermillion); font-weight: 600; }
  .analysis-text .key-info { color: var(--azure); font-weight: 600; }
  .chat-area { margin-top: 14px; }
  .chat-msg {
    margin: 6px 0; padding: 8px 12px; border-radius: 2px;
    font-size: 12px; line-height: 1.6;
  }
  .chat-msg.user { background: rgba(193,67,47,0.04); border-left: 2px solid rgba(193,67,47,0.2); }
  .chat-msg.agent { background: var(--paper-card); border: 1px solid var(--line-faint); }
  .chat-msg .who { font-weight: 700; color: var(--ink-soft); font-size: 11px; margin-bottom: 2px; }
  .chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .chat-input-row textarea {
    flex: 1; padding: 8px 10px; font-size: 12px;
    border: 1px solid var(--line-soft); background: var(--paper);
    color: var(--ink); resize: none; outline: none; font-family: inherit;
  }
  .chat-input-row textarea:focus { border-color: var(--vermillion); }
  .chat-input-row button {
    padding: 6px 18px; font-size: 12px; background: var(--ink);
    color: var(--paper); border: none; cursor: pointer; letter-spacing: 1px;
  }
  .chat-input-row button:hover { background: var(--vermillion); }
  .chat-input-row button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── 星曜弹窗 ── */
  .star-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }
  .star-dialog {
    background: var(--paper-card); border: 1px solid var(--line);
    padding: 20px 24px; max-width: 380px; width: 90vw; font-size: 12px; line-height: 1.7;
  }
  .star-dialog h3 { font-size: 15px; margin-bottom: 8px; }
  .star-dialog .close-btn {
    float: right; background: none; border: none;
    font-size: 18px; cursor: pointer; color: var(--ink-soft);
  }

  /* ── 骨架屏 ── */
  .skeleton { background: var(--line-faint); border-radius: 2px; animation: pulse 1.5s infinite; }
  .skeleton-grid { height: 540px; }
  .skeleton-line { height: 14px; margin: 8px 0; width: 80%; }
  .skeleton-line:last-child { width: 60%; }
  @keyframes pulse { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }
  .load-dot { display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--ink);animation:load-dot-pulse 1.4s ease-in-out infinite }
  @keyframes load-dot-pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1.2)} }

  /* ── 打印 ── */
  @media print {
    .no-print { display: none !important; }
    body { background: white; padding: 0; }
    .report { max-width: 100%; padding: 0; }
    .nav-bar { display: none; }
    .ziwei-grid { height: 480px; page-break-inside: avoid; }
    .analysis-area { page-break-inside: avoid; }
    .palace { break-inside: avoid; }
  }

  /* ── 响应式 ── */
  @media (max-width: 700px) {
    .report { padding: 12px; }
    .info-bar { grid-template-columns: 1fr; font-size: 11px; }
    .ziwei-grid { height: 380px; }
    .palace { font-size: 9px; padding: 3px 5px; }
    .palace .star-name { font-size: 11px; }
    .palace .p-aux { font-size: 8px; }
    .palace .p-stars { gap: 0; }
    .center-palace .c-ming-star { font-size: 18px; }
    .center-palace .c-ju { font-size: 11px; }
    .center-palace .c-anchor { font-size: 10px; }
    .strip-row { grid-template-columns: repeat(5, 1fr); overflow-x: auto; }
    .strip-cell:nth-child(n+6) { display: flex !important; }  /* 杀掉裁剪，改为横向滚动 */
  }
</style>
</head>
<body>
<div class="report">
  <!-- 导航 -->
  <div class="nav-bar no-print">
    <span class="title">🔮 紫微斗数 · 命盘报告</span>
    <a href="/ziwei" class="btn-back">← 重新排盘</a>
    <select id="session-switcher" onchange="switchSession()" style="padding:4px 8px;font-size:12px;border:1px solid var(--line-soft);border-radius:2px;background:var(--paper);color:var(--ink);font-family:inherit;max-width:200px;cursor:pointer"><option value="">历史会话</option></select>
    <button class="btn-theme" id="btn-theme" onclick="toggleTheme()">🌙</button>
  </div>

  <!-- 命盘概要 -->
  <div class="info-bar" id="info-bar">
    <div class="skeleton-line"></div>
  </div>

  <!-- 4x4 宫格 -->
  <div style="position:relative">
    <div class="ziwei-grid skeleton-grid" id="grid"></div>
    <svg id="grid-lines" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></svg>
  </div>

  <!-- 盘顶状态指示条 -->
  <div class="scope-status" id="scope-status">
    <span class="ss-label">📍 当前叠盘</span>
    <span id="ss-chips"></span>
    <button id="btn-scope-analyze" class="btn btn-accent" onclick="analyzeScope()" style="display:none;font-size:11px;padding:3px 10px;margin:0 8px">📜 叠盘分析</button>

<script>
// 暗色主题
(function(){ var t=localStorage.getItem('ziwei_theme'); if(t){ document.documentElement.setAttribute('data-theme',t); } })();
function toggleTheme(){ var n=document.documentElement.getAttribute('data-theme')==='dark'?'':'dark'; document.documentElement.setAttribute('data-theme',n); localStorage.setItem('ziwei_theme',n); document.getElementById('btn-theme').textContent=n==='dark'?'☀️':'🌙'; }
document.addEventListener('DOMContentLoaded',function(){ document.getElementById('btn-theme').textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'; });
const $ = id => document.getElementById(id);
const sid = window.location.pathname.split('/').pop();
let plateData = null;
// reportPw declared in ziwei-verify.js

// ── 加载数据 ──
async function load(){
  try{
    const r = await fetch(`/api/ziwei/sessions/${sid}`);
    if(!r.ok){ $('grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--ink-soft)">报告未找到或已过期</div>'; return }
    const s = await r.json();
    plateData = s.plate_data || null;
    renderInfo(s);
    loadSessionList();  // 填充会话切换器
    if(plateData && plateData.palaces){
      renderGrid(plateData);
      renderYunDecade(plateData);
      renderFlowYears();
      applyAllScope();
      setTimeout(renderSanheLines, 200);
    }
    const msgs = s.messages || [];
    const validAnalysis = msgs.find(m => m.role === 'assistant' && m.content && m.content.length > 50);
    if(validAnalysis) renderAnalysis(msgs);
    else startAnalysis(s.plate_data);
  }catch(e){
    $('analysis-text').innerHTML = '<span style="color:#c1432f">页面加载异常: '+e.message+'</span>';
    console.error(e);
  }
}
load();

// ── 命盘概要 ──
function renderInfo(session){
  const p = session.plate_data || {};
  const inp = p.input || {};
  const yms = p.year_mutagens || [];
  const sihuaStr = yms.map(m => `${m.mutagen}：${m.star}在${m.palace}`).join(' · ') || '—';
  const gender = inp.gender || '—';
  const fec = p.five_elements_class || '—';
  const soul = p.soul_palace || '—';
  const body = p.body_palace || '—';
  // 来因宫 + 八字日主
  const GAN = '甲乙丙丁戊己庚辛壬癸';
  const ZHI = '子丑寅卯辰巳午未申酉戌亥';
  const LAIYIN = ['父母','福德','命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友'];
  const WX = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
  const birthDt = inp.birth_datetime || '';
  const birthYear = parseInt(birthDt.split('-')[0]) || 0;
  const birthMonth = parseInt(birthDt.split('-')[1]) || 1;
  const birthDay = parseInt(birthDt.split('-')[2]?.split(' ')[0]) || 1;
  const laiyin = birthYear ? LAIYIN[(birthYear-4)%10] : '—';
  // 近似日柱（查表法精度不够，改为略过精确日柱，只显示年干/月干信息）
  const nianGan = birthYear ? GAN[(birthYear-4)%10] : '?';
  const riGanWx = nianGan ? WX[nianGan] || '?' : '?';
  $('info-bar').innerHTML = `
    <div><span class="label">出生</span> <span class="value">${birthDt} ${gender}</span></div>
    <div><span class="label">五行局</span> <span class="value">${fec}</span></div>
    <div><span class="label">命宫/身宫</span> <span class="value">${soul} / ${body}</span></div>
    <div><span class="label">来因宫</span> <span class="value">${laiyin}</span></div>
    <div><span class="label">年柱</span> <span class="value">${nianGan}${ZHI[(birthYear-4)%12]}</span></div>
    <div style="grid-column:1/-1"><span class="label">生年四化</span> <span class="value">${sihuaStr}</span></div>
  `;
}

// ── 宫格渲染 ──
const GRID_POS = {'巳':[0,0],'午':[1,0],'未':[2,0],'申':[3,0],'辰':[0,1],'酉':[3,1],'卯':[0,2],'戌':[3,2],'寅':[0,3],'丑':[1,3],'子':[2,3],'亥':[3,3]};
const BR_ORDER = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const GAN = '甲乙丙丁戊己庚辛壬癸';
const ZHI = '子丑寅卯辰巳午未申酉戌亥';
const SIHUA = {'化禄':'禄','化权':'权','化科':'科','化忌':'忌'};

function currentAge(){
  const y = new Date().getFullYear();
  return y - (parseInt(document.querySelector('.info-bar .value')?.textContent?.split('-')[0]) || 2005);
}

function renderGrid(plate){
  const palaces = plate.palaces || [];
  const soul = plate.soul_palace || '';
  const body = plate.body_palace || '';
  const cells = [];
  for(const p of palaces){
    const br = p.earthly_branch;
    const pos = GRID_POS[br];
    if(!pos) continue;
    const isSoul = p.name === soul;
    const isBody = p.name === body;
    const cls = isSoul ? 'palace ming' : 'palace';
    const shenBadge = isBody ? '<span class="shen-badge">身</span>' : '';
    // 第二层：主星（楷体大字 + 亮度角标 + 四化色块）
    const majors = p.major_stars || [];
    let starsHtml;
    if(majors.length === 0){
      starsHtml = '<div class="star-row"><span class="star-name empty-star">—</span></div>';
    } else {
      starsHtml = majors.map(s => {
        const nameHtml = `<span class="star-name">${s.name}</span>`;
        const brightHtml = s.brightness_css ? `<span class="star-bright ${s.brightness_css}">${s.brightness||''}</span>` : '';
        let muHtml = '';
        if(s.mutagen){
          const hua = (s.mutagen||'').replace('化','');
          const muCls = {'禄':'mu-lu','权':'mu-quan','科':'mu-ke','忌':'mu-ji'}[hua] || '';
          if(muCls) muHtml = `<span class="mu-badge ${muCls}">${hua}</span>`;
        }
        return `<div class="star-row">${nameHtml}${brightHtml}${muHtml}</div>`;
      }).join('');
    }
    // 第三层：辅星分吉墨煞红
    const minors = p.minor_stars || [];
    const auspicious = [], malefic = [], neutral = [];
    for(const s of minors){
      const css = s.css || '';
      if(css === 'star-malefic') malefic.push(s.name);
      else if(css === 'star-auspicious' || css === 'star-helper' || css === 'star-lucun') auspicious.push(s.name);
      else neutral.push(s.name);
    }
    const parts = [];
    if(auspicious.length) parts.push('<span class="aux-auspicious">'+auspicious.join(' ')+'</span>');
    if(malefic.length) parts.push('<span class="aux-malefic">'+malefic.join(' ')+'</span>');
    if(neutral.length) parts.push('<span style="color:var(--ink-faint)">'+neutral.join(' ')+'</span>');
    // 杂曜（adjective stars）
    const adjStars = (p.adjective_stars || []).map(s => s.name);
    if(adjStars.length) parts.push('<span style="color:var(--ink-faint);font-size:8px">'+adjStars.join(' ')+'</span>');
    const auxHtml = parts.join('<span class="aux-sep">┊</span>') || '<span style="color:var(--ink-faint)"> </span>';
    // 十二长生
    const cs = p.changsheng || '';
    const dr = p.decadal_range || '';
    const ddz = p.decadal_dizhi || '';
    const curAge = currentAge();
    let isCurrent = false;
    if(dr){
      const parts2 = dr.split('-');
      if(parts2.length===2){
        const s2 = parseInt(parts2[0]), e2 = parseInt(parts2[1]);
        if(s2 <= curAge && curAge <= e2) isCurrent = true;
      }
    }
    cells.push({
      pos, br, name: p.name, cls, shenBadge, starsHtml, auxHtml, dr, ddz, isCurrent, changsheng: cs,
      dizhi: p.dizhi || br,
    });
  }
  // 构建 grid
  const gridEl = $('grid');
  gridEl.className = 'ziwei-grid';
  gridEl.innerHTML = '';
  for(const c of cells){
    const div = document.createElement('div');
    div.className = c.cls + (c.isCurrent ? ' current' : '');
    div.style.gridColumn = c.pos[0]+1; div.style.gridRow = c.pos[1]+1;
    div.innerHTML = `
      <div class="p-head">
        <span class="p-dizhi">${c.br}</span>${c.changsheng ? '<span style="font-size:7px;color:var(--ink-faint);margin-left:1px">'+c.changsheng+'</span>' : ''}
        <span class="p-gong">${c.name}</span>${c.shenBadge}
        <span class="p-ganzhi">${c.dizhi}</span>
      </div>
      <div class="p-stars">${c.starsHtml}</div>
      <div class="p-aux">${c.auxHtml}</div>
      <div class="p-daxian">${c.dr ? `<span>${c.dr}</span><span>${c.ddz}</span>` : ''}</div>
      <div class="p-hint">双击详解</div>
    `;
    div.onclick = () => { selectPalace(c.br, plate); };
    div.ondblclick = () => { showPalaceDetail(c.name, plate); };
    gridEl.appendChild(div);
  }
  // center：命盘三锚点
  const soulPalaceObj = palaces.find(p => p.name === soul) || {};
  const soulMajors = soulPalaceObj.major_stars || [];
  const soulStarStr = soulMajors.map(s => s.name).join('·') || '空宫';
  const soulStarCls = soulMajors.length === 0 ? 'c-ming-star empty' : 'c-ming-star';
  const curAge2 = currentAge();
  let curDec = '—';
  for(const p of palaces){
    const dr = p.decadal_range || '';
    if(dr){
      const [s3,e3] = dr.split('-').map(Number);
      if(s3 <= curAge2 && curAge2 <= e3){ curDec = `${p.decadal_dizhi||''} ${p.name} ${dr}`; break; }
    }
  }
  const inp = plate.input || {};
  const birthYear = parseInt((inp.birth_datetime||'').split('-')[0]) || 0;
  const LAIYIN = ['父母','福德','命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友'];
  const laiyin = birthYear ? LAIYIN[(birthYear-4)%10] : '—';
  const center = document.createElement('div');
  center.className = 'center-palace';
  center.innerHTML = `
    <div class="c-ju">${plate.five_elements_class || ''}</div>
    <div class="${soulStarCls}">${soulStarStr}</div>
    <div class="c-divider"></div>
    <div class="c-anchor"><span class="lbl">命宫</span><strong>${soul||'—'}</strong></div>
    <div class="c-anchor"><span class="lbl">身宫</span><strong>${body||'—'}</strong></div>
    <div class="c-anchor"><span class="lbl">来因宫</span><strong>${laiyin}</strong></div>
    <div class="c-current">今运 ${curDec}</div>
  `;
  gridEl.appendChild(center);
}

// ── 运限三层架构 ──
const GAN_ARR = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const ZHI_ARR = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const GAN_SIHUA = {'甲':['廉贞','破军','武曲','太阳'],'乙':['天机','天梁','紫微','太阴'],'丙':['天同','天机','文昌','廉贞'],'丁':['太阴','天同','天机','巨门'],'戊':['贪狼','太阴','右弼','天机'],'己':['武曲','贪狼','天梁','文曲'],'庚':['太阳','武曲','太阴','天同'],'辛':['巨门','太阳','文曲','文昌'],'壬':['天梁','紫微','左辅','武曲'],'癸':['破军','巨门','太阴','贪狼']};
const LIMIT_NAMES = ['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];
// 叠盘状态：三层可叠加
let scope = { decade: null, yearly: null, monthly: null, dayOnly: null };
let horoscopeData = null;  // 当前拉取的流年数据

function renderYunDecade(plate){
  const palaces = plate.palaces || [];
  const curAge = currentAge();
  let curDecStr = '—';
  for(const p of palaces){
    const dr = p.decadal_range || '';
    if(dr){
      const [s,e] = dr.split('-').map(Number);
      if(s <= curAge && curAge <= e){ curDecStr = p.decadal_dizhi||'' + ' ' + p.name + ' ' + dr; break; }
    }
  }
  $('ov-current').textContent = curDecStr;
  const decEl = $('yun-decade');
  decEl.innerHTML = '';
  palaces.forEach((p, idx) => {
    const dr = p.decadal_range || '';
    const div = document.createElement('div');
    div.className = 'dec-cell';
    div.dataset.idx = idx;
    div.dataset.pname = p.name;
    if(dr){
      const [s,e] = dr.split('-').map(Number);
      if(s <= curAge && curAge <= e) div.classList.add('current');
    }
    div.innerHTML = '<div class="d-gz">'+(p.decadal_dizhi||'')+'</div><div class="d-ages">'+(dr||'')+'</div>';
    div.onclick = () => toggleScope('decade', { pName: p.name, palaceIdx: idx });
    decEl.appendChild(div);
  });
}
function renderFlowYears(){
  const ty = parseInt($('horo-year')?.value) || new Date().getFullYear();
  const yg = $('drill-year-grid');
  yg.innerHTML = '';
  for(let i=0; i<12; i++){
    const y = ty - (ty % 12) + i;
    const gz = GAN_ARR[(y-4)%10] + ZHI_ARR[(y-4)%12];
    const br = ZHI_ARR[(y-4)%12];
    const div = document.createElement('div');
    div.className = 'drill-cell';
    if(y === ty) div.classList.add('active');
    div.innerHTML = '<div class="dc-gz">'+gz+'</div><div class="dc-sub">'+y+'年</div>';
    div.onclick = () => toggleScope('yearly', { year: y, gz, br });
    yg.appendChild(div);
  }
  const inp = plateData?.input || {};
  const birthDt = inp.birth_datetime || '';
  const birthM = parseInt(birthDt.split('-')[1]) || 1;
  const birthH = parseInt(birthDt.split(' ')[1]?.split(':')[0]) || 0;
  const sc = Math.floor((birthH + 1) / 2) % 12;
  const yearIdx = (ty - 4) % 12;
  const dj = (((yearIdx - (birthM - 1)) % 12 + 12) % 12 + sc) % 12;
  const mg = $('drill-month-grid');
  mg.innerHTML = '';
  const ygan = GAN_ARR[(ty-4)%10];
  for(let m=1; m<=12; m++){
    const idx = (dj + m - 1) % 12;
    const br = ZHI_ARR[idx];
    const mgz = ygan + br;
    const div = document.createElement('div');
    div.className = 'drill-cell';
    div.innerHTML = '<div class="dc-gz">'+m+'月 '+br+'</div><div class="dc-sub">'+br+'宫</div>';
    div.onclick = () => toggleScope('monthly', { month: m, br, gz: mgz });
    mg.appendChild(div);
  }
  if(!scope.yearly) $('fpv-year').textContent = '—';
  if(!scope.monthly) $('fpv-month').textContent = '—';
  $('fpv-day').textContent = '—';
}
function toggleDrill(kind){
  const y = $('drill-year'), m = $('drill-month');
  if(kind === 'year'){ y.classList.toggle('open'); m.classList.remove('open'); }
  else if(kind === 'month'){ m.classList.toggle('open'); y.classList.remove('open'); }
}
async function fetchHoroscope(year){
  const ss = $('scope-status');
  if(ss && ss.classList.contains('show')){
    const ld = document.createElement('span'); ld.id='horo-loading'; ld.textContent='流曜加载中...'; ld.style.cssText='font-size:10px;color:var(--ink-faint);margin:0 6px;animation:blink 1s infinite';
    ss.appendChild(ld);
  }
  try{
    const inp = plateData?.input || {};
    const birthDt = inp.birth_datetime || '';
    const parts = birthDt.match(/(\d{4})-(\d{2})-(\d{2})\s(\d{1,2}):(\d{2})/);
    if(!parts){ $('horo-loading')?.remove(); return; }
    const body = {
      year: parseInt(parts[1]), month: parseInt(parts[2]), day: parseInt(parts[3]),
      hour: parseInt(parts[4]), gender: inp.gender || '男',
      target_year: year, is_lunar: inp.is_lunar || false
    };
    const r = await fetch('/api/ziwei/horoscope', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body)
    });
    if(r.ok){ horoscopeData = await r.json(); }
  }catch(e){ horoscopeData = null; }
  $('horo-loading')?.remove();
}
async function toggleScope(kind, data){
  const cur = scope[kind];
  if(cur && JSON.stringify(cur) === JSON.stringify(data)){
    scope[kind] = null;
  } else {
    scope[kind] = data;
  }
  // 拉取流年数据
  if(kind === 'yearly' && scope.yearly){
    await fetchHoroscope(scope.yearly.year);
  }
  if(kind === 'monthly' && scope.monthly){
    if(!horoscopeData) await fetchHoroscope(new Date().getFullYear());
  }
  updateFocusPills();
  applyAllScope();
}
function updateFocusPills(){
  document.querySelectorAll('.yun-decade .dec-cell').forEach(c => c.classList.remove('active'));
  if(scope.decade){
    document.querySelectorAll('.yun-decade .dec-cell').forEach(c => {
      if(c.dataset.pname === scope.decade.pName) c.classList.add('active');
    });
  }
  const fy = $('fp-year'), fm = $('fp-month'), fd = $('fp-day');
  if(scope.yearly){ fy.classList.add('active'); $('fpv-year').textContent = scope.yearly.year+' '+scope.yearly.gz; }
  else { fy.classList.remove('active'); $('fpv-year').textContent = '—'; }
  if(scope.monthly){ fm.classList.add('active'); $('fpv-month').textContent = scope.monthly.month+'月 '+scope.monthly.gz[1]; }
  else { fm.classList.remove('active'); $('fpv-month').textContent = '—'; }
  document.querySelectorAll('#drill-year-grid .drill-cell').forEach(c => {
    c.classList.remove('active');
    if(scope.yearly && c.querySelector('.dc-sub')?.textContent === scope.yearly.year+'年') c.classList.add('active');
  });
  document.querySelectorAll('#drill-month-grid .drill-cell').forEach(c => {
    c.classList.remove('active');
    if(scope.monthly && c.textContent.includes(scope.monthly.month+'月')) c.classList.add('active');
  });
  updateScopeStatus();
}
function highlightDayOnly(){
  scope.dayOnly = scope.dayOnly ? null : { day: new Date().getDate(), br: ZHI_ARR[(new Date().getDate()-1)%12] };
  if(scope.dayOnly){
    $('fp-day').textContent = scope.dayOnly.day+'日 '+scope.dayOnly.br;
    $('fp-day').classList.add('active');
  } else {
    $('fp-day').textContent = '—';
    $('fp-day').classList.remove('active');
  }
}
// ── 三合四正连线 ──
function renderSanheLines(){
  const svg = document.getElementById('grid-lines');
  if(!svg) return;
  const grid = document.getElementById('grid');
  if(!grid || !grid.children.length) return;
  const rect = grid.getBoundingClientRect();
  const svgRect = svg.getBoundingClientRect();
  const ox = rect.left - svgRect.left, oy = rect.top - svgRect.top;
  const cellW = rect.width / 4, cellH = rect.height / 4;
  // 地支→grid 坐标 (col,row) 已经定义在 GRID_POS
  const brs = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  // 每组三合 g0-g1-g2
  const groups = [
    { br: '申', mates: ['子','辰'] },  // 申子辰
    { br: '巳', mates: ['酉','丑'] },  // 巳酉丑
    { br: '寅', mates: ['午','戌'] },  // 寅午戌
    { br: '亥', mates: ['卯','未'] },  // 亥卯未
  ];
  let html = '';
  groups.forEach((g, gi) => {
    const all = [g.br, ...g.mates];
    const pts = all.map(b => {
      const pos = GRID_POS[b];
      return [ox + pos[0] * cellW + cellW/2, oy + pos[1] * cellH + cellH/2];
    });
    // 三角形: g0→g1, g1→g2, g2→g0
    html += '<polyline class="sanhe-line g'+gi+'" data-group="'+gi+'" points="'+
      pts[0][0]+','+pts[0][1]+' '+pts[1][0]+','+pts[1][1]+' '+pts[2][0]+','+pts[2][1]+' '+pts[0][0]+','+pts[0][1]+'"/>';
  });
  // 对宫线（地支相隔6位）
  for(let i=0; i<6; i++){
    const b1=brs[i], b2=brs[i+6];
    const p1=GRID_POS[b1], p2=GRID_POS[b2];
    html += '<line class="sanhe-line duigong" data-duigong="'+b1+'-'+b2+'" x1="'+(ox+p1[0]*cellW+cellW/2)+'" y1="'+(oy+p1[1]*cellH+cellH/2)+'" x2="'+(ox+p2[0]*cellW+cellW/2)+'" y2="'+(oy+p2[1]*cellH+cellH/2)+'"/>';
  }
  svg.innerHTML = html;
  // hover 交互：鼠标悬停宫格时高亮对应三合连线和四正
  grid.querySelectorAll('.palace').forEach(el => {
    if(!el.dataset.hooked){
      el.dataset.hooked = '1';
      el.addEventListener('mouseenter', function(){
        const br = el.querySelector('.p-dizhi')?.textContent?.trim();
        if(!br) return;
        const idx = brs.indexOf(br);
        if(idx < 0) return;
        // 找到所属三合组
        const groupBrs = [br];
        [4,8].forEach(d => groupBrs.push(brs[(idx+d)%12]));
        // 四正=三合+对宫
        groupBrs.push(brs[(idx+6)%12]);
        // 高亮线条
        svg.querySelectorAll('.sanhe-line').forEach(l => l.classList.remove('highlight'));
        svg.querySelectorAll('.sanhe-line').forEach(l => {
          const pts = l.getAttribute('points') || '';
          const dg = l.getAttribute('data-duigong') || '';
          const hit = groupBrs.some(b => pts.includes(b) !== false) || dg.split('-').some(b => b === br);
          // check if line connects to our branch
          let match = false;
          if(pts){
            groupBrs.forEach(gb => {
              // can't check points for branch names, check if any end matches
              if(brs.some(b => pts.split(' ').some(p => {
                const x = parseFloat(p.split(',')[0]); return !isNaN(x);
              }))){
                // this is getting complex, simpler approach
              }
            });
          }
        });
        // simpler: highlight by finding palace cells and checking if they share a branch
        let hlBr = new Set();
        const gi = groups.findIndex(g => g.br === br || g.mates.includes(br));
        if(gi >= 0) svg.querySelector('.sanhe-line[data-group="'+gi+'"]')?.classList.add('highlight');
        svg.querySelector('.sanhe-line[data-duigong*="'+br+'"]')?.classList.add('highlight');
        // 高亮宫格
        [4,6,8].forEach(d => hlBr.add(brs[(idx+d)%12])); hlBr.add(br);
        grid.querySelectorAll('.palace').forEach(p => p.classList.remove('hovering-sanhe'));
        grid.querySelectorAll('.palace').forEach(p => {
          const b = p.querySelector('.p-dizhi')?.textContent?.trim();
          if(hlBr.has(b)) p.classList.add('hovering-sanhe');
        });
      });
      el.addEventListener('mouseleave', function(){
        svg.querySelectorAll('.sanhe-line').forEach(l => l.classList.remove('highlight'));
        grid.querySelectorAll('.palace').forEach(p => p.classList.remove('hovering-sanhe'));
      });
    }
  });
}

// ── 流式分析 ──
async function startAnalysis(plate, password){
  if(!plate) return;
  const area = document.getElementById('analysis-text');
  const loadingHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:16px;padding:40px 20px"><div style="display:flex;gap:6px"><span class="load-dot" style="animation-delay:0s"></span><span class="load-dot" style="animation-delay:.2s"></span><span class="load-dot" style="animation-delay:.4s"></span></div><div style="font-size:16px;font-weight:700;color:var(--ink)">正在推算命盘</div><div style="font-size:12px;color:var(--ink-soft);width:300px;line-height:1.7">深度分析约需 2~4 分钟<br>请耐心等待，页面无需刷新</div></div>';
  area.innerHTML = loadingHTML;
  try{
    let pw = reportPw || password || '';
    for(let attempt=0; attempt<2; attempt++){
      const r = await fetch('/api/ziwei/analyze/stream', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({plate, password: pw, verification_mode: true})
      });
      if(r.status === 403){
        const err = await r.json().catch(()=>({}));
        if(!err.need_password) { area.innerHTML = '<span style="color:var(--vermillion)">权限不足</span>'; return; }
        pw = await new Promise(resolve => {
          const ov = document.createElement('div');
          ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;font-family:Noto Serif SC,serif';
          ov.innerHTML = '<div style="background:var(--paper-card);border:1px solid var(--line);padding:24px;width:320px;text-align:center;border-radius:4px"><h3 style="font-size:14px;margin-bottom:8px;color:var(--ink)">\ud83d\udd10 需要密码</h3><input type="password" id="ziwei-pw-input" placeholder="请输入密码" style="width:90%;padding:8px;font-size:.9em;border:1px solid var(--line-soft);border-radius:2px;margin-bottom:10px;background:var(--paper);color:var(--ink);font-family:inherit"><div style="display:flex;gap:8px"><button id="ziwei-pw-cancel" style="flex:1;padding:6px;border:1px solid var(--line-soft);background:var(--paper);color:var(--ink);cursor:pointer;border-radius:2px;font-family:inherit">取消</button><button id="ziwei-pw-ok" style="flex:1;padding:6px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;border-radius:2px;font-family:inherit">确认</button></div></div>';
          document.body.appendChild(ov);
          const inp = ov.querySelector('#ziwei-pw-input'); inp.focus();
          ov.querySelector('#ziwei-pw-ok').onclick = () => { ov.remove(); resolve(inp.value); };
          ov.querySelector('#ziwei-pw-cancel').onclick = () => { ov.remove(); resolve(null); };
          inp.onkeydown = e => { if(e.key==='Enter') ov.querySelector('#ziwei-pw-ok').click(); };
        });
        if(!pw){ area.innerHTML = '<span style="color:var(--vermillion)">已取消</span>'; return; }
        reportPw = pw; sessionStorage.setItem('ziwei_pw', pw);
        continue;
      }
      if(!r.ok){ area.innerHTML = '<span style="color:var(--vermillion)">请求失败: HTTP '+r.status+'</span>'; return; }
      // SSE 流式读取
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let buf = '', rawText = '', firstToken = true;
      while(true){
        const {done, value} = await reader.read();
        if(done) break;
        buf += decoder.decode(value, {stream: true});
        const parts = buf.split('\n\n'); buf = parts.pop();
        for(const part of parts){
          for(const line of part.split('\n')){
            if(!line.startsWith('data: ')) continue;
            try{
              const evt = JSON.parse(line.slice(6));
              if(evt.type === 'content_block_delta' && evt.delta && evt.delta.text){
                rawText += evt.delta.text;
                if(firstToken){
                  firstToken = false;
                  area.innerHTML = '';
                }
                area.innerText = rawText;
              }
              if(evt.type === 'message_stop'){ /* done */ }
            }catch(e){}
          }
        }
      }
      reader.cancel();
      if(rawText){
        sessionStorage.setItem('ziwei_pw', pw || '');
        // 验盘响应：显示确认面板
        if(rawText.includes('验盘完毕') || rawText.includes('命盘验证')){
          renderVerification(rawText);
          return;
        }
        area.innerHTML = formatText(rawText);
        area.scrollIntoView({behavior:'smooth',block:'start'});
        await fetch('/api/ziwei/sessions/'+sid, {
          method:'PATCH', headers:{'Content-Type':'application/json'},
          body:JSON.stringify({messages:[{role:'assistant',content:rawText}]})
        });
        return;
      }
      area.innerHTML = '<span style="color:var(--vermillion)">分析未返回有效内容</span>';
      return;
    }
    area.innerHTML = '<span style="color:var(--vermillion)">密码错误，请重试</span>';
  }catch(e){
    area.innerHTML = '<span style="color:var(--vermillion)">连接中断: '+e.message+'</span>';
  }
}

function formatText(t){
  // 第一阶段：标记块级语法（先于 HTML 转义）
  t = t.replace(/^> /gm,'\u0001Q ');
  t = t.replace(/^[-*] /gm,'\u0001UL ');
  t = t.replace(/^(\d+)\. /gm,'\u0001OL ');
  t = t.replace(/^---+$/gm,'\u0001HR');
  // HTML 转义
  t = t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  // 第二阶段：逐行转 HTML
  const lines = t.split('\n');
  const out = [];
  let inList = 0; // 0=none, 1=ul, 2=ol
  function closeList(){ if(inList){ out.push(inList===2?'</ol>':'</ul>'); inList=0; } }
  for(const raw of lines){
    let line = raw.trim();
    if(!line){ closeList(); out.push('<br>'); continue; }
    // 还原 Unicode 标记
    if(line.startsWith('\u0001Q ')){ closeList(); out.push('<blockquote>'+line.slice(3)+'</blockquote>'); continue; }
    if(line.startsWith('\u0001UL ')){
      if(inList!==1){ closeList(); out.push('<ul>'); inList=1; }
      out.push('<li>'+line.slice(4)+'</li>'); continue;
    }
    if(line.startsWith('\u0001OL ')){
      if(inList!==2){ closeList(); out.push('<ol>'); inList=2; }
      out.push('<li>'+line.slice(4)+'</li>'); continue;
    }
    if(line === '\u0001HR'){ closeList(); out.push('<hr>'); continue; }
    if(/^#### (.+)/.test(line)){ closeList(); out.push('<h4>'+line.slice(5)+'</h4>'); continue; }
    if(/^### (.+)/.test(line)){ closeList(); out.push('<h3>'+line.slice(4)+'</h3>'); continue; }
    if(/^## (.+)/.test(line)){ closeList(); out.push('<h2>'+line.slice(3)+'</h2>'); continue; }
    closeList(); out.push('<p>'+line+'</p>');
  }
  closeList();
  // 第三阶段：行内格式化
  let html = out.join('');
  html = html.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');
  return html;
}

// ── 追问 ──
async function sendChat(){
  const input = $('chat-input'), reply = input.value.trim();
  if(!reply) return;
  input.disabled = true; $('btn-chat').disabled = true;
  const chatArea = $('chat-messages');
  chatArea.innerHTML += `<div class="chat-msg user"><div class="who">你</div>${reply}</div>`;
  input.value = '';
  // 获取当前 messages
  const r = await fetch(`/api/ziwei/sessions/${sid}`);
  const s = await r.json();
  const msgs = s.messages || [];
  try{
    const res = await fetch('/api/ziwei/analyze/continue', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages: msgs, reply, password: reportPw})
    });
    const d = await res.json();
    if(res.status === 403 && !reportPw){
      reportPw = await new Promise(resolve => {
        const ov = document.createElement('div');
        ov.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;display:flex;align-items:center;justify-content:center;font-family:Noto Serif SC,serif';
        ov.innerHTML = '<div style="background:var(--paper-card);border:1px solid var(--line);padding:24px;width:320px;text-align:center;border-radius:4px"><h3 style="font-size:14px;color:var(--ink);margin-bottom:8px">🔐 需要密码</h3><input type="password" id="sc-pw-inp" placeholder="请输入密码" style="width:90%;padding:8px;font-size:.9em;border:1px solid var(--line-soft);border-radius:2px;margin-bottom:10px;background:var(--paper);color:var(--ink);font-family:inherit"><div style="display:flex;gap:8px"><button id="sc-pw-cancel" style="flex:1;padding:6px;border:1px solid var(--line-soft);background:var(--paper);color:var(--ink);cursor:pointer;border-radius:2px;font-family:inherit">取消</button><button id="sc-pw-ok" style="flex:1;padding:6px;background:var(--ink);color:var(--paper);border:none;cursor:pointer;border-radius:2px;font-family:inherit">确认</button></div></div>';
        document.body.appendChild(ov);
        const inp = ov.querySelector('#sc-pw-inp'); inp.focus();
        ov.querySelector('#sc-pw-ok').onclick = () => { ov.remove(); resolve(inp.value); };
        ov.querySelector('#sc-pw-cancel').onclick = () => { ov.remove(); resolve(null); };
        inp.onkeydown = e => { if(e.key==='Enter') ov.querySelector('#sc-pw-ok').click(); };
      });
      if(!reportPw){ input.disabled = false; $('btn-chat').disabled = false; return; }
      sessionStorage.setItem('ziwei_pw', reportPw);
      res = await fetch('/api/ziwei/analyze/continue', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages: msgs, reply, password: reportPw})
      });
      d = await res.json();
    }
    if(d.success){
      chatArea.innerHTML += `<div class="chat-msg agent"><div class="who">Agent</div>${d.analysis.replace(/\n/g,'<br>')}</div>`;
      // 追加到 session
      msgs.push({role:'user', content: reply});
      msgs.push({role:'assistant', content: d.analysis});
      await fetch(`/api/ziwei/sessions/${sid}`, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages: msgs})
      });
    }
  } catch(e){ chatArea.innerHTML += '<div style="color:var(--vermillion);font-size:11px">追问失败，请重试</div>'; }
  input.disabled = false; $('btn-chat').disabled = false;
}
</script>
