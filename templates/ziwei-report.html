<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · 命盘报告</title>
<style>
  :root {
    --paper: #f5f1e8; --paper-deep: #ebe5d5; --paper-card: #faf6ec;
    --ink: #2b2825; --ink-soft: #6b6660; --ink-faint: #a8a298;
    --vermillion: #c1432f; --vermillion-deep: #8e2f20;
    --azure: #2e6da4; --jade: #4a7c4e; --jade-soft: #6f9971;
    --line: #8b8378; --line-soft: #c4bdb0; --line-faint: #e0d9c8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--paper); color: var(--ink);
    font-family: "Source Han Serif SC", "Noto Serif SC", "STSong", "PingFang SC", serif;
    font-size: 14px; line-height: 1.7;
    background-image: radial-gradient(circle at 15% 25%, rgba(180,160,130,0.06), transparent 50%),
                      radial-gradient(circle at 85% 75%, rgba(180,160,130,0.05), transparent 50%);
    min-height: 100vh;
  }
  .no-print { display: block; }
  .report { max-width: 1080px; margin: 0 auto; padding: 24px; }

  /* ── 导航 ── */
  .nav-bar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0 16px; border-bottom: 1px solid var(--line-soft); margin-bottom: 20px;
  }
  .nav-bar .title { font-size: 18px; letter-spacing: 2px; color: var(--ink); }
  .nav-bar .btn-back {
    font-size: 12px; color: var(--ink-soft); text-decoration: none;
    border: 1px solid var(--line-soft); padding: 4px 12px; border-radius: 2px;
  }
  .nav-bar .btn-back:hover { border-color: var(--vermillion); color: var(--vermillion); }

  /* ── 命盘概要 ── */
  .info-bar {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    background: var(--paper-card); border: 1px solid var(--line-soft);
    padding: 12px 16px; margin-bottom: 16px; font-size: 12px; line-height: 1.6;
  }
  .info-bar .label { color: var(--ink-faint); }
  .info-bar .value { color: var(--ink); font-weight: 600; }

  /* ── 4x4 宫格 ── */
  .ziwei-grid {
    display: grid; grid-template-columns: repeat(4, 1fr); grid-template-rows: repeat(4, 1fr);
    height: 540px; background: var(--line-soft); gap: 1px; margin-bottom: 16px;
  }
  .palace {
    background: var(--paper); padding: 5px 7px; font-size: 10px; line-height: 1.4;
    display: flex; flex-direction: column; overflow: hidden; cursor: pointer;
    transition: background .15s;
  }
  .palace:hover { background: var(--paper-card); }
  .palace .p-hint { display:none; font-size:7px; color:var(--ink-faint); margin-top:auto; text-align:right; }
  .palace:hover .p-hint { display:block; }
  .palace.ming { box-shadow: inset 0 0 0 2px var(--vermillion); }
  .palace .p-head {
    display: flex; align-items: center; gap: 4px; flex-wrap: wrap;
    border-bottom: 1px dashed var(--line-faint); padding-bottom: 2px; margin-bottom: 3px;
  }
  .palace .p-dizhi { font-size: 11px; font-weight: 700; color: var(--ink-soft); }
  .palace .p-gong { font-size: 10px; font-weight: 600; color: var(--ink); }
  .palace .p-ganzhi { font-size: 9px; color: var(--ink-faint); margin-left: auto; }
  .shen-badge {
    display: inline-block; color: var(--vermillion); border: 1px solid var(--vermillion);
    border-radius: 2px; font-size: 8px; padding: 0 3px; line-height: 1.3;
  }
  .palace .main-star { font-size: 12px; font-weight: 700; line-height: 1.5; }
  .palace .aux-star { color: var(--ink-soft); font-size: 10px; line-height: 1.5; }
  .palace .sihua-mark { font-size: 9px; margin-left: 1px; }
  .sihua-禄 { color: var(--vermillion); } .sihua-权 { color: var(--azure); }
  .sihua-科 { color: var(--jade); } .sihua-忌 { color: var(--ink); text-decoration: underline; }
  .palace .daxian {
    margin-top: auto; padding-top: 3px; border-top: 1px dashed var(--line-faint);
    font-size: 9px; color: var(--ink-soft);
  }
  .palace.current .daxian { color: var(--vermillion); font-weight: 700; }

  /* 中间 info */
  .center-palace {
    grid-column: 2 / 4; grid-row: 2 / 4;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: var(--paper); padding: 14px; text-align: center;
    border-left: 1px solid var(--line); border-right: 1px solid var(--line);
  }
  .center-palace h3 { font-size: 16px; letter-spacing: 4px; margin-bottom: 8px; }
  .center-palace .info { font-size: 11px; color: var(--ink-soft); margin: 2px 0; }
  .center-palace .pillars { display: flex; gap: 8px; margin-top: 10px; }
  .center-palace .pillar {
    background: var(--paper-deep); border: 1px solid var(--line-soft);
    padding: 4px 8px; text-align: center;
  }
  .center-palace .pillar .pname { font-size: 9px; color: var(--ink-faint); }
  .center-palace .pillar .pgan { font-size: 14px; font-weight: 700; }
  .center-palace .pillar .pzhi { font-size: 13px; color: var(--ink-soft); }

  /* ── 大运条 ── */
  .dayun-strip { margin-bottom: 16px; border: 1px solid var(--line-soft); }
  .strip-head {
    background: var(--paper-deep); padding: 5px 12px;
    font-size: 12px; border-bottom: 1px solid var(--line-soft);
  }
  .strip-row { display: grid; grid-template-columns: repeat(10, 1fr); }
  .strip-cell {
    border-right: 1px solid var(--line-faint); padding: 4px 2px;
    text-align: center; font-size: 9px; cursor: pointer;
  }
  .strip-cell:last-child { border-right: none; }
  .strip-cell .gz { font-size: 11px; font-weight: 700; }
  .strip-cell .ages { color: var(--ink-soft); font-size: 8px; }
  .strip-cell.current { background: rgba(193,67,47,0.08); }
  .strip-cell.current .gz { color: var(--vermillion); }
  #flow-row { grid-template-columns: repeat(12, 1fr); }

  /* ── 分析 + 追问 ── */
  .analysis-area {
    background: var(--paper-card); border: 1px solid var(--line-soft);
    padding: 18px 20px; margin-bottom: 14px;
  }
  .analysis-area h2 {
    font-size: 15px; letter-spacing: 1px; margin-bottom: 10px;
    border-left: 3px solid var(--vermillion); padding-left: 10px;
  }
  .analysis-text { font-size: 13px; line-height: 1.9; color: var(--ink); min-height: 100px; }
  .analysis-text strong { color: var(--ink); }
  .chat-area { margin-top: 14px; }
  .chat-msg {
    margin: 6px 0; padding: 8px 12px; border-radius: 2px;
    font-size: 12px; line-height: 1.6;
  }
  .chat-msg.user { background: rgba(193,67,47,0.04); border-left: 2px solid rgba(193,67,47,0.2); }
  .chat-msg.agent { background: var(--paper-card); border: 1px solid var(--line-faint); }
  .chat-msg .who { font-weight: 700; color: var(--ink-soft); font-size: 11px; margin-bottom: 2px; }
  .chat-input-row { display: flex; gap: 8px; margin-top: 10px; }
  .chat-input-row textarea {
    flex: 1; padding: 8px 10px; font-size: 12px;
    border: 1px solid var(--line-soft); background: var(--paper);
    color: var(--ink); resize: none; outline: none; font-family: inherit;
  }
  .chat-input-row textarea:focus { border-color: var(--vermillion); }
  .chat-input-row button {
    padding: 6px 18px; font-size: 12px; background: var(--ink);
    color: var(--paper); border: none; cursor: pointer; letter-spacing: 1px;
  }
  .chat-input-row button:hover { background: var(--vermillion); }
  .chat-input-row button:disabled { opacity: .4; cursor: not-allowed; }

  /* ── 星曜弹窗 ── */
  .star-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 200;
    display: flex; align-items: center; justify-content: center;
  }
  .star-dialog {
    background: var(--paper-card); border: 1px solid var(--line);
    padding: 20px 24px; max-width: 380px; width: 90vw; font-size: 12px; line-height: 1.7;
  }
  .star-dialog h3 { font-size: 15px; margin-bottom: 8px; }
  .star-dialog .close-btn {
    float: right; background: none; border: none;
    font-size: 18px; cursor: pointer; color: var(--ink-soft);
  }

  /* ── 骨架屏 ── */
  .skeleton { background: var(--line-faint); border-radius: 2px; animation: pulse 1.5s infinite; }
  .skeleton-grid { height: 540px; }
  .skeleton-line { height: 14px; margin: 8px 0; width: 80%; }
  .skeleton-line:last-child { width: 60%; }
  @keyframes pulse { 0%{opacity:.6} 50%{opacity:1} 100%{opacity:.6} }

  /* ── 打印 ── */
  @media print {
    .no-print { display: none !important; }
    body { background: white; padding: 0; }
    .report { max-width: 100%; padding: 0; }
    .nav-bar { display: none; }
    .ziwei-grid { height: 480px; page-break-inside: avoid; }
    .analysis-area { page-break-inside: avoid; }
    .palace { break-inside: avoid; }
  }

  /* ── 响应式 ── */
  @media (max-width: 700px) {
    .report { padding: 12px; }
    .info-bar { grid-template-columns: 1fr; font-size: 11px; }
    .ziwei-grid { height: 380px; }
    .palace { font-size: 9px; padding: 3px 5px; }
    .palace .main-star { font-size: 10px; }
    .center-palace h3 { font-size: 13px; }
    .strip-row { grid-template-columns: repeat(5, 1fr); }
    .strip-cell:nth-child(n+6) { display: none; }  /* 手机只显示前5个大运 */
  }
</style>
</head>
<body>
<div class="report">
  <!-- 导航 -->
  <div class="nav-bar no-print">
    <span class="title">🔮 紫微斗数 · 命盘报告</span>
    <a href="/ziwei" class="btn-back">← 重新排盘</a>
  </div>

  <!-- 命盘概要 -->
  <div class="info-bar" id="info-bar">
    <div class="skeleton-line"></div>
  </div>

  <!-- 4x4 宫格 -->
  <div style="position:relative">
    <div class="ziwei-grid skeleton-grid" id="grid"></div>
    <svg id="grid-lines" style="position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none"></svg>
  </div>

  <!-- 运限控制 -->
  <div class="dayun-strip no-print" id="dayun-strip">
    <div class="strip-head" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span>大限（虚岁）</span>
      <input type="number" id="horo-year" value="2026" min="1900" max="2100" style="width:56px;padding:2px 4px;font-size:10px;border:1px solid var(--line-soft);background:var(--paper);color:var(--ink);border-radius:2px" onchange="renderFlowYears()">
    </div>
    <div class="strip-row" id="dayun-row" style="grid-template-columns:repeat(12,1fr)"></div>
  </div>
  <!-- 流年/流月/流日 条 -->
  <div class="dayun-strip no-print">
    <div class="strip-head">流年 · 流月 · 流日 <span style="color:var(--ink-faint);font-size:10px">（点击展开叠盘）</span></div>
    <div class="strip-row" id="flow-row" style="grid-template-columns:repeat(12,1fr)"></div>
    <div class="strip-row" id="month-row" style="grid-template-columns:repeat(12,1fr);border-top:1px solid var(--line-faint)"></div>
    <div class="strip-row" id="day-row" style="grid-template-columns:repeat(15,1fr);border-top:1px solid var(--line-faint);font-size:8px"></div>
  </div>

  <!-- 分析 -->
  <div class="analysis-area" id="analysis">
    <h2>📜 命盘解读</h2>
    <div class="analysis-text" id="analysis-text">
      <div class="skeleton-line"></div>
      <div class="skeleton-line"></div>
      <div class="skeleton-line" style="width:60%"></div>
    </div>
  </div>

  <!-- 追问 -->
  <div class="chat-area no-print" id="chat-area">
    <div class="chat-input-row">
      <textarea id="chat-input" rows="2" placeholder="追问Agent，例如：我今年换工作合适吗？"></textarea>
      <button id="btn-chat" onclick="sendChat()">发送</button>
    </div>
    <div id="chat-messages" style="margin-top:8px"></div>
  </div>
</div>

<!-- 星曜弹窗 -->
<div id="star-dialog" class="star-overlay" style="display:none" onclick="this.style.display='none'">
  <div class="star-dialog" onclick="event.stopPropagation()">
    <button class="close-btn" onclick="closeStarDetail()">✕</button>
    <h3 id="sd-name"></h3>
    <div id="sd-content"></div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const sid = window.location.pathname.split('/').pop();
let plateData = null;

// ── 加载数据 ──
async function load(){
  const r = await fetch(`/api/ziwei/sessions/${sid}`);
  if(!r.ok){ $('grid').innerHTML='<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--ink-soft)">报告未找到或已过期</div>'; return }
  const s = await r.json();
  plateData = s.plate_data || null;
  renderInfo(s);
  if(plateData && plateData.palaces){
    renderGrid(plateData);
    renderDayun(plateData);
    renderFlowYears();
  }
  const msgs = s.messages || [];
  const validAnalysis = msgs.find(m => m.role === 'assistant' && m.content && m.content.length > 50);
  if(validAnalysis) renderAnalysis(msgs);
  else startAnalysis(s.plate_data);
}
load();

// ── 命盘概要 ──
function renderInfo(session){
  const p = session.plate_data || {};
  const inp = p.input || {};
  const yms = p.year_mutagens || [];
  const sihuaStr = yms.map(m => `${m.mutagen}：${m.star}在${m.palace}`).join(' · ') || '—';
  const gender = inp.gender || '—';
  const fec = p.five_elements_class || '—';
  const soul = p.soul_palace || '—';
  const body = p.body_palace || '—';
  // 来因宫 + 八字日主
  const GAN = '甲乙丙丁戊己庚辛壬癸';
  const ZHI = '子丑寅卯辰巳午未申酉戌亥';
  const LAIYIN = ['父母','福德','命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友'];
  const WX = {'甲':'木','乙':'木','丙':'火','丁':'火','戊':'土','己':'土','庚':'金','辛':'金','壬':'水','癸':'水'};
  const birthDt = inp.birth_datetime || '';
  const birthYear = parseInt(birthDt.split('-')[0]) || 0;
  const birthMonth = parseInt(birthDt.split('-')[1]) || 1;
  const birthDay = parseInt(birthDt.split('-')[2]?.split(' ')[0]) || 1;
  const laiyin = birthYear ? LAIYIN[(birthYear-4)%10] : '—';
  // 近似日柱（查表法精度不够，改为略过精确日柱，只显示年干/月干信息）
  const nianGan = birthYear ? GAN[(birthYear-4)%10] : '?';
  const riGanWx = nianGan ? WX[nianGan] || '?' : '?';
  $('info-bar').innerHTML = `
    <div><span class="label">出生</span> <span class="value">${birthDt} ${gender}</span></div>
    <div><span class="label">五行局</span> <span class="value">${fec}</span></div>
    <div><span class="label">命宫/身宫</span> <span class="value">${soul} / ${body}</span></div>
    <div><span class="label">来因宫</span> <span class="value">${laiyin}</span></div>
    <div><span class="label">年柱</span> <span class="value">${nianGan}${ZHI[(birthYear-4)%12]}</span></div>
    <div style="grid-column:1/-1"><span class="label">生年四化</span> <span class="value">${sihuaStr}</span></div>
  `;
}

// ── 宫格渲染 ──
const GRID_POS = {'巳':[0,0],'午':[1,0],'未':[2,0],'申':[3,0],'辰':[0,1],'酉':[3,1],'卯':[0,2],'戌':[3,2],'寅':[0,3],'丑':[1,3],'子':[2,3],'亥':[3,3]};
const BR_ORDER = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
const GAN = '甲乙丙丁戊己庚辛壬癸';
const ZHI = '子丑寅卯辰巳午未申酉戌亥';
const SIHUA = {'化禄':'禄','化权':'权','化科':'科','化忌':'忌'};

function currentAge(){
  const y = new Date().getFullYear();
  return y - (parseInt(document.querySelector('.info-bar .value')?.textContent?.split('-')[0]) || 2005);
}

function renderGrid(plate){
  const palaces = plate.palaces || [];
  const soul = plate.soul_palace || '';
  const body = plate.body_palace || '';
  const cells = [];
  for(const p of palaces){
    const br = p.earthly_branch;
    const pos = GRID_POS[br];
    if(!pos) continue;
    const isSoul = p.name === soul;
    const isBody = p.name === body;
    const cls = isSoul ? 'palace ming' : 'palace';
    const shenBadge = isBody ? '<span class="shen-badge">身</span>' : '';
    // 主星+亮度+四化
    const mainStars = (p.major_stars || []).map(s => {
      let html = s.name;
      if(s.brightness) html += `<span style="font-size:9px;color:var(--ink-soft)">[${s.brightness}]</span>`;
      if(s.mutagen){
        const hua = SIHUA[s.mutagen] || s.mutagen;
        const cls = {'禄':'sihua-禄','权':'sihua-权','科':'sihua-科','忌':'sihua-忌'}[hua] || '';
        html += `<span class="sihua-mark ${cls}">◈${hua}</span>`;
      }
      return html;
    }).join('') || '<span style="color:var(--ink-faint)">—</span>';
    const auxStars = (p.minor_stars || []).slice(0,4).map(s => s.name).join(' ') || '';
    const dr = p.decadal_range || '';
    // 当前大限高亮
    const curAge = currentAge();
    let isCurrent = false;
    if(dr){
      const parts = dr.split('-');
      if(parts.length===2){
        const s = parseInt(parts[0]), e = parseInt(parts[1]);
        if(s <= curAge && curAge <= e) isCurrent = true;
      }
    }
    cells.push({
      pos, br, name: p.name, cls, shenBadge, mainStars, auxStars, dr, isCurrent,
      dizhi: p.dizhi || br,
    });
  }
  // 构建 grid
  const gridEl = $('grid');
  gridEl.className = 'ziwei-grid';
  gridEl.innerHTML = '';
  const gEls = [];
  for(const c of cells){
    const div = document.createElement('div');
    div.className = c.cls + (c.isCurrent ? ' current' : '');
    div.style.gridColumn = c.pos[0]+1; div.style.gridRow = c.pos[1]+1;
    div.innerHTML = `
      <div class="p-head">
        <span class="p-dizhi">${c.br}</span>
        <span class="p-gong">${c.name}</span>${c.shenBadge}
        <span class="p-ganzhi">${c.dizhi}</span>
      </div>
      <div class="main-star">${c.mainStars}</div>
      <div class="aux-star">${c.auxStars}</div>
      <div class="daxian">${c.dr ? '大限 '+c.dr : ''}</div>
      <div class="p-hint">双击详情</div>
    `;
    div.onclick = () => { selectPalace(c.br, plate); };
    div.ondblclick = () => { showPalaceDetail(c.name, plate); };
    gridEl.appendChild(div);
  }
  // center
  const center = document.createElement('div');
  center.className = 'center-palace';
  center.innerHTML = `<h3>${plate.five_elements_class || ''}</h3>
    <div class="info">命宫：${soul}　身宫：${body}</div>`;
  gridEl.appendChild(center);
}

// ── 大运条 ──
function renderDayun(plate){
  const palaces = plate.palaces || [];
  const curAge = currentAge();
  const row = $('dayun-row');
  row.innerHTML = palaces.map(p => {
    const dr = p.decadal_range || '';
    let cls = 'strip-cell';
    if(dr){
      const [s,e] = dr.split('-').map(Number);
      if(s <= curAge && curAge <= e) cls += ' current';
    }
    return `<div class="${cls}" onclick="selectDecade('${p.name}')">
      <div class="gz">${p.decadal_dizhi||''}</div>
      <div class="ages">${dr}</div>
    </div>`;
  }).join('');
}
function renderFlowYears(){
  const ty = parseInt($('horo-year')?.value) || new Date().getFullYear();
  const GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
  const ZHI = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
  const ZHI_NAMES = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];

  // 流年
  const fRow = $('flow-row');
  fRow.innerHTML = '';
  for(let i=0; i<12; i++){
    const y = ty - (ty % 12) + i;
    const gz = GAN[(y-4)%10] + ZHI[(y-4)%12];
    const br = ZHI[(y-4)%12];
    const div = document.createElement('div');
    div.className = 'strip-cell';
    if(y === ty) div.classList.add('current');
    div.dataset.br = br; div.dataset.label = `${y}年`; div.dataset.gz = gz; div.innerHTML = `<div class="gz">${gz}</div><div class="ages">${y}年</div>`;
    div.onclick = function(){selectFlow(this.dataset.br, this.dataset.label, this.dataset.gz, "year")}; fRow.appendChild(div);
  }

  // 流月：斗君计算
  const inp = plateData?.input || {};
  const birthDt = inp.birth_datetime || '';
  const birthM = parseInt(birthDt.split('-')[1]) || 1;
  const birthH = parseInt(birthDt.split(' ')[1]?.split(':')[0]) || 0;
  const sc = Math.floor((birthH + 1) / 2) % 12;
  const yearIdx = (ty - 4) % 12;
  const dj = (((yearIdx - (birthM - 1)) % 12 + 12) % 12 + sc) % 12;
  const palaces = plateData?.palaces || [];

  // 流月条
  const mRow = $('month-row');
  mRow.innerHTML = '';
  for(let m=1; m<=12; m++){
    const idx = (dj + m - 1) % 12;
    const br = ZHI[idx];
    const div = document.createElement('div');
    div.className = 'strip-cell';
    div.dataset.br = br; div.dataset.label = `${m}月`; div.innerHTML = `<div class="gz">${m}月</div><div class="ages">${br}宫</div>`;
    div.onclick = function(){selectFlow(this.dataset.br, this.dataset.label, "", "month")}; mRow.appendChild(div);
  }

  // 流日条（15列显示前30天，每天对应一个地支）
  const dRow = $('day-row');
  dRow.innerHTML = '';
  for(let d=1; d<=30; d++){
    const br = ZHI[(d-1)%12];
    const div = document.createElement('div');
    div.className = 'strip-cell';
    div.dataset.br = br; div.dataset.label = `${d}日`; div.innerHTML = `<div class="gz">${d}日</div><div class="ages">${br}</div>`;
    div.onclick = function(){selectFlow(this.dataset.br, this.dataset.label, "", "day")}; dRow.appendChild(div);
  }
}



// ── 叠盘选择系统（大限/流年/流月/流日） ──
const SCOPE_COLORS = {decade:'#2e6da4', year:'#4a7c4e', month:'#c97c3a', day:'#7c4dff'};
const SCOPE_LABELS = {decade:'大限', year:'流年', month:'流月', day:'流日'};
const selections = {decade:null, year:null, month:null, day:null};
const GAN = ['甲','乙','丙','丁','戊','己','庚','辛','壬','癸'];
const GAN_SIHUA_MAP = {
  '甲':['廉贞','破军','武曲','太阳'],'乙':['天机','天梁','紫微','太阴'],
  '丙':['天同','天机','文昌','廉贞'],'丁':['太阴','天同','天机','巨门'],
  '戊':['贪狼','太阴','右弼','天机'],'己':['武曲','贪狼','天梁','文曲'],
  '庚':['太阳','武曲','太阴','天同'],'辛':['巨门','太阳','文曲','文昌'],
  '壬':['天梁','紫微','左辅','武曲'],'癸':['破军','巨门','太阴','贪狼']
};
const HUA = ['禄','权','科','忌'];
const LIMIT_NAMES = ['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];

function findSihuaPalaces(gan){
  const stars = GAN_SIHUA_MAP[gan]; if(!stars) return {};
  const pals = plateData?.palaces || [];
  const r = {};
  for(let i=0;i<4;i++){
    const found = pals.find(p => [...(p.major_stars||[]),...(p.minor_stars||[])].some(s => s.name===stars[i]));
    r[HUA[i]] = {star:stars[i], palace:found?found.name:'?'};
  }
  return r;
}

function selectDecade(name){
  if(selections.decade && selections.decade.name===name){ selections.decade=null; renderSel(); return; }
  const p = plateData?.palaces?.find(x=>x.name===name); if(!p) return;
  selections.decade = {name, br:p.earthly_branch, stem:p.heavenly_stem, sihua:findSihuaPalaces(p.heavenly_stem), label:p.decadal_dizhi||name};
  renderSel();
}
function selectFlow(br, label, gz, type){
  if(selections[type] && selections[type].br===br){ selections[type]=null; renderSel(); return; }
  selections[type] = {br, label, gz, sihua: gz ? findSihuaPalaces(gz[0]) : {}};
  renderSel();
}
function renderSel(){
  // 清除
  document.querySelectorAll('.palace').forEach(el=>{el.style.outline='';el.style.outlineOffset='';el.querySelectorAll('.scope-badge,.living-badge,.sihua-tag').forEach(e=>e.remove())});
  document.querySelectorAll('.strip-cell').forEach(c=>{c.style.background='';c.style.fontWeight=''});
  const pals = plateData?.palaces || [];
  for(const [type,sel] of Object.entries(selections)){
    if(!sel) continue;
    const col = SCOPE_COLORS[type];
    // 宫位高亮
    document.querySelectorAll('.palace').forEach(el=>{
      const dz = el.querySelector('.p-dizhi');
      if(!dz||dz.textContent.trim()!==sel.br) return;
      el.style.outline='2px solid '+col; el.style.outlineOffset=type==='decade'?'-3px':'-2px';
      const b = document.createElement('span'); b.className='scope-badge'; b.textContent=sel.label;
      b.style.cssText='font-size:8px;color:'+col+';border:1px solid '+col+';border-radius:2px;padding:0 3px;font-weight:700';
      el.querySelector('.p-head')?.appendChild(b);
    });
    // 大限限年宫名
    if(type==='decade'){ const di=pals.findIndex(p=>p.earthly_branch===sel.br); if(di>=0) document.querySelectorAll('.palace').forEach((el,i)=>{
      const b=document.createElement('span'); b.className='living-badge'; b.textContent=LIMIT_NAMES[(i-di+12)%12];
      b.style.cssText='font-size:7px;color:'+col+';border:1px solid '+col+';border-radius:2px;padding:0 2px;margin-left:2px';
      el.querySelector('.p-head')?.appendChild(b);
    });}
    // 四化
    if(sel.sihua) for(const[hua,info] of Object.entries(sel.sihua)){
      if(!info.palace||info.palace==='?') continue;
      document.querySelectorAll('.palace').forEach(el=>{
        const g=el.querySelector('.p-gong'); if(!g||g.textContent.trim()!==info.palace) return;
        const t=document.createElement('span'); t.className='sihua-tag';
        t.textContent=(SCOPE_LABELS[type]||'')+hua;
        t.style.cssText='font-size:7px;color:'+col+';border:1px solid '+col+';border-radius:2px;padding:0 2px;margin-left:1px';
        el.querySelector('.main-star')?.appendChild(t);
      });
    }
    // 条选中
    const sid={'decade':'dayun-row','year':'flow-row','month':'month-row','day':'day-row'}[type];
    if(sid) document.querySelectorAll('#'+sid+' .strip-cell').forEach(c=>{
      const g=c.querySelector('.gz'); if(!g) return;
      if(g.textContent.trim()===sel.label||g.textContent.trim()===sel.br||(sel.label&&g.textContent.trim().startsWith(sel.label))){c.style.background=col+'22';c.style.fontWeight='700'}
    });
  }
}

// ── 宫位点击弹窗 ──
function showPalaceDetail(name, plate){
  const p = (plate.palaces || []).find(x => x.name === name);
  if(!p) return;
  const major = (p.major_stars || []).map(s => `${s.name}[${s.brightness||'?'}]`).join('、') || '无主星(空宫)';
  const minor = (p.minor_stars || []).map(s => s.name).join('、') || '无';
  const mutagens = (p.mutagens || []).map(m => `${m.star}${m.mutagen}`).join('、') || '无';
  $('sd-name').textContent = `${name}（${p.earthly_branch}）`;
  $('sd-content').innerHTML = `
    <div style="margin-top:6px"><b>主星</b>：${major}</div>
    <div><b>辅星</b>：${minor}</div>
    <div><b>四化</b>：${mutagens}</div>
    <div><b>大限</b>：${p.decadal_range||'—'}</div>
  `;
  $('star-dialog').style.display = 'flex';
}
function closeStarDetail(){ $('star-dialog').style.display = 'none'; }
window.addEventListener('keydown', e => { if(e.key==='Escape') closeStarDetail(); });

// ── 三方四正 ──
let selectedPalace = null;
const BR = ['子','丑','寅','卯','辰','巳','午','未','申','酉','戌','亥'];
function selectPalace(br, plate){
  selectedPalace = (selectedPalace === br) ? null : br;
  drawSanfang(plate);
}
function drawSanfang(plate){
  const svg = $('grid-lines');
  svg.innerHTML = '';
  if(!selectedPalace || !plate) return;
  const palaces = plate.palaces || [];
  const gridEl = $('grid');
  const rect = gridEl.getBoundingClientRect();
  const cellW = rect.width / 4, cellH = rect.height / 4;
  const GRID = {'巳':[0,0],'午':[1,0],'未':[2,0],'申':[3,0],'辰':[0,1],'酉':[3,1],'卯':[0,2],'戌':[3,2],'寅':[0,3],'丑':[1,3],'子':[2,3],'亥':[3,3]};
  const idx = BR.indexOf(selectedPalace);
  if(idx < 0) return;
  const p = GRID[selectedPalace]; if(!p) return;
  const cx = (p[0] + 0.5) * cellW, cy = (p[1] + 0.5) * cellH;
  // 对冲 (对宫): idx+6
  const opp = GRID[BR[(idx+6)%12]];
  // 三合: idx+4, idx+8
  const s1 = GRID[BR[(idx+4)%12]], s2 = GRID[BR[(idx+8)%12]];
  // 绘制连线
  const points = [
    {x: cx, y: cy, color: '#c1432f'},  // 本宫红色
    {x: (opp[0]+0.5)*cellW, y: (opp[1]+0.5)*cellH, color: '#2e6da4'},  // 对冲蓝色
    {x: (s1[0]+0.5)*cellW, y: (s1[1]+0.5)*cellH, color: '#4a7c4e'},    // 三合绿
    {x: (s2[0]+0.5)*cellW, y: (s2[1]+0.5)*cellH, color: '#4a7c4e'},    // 三合绿
  ];
  // 画线: 本宫→对冲, 本宫→三合1, 本宫→三合2
  const pairs = [[0,1],[0,2],[0,3]];
  for(const [i,j] of pairs){
    drawLine(svg, points[i].x, points[i].y, points[j].x, points[j].y, points[j].color);
  }
  // 画节点
  for(const pt of points){
    const circle = document.createElementNS('http://www.w3.org/2000/svg','circle');
    circle.setAttribute('cx', pt.x); circle.setAttribute('cy', pt.y);
    circle.setAttribute('r', pt===points[0]?4:3);
    circle.setAttribute('fill', pt.color);
    circle.setAttribute('opacity', '0.7');
    svg.appendChild(circle);
  }
}
function drawLine(svg, x1, y1, x2, y2, color){
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1', x1); line.setAttribute('y1', y1);
  line.setAttribute('x2', x2); line.setAttribute('y2', y2);
  line.setAttribute('stroke', color);
  line.setAttribute('stroke-width', '1.5');
  line.setAttribute('opacity', '0.5');
  line.setAttribute('stroke-dasharray', '5,3');
  svg.appendChild(line);
}

// ── 渲染已有分析 ──
function renderAnalysis(messages){
  const aiMsg = messages.filter(m => m.role==='assistant');
  let html = aiMsg.map(m => formatText(m.content)).join('\n<hr style="border:none;border-top:1px dashed var(--line-faint);margin:12px 0">\n');
  $('analysis-text').innerHTML = html;
}
function formatText(t){
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/^## (.+)$/gm,'<h2 style="font-size:14px;letter-spacing:1px;margin:14px 0 8px;border-left:3px solid var(--vermillion);padding-left:8px">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br>');
}

// ── 大限高亮 ──
function highlightDecade(pName){
  document.querySelectorAll('.palace').forEach(el => {
    el.style.boxShadow = '';
    el.querySelector('.living-badge')?.remove();
    el.querySelector('.scope-badge')?.remove();
  });
  // 高亮大限宫位
  let targetIdx = -1;
  document.querySelectorAll('.palace').forEach((el, i) => {
    const gong = el.querySelector('.p-gong');
    if(gong && gong.textContent.trim() === pName){
      el.style.boxShadow = 'inset 0 0 0 2px var(--azure)';
      el.scrollIntoView({behavior:'smooth', block:'center'});
      targetIdx = i;
    }
  });
  // 叠盘：大限宫位 → 限年命宫，宫名旋转
  if(targetIdx >= 0 && plateData){
    const LIMIT_NAMES = ['命宫','兄弟','夫妻','子女','财帛','疾厄','迁移','交友','官禄','田宅','福德','父母'];
    document.querySelectorAll('.palace').forEach((el, i) => {
      const limitName = LIMIT_NAMES[(i - targetIdx + 12) % 12];
      const badge = document.createElement('span');
      badge.className = 'living-badge';
      badge.textContent = limitName;
      badge.style.cssText = 'font-size:7px;color:var(--azure);border:1px solid var(--azure);border-radius:2px;padding:0 2px;margin-left:2px';
      el.querySelector('.p-head')?.appendChild(badge);
    });
  }
}
// ── 流式分析 ──
async function startAnalysis(plate, password){
  if(!plate) return;
  const area = $('analysis-text');
  area.innerHTML = '正在推算命盘...';
  try{
    const r = await fetch('/api/ziwei/analyze/stream', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({plate, password: password||''})
    });
    if(r.status===403){
      const p = prompt('此命盘需要密码才能解读：');
      if(p) return startAnalysis(plate, p);
      area.innerHTML = '<span style="color:var(--vermillion)">需要密码</span>';
      return;
    }
    if(!r.ok){ area.innerHTML = '<span style="color:var(--vermillion)">分析请求失败</span>'; return }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let fullText = '', buf = '';
    let lastRender = 0;
    while(true){
      const {value,done} = await reader.read();
      if(done) break;
      buf += decoder.decode(value, {stream:true});
      const lines = buf.split('\n'); buf = lines.pop() || '';
      for(const line of lines){
        if(!line.startsWith('data: ')) continue;
        try{
          const d = JSON.parse(line.slice(6));
          if(d.type === 'content_block_delta' && d.delta?.text){
            fullText += d.delta.text;
            const now = Date.now();
            if(now - lastRender > 50){
              area.innerHTML = formatText(fullText) + '<span style="animation:blink 1s infinite">▌</span>';
              lastRender = now;
            }
          }
        }catch(e){}
      }
    }
    area.innerHTML = formatText(fullText);
    const msgs = [{role:'assistant', content:fullText}];
    await fetch(`/api/ziwei/sessions/${sid}`, {
      method:'PATCH', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages: msgs})
    });
  }catch(e){
    area.innerHTML = '<span style="color:var(--vermillion)">分析中断，请重试</span>';
  }
}

// ── 追问 ──
async function sendChat(){
  const input = $('chat-input'), reply = input.value.trim();
  if(!reply) return;
  input.disabled = true; $('btn-chat').disabled = true;
  const chatArea = $('chat-messages');
  chatArea.innerHTML += `<div class="chat-msg user"><div class="who">你</div>${reply}</div>`;
  input.value = '';
  // 获取当前 messages
  const r = await fetch(`/api/ziwei/sessions/${sid}`);
  const s = await r.json();
  const msgs = s.messages || [];
  try{
    const res = await fetch('/api/ziwei/analyze/continue', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body:JSON.stringify({messages: msgs, reply})
    });
    const d = await res.json();
    if(d.success){
      chatArea.innerHTML += `<div class="chat-msg agent"><div class="who">Agent</div>${d.analysis.replace(/\n/g,'<br>')}</div>`;
      // 追加到 session
      msgs.push({role:'user', content: reply});
      msgs.push({role:'assistant', content: d.analysis});
      await fetch(`/api/ziwei/sessions/${sid}`, {
        method:'PATCH', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({messages: msgs})
      });
    }
  } catch(e){ chatArea.innerHTML += '<div style="color:var(--vermillion);font-size:11px">追问失败，请重试</div>'; }
  input.disabled = false; $('btn-chat').disabled = false;
}
</script>
