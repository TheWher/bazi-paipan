<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>八字排盘</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#0f0f0f;color:#e0d5c0;font-family:"PingFang SC","Microsoft YaHei",sans-serif;
  overflow:hidden;
}
body::before{
  content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(180,140,80,0.08) 0%, transparent 60%),
             radial-gradient(ellipse at 80% 100%, rgba(120,80,40,0.05) 0%, transparent 50%);
  pointer-events:none;
}
main{text-align:center;z-index:1;padding:2rem;}
h1{font-size:clamp(3rem, 8vw, 6rem);font-weight:200;letter-spacing:.15em;color:#c8a860;margin-bottom:.25em;}
.sub{font-size:clamp(.9rem, 2vw, 1.1rem);color:#888;letter-spacing:.3em;margin-bottom:3rem;}
.btn{
  display:inline-block;padding:1rem 4rem;font-size:1.1rem;letter-spacing:.2em;
  color:#0f0f0f;background:linear-gradient(135deg, #c8a860, #a08040);
  border:none;border-radius:2px;cursor:pointer;text-decoration:none;
  transition:transform .2s, box-shadow .2s;
}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(200,168,96,.3);}
.footer{position:fixed;bottom:2rem;left:0;right:0;text-align:center;font-size:.75rem;color:#555;letter-spacing:.1em;}
.trigrams{
  position:fixed;inset:0;pointer-events:none;opacity:.03;
  font-size:clamp(6rem, 12vw, 16rem);display:flex;align-items:center;justify-content:center;
  font-family:serif;color:#c8a860;
}
</style>
</head>
<body>
<div class="trigrams">☰ ☷ ☵ ☲ ☳ ☴ ☶ ☱</div>
<main>
  <h1>八字排盘</h1>
  <p class="sub">— 推命 · 验盘 · 知运 —</p>
  <a href="/app" class="btn">进 入</a>
</main>
<footer class="footer">Powered by Destiny Agent · DeepSeek v4</footer>
</body>
</html>
