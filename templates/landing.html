<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Destiny Agent · 八字&紫微</title>
<style>
:root{--paper:#f5f1e8;--paper-card:#faf6ec;--ink:#2b2825;--ink-soft:#6b6660;--ink-faint:#a8a298;--vermillion:#c1432f;--line-soft:#c4bdb0;--line-faint:#e0d9c8}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:16px}
body{font-family:"Noto Serif SC","Source Han Serif SC",serif;background:var(--paper);color:var(--ink);line-height:1.7;background-image:radial-gradient(circle at 20% 10%,rgba(180,160,130,.08),transparent 50%),radial-gradient(circle at 80% 90%,rgba(180,160,130,.05),transparent 50%);min-height:100vh;display:flex;flex-direction:column;align-items:center;-webkit-font-smoothing:antialiased}
main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;max-width:860px;width:100%}
.hero{text-align:center;margin-bottom:3rem}
.hero .mark{display:inline-block;font-size:.72rem;letter-spacing:.2em;color:var(--vermillion);border:1px solid var(--vermillion);padding:3px 14px;border-radius:2px;margin-bottom:1.4rem}
.hero h1{font-family:"STKaiti","KaiTi","Noto Serif SC",serif;font-size:clamp(2rem,5vw,3rem);font-weight:400;color:var(--ink);letter-spacing:.08em;margin-bottom:.6rem;line-height:1.3}
.hero p{font-size:.9rem;color:var(--ink-soft);max-width:420px;margin:0 auto;line-height:1.8}
.systems{display:grid;grid-template-columns:1fr 1fr;gap:1rem;width:100%;margin-bottom:2rem}
.card{display:flex;flex-direction:column;align-items:center;text-align:center;padding:2.2rem 1.8rem;background:var(--paper-card);border:1px solid var(--line-soft);border-radius:4px;cursor:pointer;text-decoration:none;color:inherit;transition:all .3s}
.card:hover{transform:translateY(-2px);border-color:var(--ink-soft);box-shadow:0 4px 20px rgba(0,0,0,.06)}
.card .icon{font-size:2.2rem;margin-bottom:.6rem}
.card .tag{font-size:.66rem;letter-spacing:.1em;margin-bottom:.8rem;padding:2px 10px;border-radius:2px;font-weight:600}
.card .tag.bazi{color:var(--ink);border:1px solid var(--ink)}
.card .tag.ziwei{color:var(--vermillion);border:1px solid var(--vermillion)}
.card h2{font-family:"STKaiti","KaiTi","Noto Serif SC",serif;font-size:1.4rem;font-weight:400;margin-bottom:.4rem;letter-spacing:.05em}
.card p{font-size:.8rem;color:var(--ink-faint);line-height:1.7;max-width:260px}
.card .specs{display:flex;gap:.8rem;margin-top:.8rem;font-size:.68rem;color:var(--ink-soft)}
.card .specs span{padding:2px 8px;border:1px solid var(--line-faint);border-radius:2px}
footer{text-align:center;font-size:.68rem;color:var(--ink-faint);padding:1rem;letter-spacing:.04em}
@media(max-width:640px){.systems{grid-template-columns:1fr}.hero h1{font-size:1.6rem}.card{padding:1.6rem 1rem}}
</style>
</head>
<body>
<main>
<section class="hero"><div class="mark">符号计算 + LLM 推理</div><h1>推命 · 观星 · 知运</h1><p>八字梁湘润体系9级递进 · 紫微三合中州派v8 Agent · 双体系交叉验证</p></section>
<div class="systems">
<a href="/app" class="card"><div class="icon">&#x2630;</div><div class="tag bazi">八字</div><h2>四柱推命</h2><p>sxtwl C++ + Meeus 双引擎 · 调候→格局→旺衰→病药9级递进 · 验盘闭环</p><div class="specs"><span>真太阳时</span><span>夜子时</span><span>250+城市</span></div></a>
<a href="/ziwei" class="card"><div class="icon">&#x1F52E;</div><div class="tag ziwei">紫微</div><h2>斗数观星</h2><p>iztro-py排盘+14主星亮度修正 · 三层叠盘 · 三合四正连线 · 飞星流曜 · 交叉验证</p><div class="specs"><span>24格局</span><span>三层叠盘</span><span>v8 Agent</span></div></a>
</div>
<footer>八字 sxtwl + 紫微 iztro-py · Flask · DeepSeek v4-pro</footer>
</main>
</body>
</html>
