<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>紫微斗数 · react-iztro</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,sans-serif;background:#1a1a24;color:#c8c8d0}
.app-layout{display:flex;min-height:100vh}
.sidebar{width:300px;background:#1a1a20;border-right:1px solid #3a3a4a;padding:14px 12px;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;padding:20px;overflow-y:auto}
.frm{display:grid;grid-template-columns:1fr 1fr;gap:4px 8px;margin-bottom:10px}.frm label{font-size:.65em;color:#777}
.frm input,.frm select{padding:5px 6px;font-size:.72em;border:1px solid #3a3a4a;border-radius:4px;background:#1e1e2c;color:#c8c8d0}
.btn{padding:6px 12px;border:1px solid #3a3a4a;border-radius:5px;background:#1e1e2c;color:#c8c8d0;font-size:.74em;cursor:pointer}.btn:hover{opacity:.85}
.btn-gold{background:linear-gradient(135deg,#c8a850,#8b6914);color:#fff;border:none}
.quick{width:100%;padding:7px;font-size:.76em;border:1px solid #3a3a4a;border-radius:5px;background:#1e1e2c;color:#c8c8d0;font-family:monospace;margin-bottom:6px}
.chart-wrap{display:flex;justify-content:center}
@media(max-width:860px){.app-layout{flex-direction:column}.sidebar{width:100%;height:auto;position:static}}
</style>
</head>
<body>
<div class="app-layout">
<aside class="sidebar">
    <h2 style="color:#d4a843;font-size:.95rem">🔮 紫微斗数</h2>
    <input class="quick" id="quick" maxlength="12" inputmode="numeric" placeholder="200508190135">
    <div class="frm">
        <div><label>历法</label><select id="cal"><option value="solar">公历</option><option value="lunar">农历</option></select></div>
        <div><label>年份</label><input id="y" type="number" value="1991"></div>
        <div><label>月份</label><input id="m" type="number" value="8"></div>
        <div><label>日期</label><input id="d" type="number" value="15"></div>
        <div><label>时</label><input id="h" type="number" value="1" min="0" max="23"></div>
        <div><label>分</label><input id="min" type="number" value="0" min="0" max="59"></div>
        <div><label>性别</label><select id="g"><option value="male">男</option><option value="female">女</option></select></div>
    </div>
    <button id="btn-render" class="btn btn-gold" style="width:100%">🔮 排盘</button>
</aside>
<main class="main">
    <div class="chart-wrap" id="zw-chart"></div>
</main>
</div>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18",
    "react-dom/client": "https://esm.sh/react-dom@18/client",
    "react-iztro": "https://esm.sh/react-iztro"
  }
}
</script>
<script type="module">
import React from "react";
import { createRoot } from "react-dom/client";
import { Iztrolabe } from "react-iztro";

const $=id=>document.getElementById(id);
$('quick').addEventListener('input',function(){const v=this.value.replace(/\D/g,'');if(v.length<8)return;$('y').value=v.slice(0,4);$('m').value=parseInt(v.slice(4,6));$('d').value=parseInt(v.slice(6,8));if(v.length>=10)$('h').value=parseInt(v.slice(8,10));if(v.length>=12)$('min').value=parseInt(v.slice(10,12))});

let root=null;
function renderChart(birthday,birthTime,birthdayType,gender){
    if(!root)root=createRoot($('zw-chart'));
    const horoscopeDate=new Date();
    horoscopeDate.setFullYear(horoscopeDate.getFullYear()-1); // avoid future horoscope issues
    root.render(React.createElement(Iztrolabe,{birthday,birthTime,birthdayType,gender,horoscopeDate,horoscopeHour:1}));
}

$('btn-render').addEventListener('click',()=>{
    const y=$('y').value,m=$('m').value,d=$('d').value,h=parseInt($('h').value);
    const g=$('g').value,cal=$('cal').value;
    const birthTime=Math.floor((h+1)/2)%12;
    const birthday=`${y}-${m}-${d}`;
    renderChart(birthday,birthTime,cal,g);
});

// Render default chart on load
renderChart('1991-8-15',Math.floor((2)/2)%12,'solar','male');
</script>
</body>
</html>
